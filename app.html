const INFO_DATA = {"estonia": {"overview": "Estonia is the most northerly of the Baltic states, with 1.3 million people and a capital in Tallinn. A member of the EU and NATO since 2004, it was the first country to hold legally binding elections online and the first to declare internet access a basic human right. Estonian is a Finno-Ugric language, more closely related to Finnish than to Latvian or Lithuanian, and utterly unlike any Indo-European language. The country uses the euro.\n\nEstonia gained independence from the Soviet Union in 1991 through the Singing Revolution — three weeks of mass singing gatherings that culminated in a 675-kilometre human chain across all three Baltic states. The country has since built one of the world's most digitally advanced societies: Skype, TransferWise (Wise), and Bolt were all founded here.\n\nThe landscape is ancient and flat — 60% forest, 1,500+ islands, and vast raised bogs that have accumulated peat for 10,000 years. The highest point, Suur Munamägi, is only 318 metres. Summers bring nearly 19 hours of daylight and Baltic water temperatures of 18–22°C in July.", "stops": [{"id": "tallinn", "name": "Tallinn", "text": "The capital of Estonia (population 440,000) sits on the Gulf of Finland, two hours by ferry from Helsinki. It divides sharply between the UNESCO-listed medieval Old Town on Toompea Hill and the modern city spreading around it. The Old Town's 2.4-kilometre medieval wall, with 26 surviving towers, was built by Danish, German and Hanseatic powers between the 13th and 15th centuries. Tallinn has been shaped by six different colonial rulers — Danish, Livonian, Swedish, Russian, German, and Soviet — each leaving visible architectural and cultural traces. Today it is one of the best-preserved medieval cities in northern Europe and the most visited capital in the Baltic states.", "regions": ["Tallinn", "Near Tallinn", "Tallinn environs", "North Estonia / Harjumaa"]}, {"id": "lahemaa", "name": "Lahemaa National Park", "text": "Estonia's largest national park (725 km²) was established in 1971 as the first national park in the Soviet Union. The name means 'Land of Bays': four peninsulas jut into the Gulf of Finland, separated by sheltered bays. The park contains ancient limestone pavements, raised bogs, coastal forests, four Baroque manor houses (including Palmse), and some of Estonia's last traditional fishing villages. Käsmu — the 'captains' village' — was home to Estonia's most prosperous merchant mariners and preserves an extraordinary collection of glacially deposited boulders on its shore.", "regions": ["Lahemaa NP"]}, {"id": "parnu", "name": "Pärnu", "text": "Estonia's 'summer capital' (50,000 residents) has been a health resort since the 19th century, when Baltic German doctors promoted its iron-rich sea mud. The original 1927 mud bath building still operates as the Hedon Spa. The wide white-sand beach, Art Nouveau promenade, and the unique spa culture make Pärnu the most popular domestic holiday destination in Estonia. July water temperatures here are among the warmest on the Estonian coast (20–22°C). The Pärnu Hanseatic Days — the medieval festival that anchors this entire trip — take place in the old town each summer.", "regions": ["Pärnu", "Pärnu County", "Pärnu Bay", "Pärnu area", "Soomaa NP"]}, {"id": "haapsalu", "name": "Haapsalu", "text": "This small coastal town (10,000) was a fashionable 19th-century resort, popular with Baltic German nobility and Russian aristocracy. Tchaikovsky stayed here in 1867, composing pieces inspired by the haunting light over the shallow bay. The town's two claims to fame are the Bishop's Castle — Estonia's best-preserved cathedral-fortress, with its legendary White Lady apparition at full moon — and the longest covered railway platform in the world (216 metres), built to shelter wealthy visitors arriving by steam train from St Petersburg.", "regions": ["Haapsalu"]}, {"id": "saaremaa", "name": "Saaremaa", "text": "Estonia's largest island (2,673 km²) was a Soviet closed military zone throughout the occupation — a status that accidentally preserved its traditions, landscape, and architecture from development. The island is now Estonia's most-visited domestic destination. The well-preserved 14th-century castle at Kuressaare, juniper-filtered farmhouse beer, smoked fish traditions, and the extraordinary Kaali meteorite crater lake (one of the youngest and best-preserved impact craters on Earth, formed 3,500 years ago) define the experience. The ferry from Virtsu to Muhu Island takes 27 minutes; a causeway then connects to Saaremaa itself.", "regions": ["Saaremaa", "Saaremaa / Muhu", "Saaremaa / Hiiumaa", "Virtsu"]}, {"id": "islands", "name": "Estonian Islands", "text": "The western Estonian archipelago contains over 1,500 islands. Kihnu Island (16 km², population ~600) is a UNESCO Intangible Cultural Heritage site — women still wear the traditional striped skirts as everyday dress, not for tourists. Vormsi, Ruhnu, and Muhu each have distinctive histories and characters. Muhu's Koguva village is the finest surviving example of traditional Estonian stone-and-thatch farmstead architecture, largely unchanged since the 19th century.", "regions": ["Kihnu", "Kihnu Island", "Vormsi", "Ruhnu", "Muhu"]}, {"id": "hiiumaa", "name": "Hiiumaa", "text": "Estonia's second-largest island (1,023 km², population 9,000) is even quieter than Saaremaa. Like Saaremaa, it was a Soviet closed zone, a status that preserved its character. The island is known for dramatic lighthouses: Kõpu Lighthouse (built 1531) is one of the oldest continuously operated lighthouses in the world. Tahkuna Lighthouse on the northern tip carries an additional emotional weight — a memorial bell for the 852 people killed when the MS Estonia ferry sank nearby in September 1994, one of the worst maritime disasters in European peacetime history.", "regions": ["Hiiumaa"]}, {"id": "elsewhere_est", "name": "Across Estonia", "text": "Several extraordinary sites lie slightly off the main coastal route but reward the detour. Sillamäe on the northeastern coast was a secret Soviet city built to process uranium for the atomic bomb — erased from all maps until 1991, it preserves an intact Stalinist townscape. The Rummu flooded quarry near Tallinn is one of Europe's most unusual swimming spots: a Soviet limestone quarry and prison camp, flooded after independence, with submerged trees and prison walls visible through the crystal-clear water.", "regions": ["All Estonia", "Estonian coast", "West Estonia", "East Estonia", "South Estonia", "Soomaa NP", "South Estonia / Võromaa", "South Estonia / Võru County", "Southeast Estonia", "Various (Lahemaa, South Estonia)", "Paldiski", "Sillamäe"]}]}, "latvia": {"overview": "Latvia sits at the centre of the Baltic states, bordered by Estonia to the north, Lithuania to the south, Russia and Belarus to the east, and the Baltic Sea to the west. The capital Riga (population 620,000) is the largest city in the entire Baltic region. Latvia uses the euro and joined the EU and NATO in 2004.\n\nThe Latvian language is one of only two surviving Baltic languages (with Lithuanian), both among the oldest in the Indo-European family, preserving features of Proto-Indo-European found nowhere else in modern Europe. Latvia's population of 1.84 million has declined significantly since independence — emigration, particularly to Germany and the UK after EU accession in 2004, created one of the most dramatic population losses in modern European history.\n\nLatvia's landscape divides between the wild Kurzeme (Courland) Peninsula to the west — with some of the most unspoilt coastline in the Baltics — and the cultural and political centre around Riga. Forests cover 54% of the country. The Gauja River valley cuts through sandstone in the northeast, creating Latvia's most dramatic natural landscape.", "stops": [{"id": "kolka", "name": "Cape Kolka & Kurzeme Coast", "text": "The Courland Peninsula juts north into the Baltic; its tip, Cape Kolka, marks the dramatic point where the open Baltic Sea and the sheltered Gulf of Riga collide — two distinct bodies of water with different temperatures, colours, and wave patterns, visibly meeting. The cape sits within Slītere National Park, which protects ancient coastal forest and the last remnants of the Livonian people: a nearly extinct Finno-Ugric minority who inhabited this coast for millennia. The coastal road south from Kolka is one of the most remote in the Baltics — wild beaches, bison reserves, and fishing villages with almost no tourist infrastructure.", "regions": ["Cape Kolka", "Kurzeme", "Slītere NP", "Kurzeme coast", "Latvian Baltic coast"]}, {"id": "ventspils", "name": "Ventspils", "text": "Latvia's sixth-largest city (36,000) was the Soviet Union's busiest crude oil export port — a status that made it one of the wealthiest Latvian cities after independence. That wealth funded one of the best children's and family infrastructures in the Baltic region: the prize-winning outdoor play city (Bērnu pilsētiņa), the narrow-gauge coastal railway, and the meticulously maintained seaside park with its Blue Flag beach. The contrast between the industrial port and the family-friendly city centre is one of Ventspils's defining characteristics.", "regions": ["Ventspils"]}, {"id": "kuldiga", "name": "Kuldīga", "text": "One of the best-preserved small historic towns in Latvia, Kuldīga was a regional capital during the Duchy of Courland in the 17th–18th centuries. The historic centre — cobblestoned streets, colourful timber houses, a 17th-century brick bridge over the Venta River — was added to UNESCO's Tentative List. The Ventas Rumba waterfall (249 metres wide, only 1.8 metres tall) is the widest natural waterfall in Europe. In summer, people wade across its lip. The Riežupe Sand Caves, 4 km north, were hand-dug by three generations of one family in the 18th–19th centuries to mine quartz sand for glass-making.", "regions": ["Kuldīga"]}, {"id": "liepaja", "name": "Liepāja", "text": "Latvia's third-largest city (64,000) calls itself 'the city where the wind is born.' The city has been a major naval base since the late 19th century. The extraordinary Karosta district — a fortified military city built from 1893 for 30,000 Tsarist sailors — was abandoned by Soviet forces in 1994, leaving one of the most atmospheric collections of imperial-era military architecture anywhere in Europe. The city is also home to the largest surviving unreconstructed mechanical pipe organ in the world, built by H.A. Contius in 1779 in the Holy Trinity Cathedral. The Liepāja beach and seaside park rank among the finest on the Baltic coast.", "regions": ["Liepāja"]}, {"id": "riga", "name": "Riga", "text": "The capital of Latvia (620,000) is the largest city in the Baltic states. Founded in 1201 by Bishop Albert von Buxhoeveden, Riga became one of the most important Hanseatic trading cities in northern Europe, building its wealth on furs, amber, grain, and timber. The Old Town (UNESCO World Heritage Site) preserves that heritage in its warehouses, guild halls, and the extraordinary House of Blackheads. Riga also contains the world's densest concentration of Art Nouveau architecture — over 800 buildings, particularly along Alberta and Elizabetes streets. The KGB Corner House, where the Soviet secret police operated from 1940 to 1991, is the city's most sobering site; its original basement cells and interrogation rooms are preserved exactly as the KGB left them.", "regions": ["Riga"]}, {"id": "jurmala", "name": "Jūrmala & Ķemeri", "text": "Jūrmala ('seaside' in Latvian) is a 26-kilometre resort strip west of Riga, built along the white-sand coast of the Gulf of Riga. During the Soviet era it was the prestige vacation destination for the entire USSR — access required special permission. The Art Nouveau wooden villas built between the 1880s and 1920s by Baltic German and Russian nobility survive in remarkable numbers. The adjacent Ķemeri National Park preserves a raised bog of national significance — one of the most photogenic in the Baltics — and the 1936 Ķemeri Sanatorium, a haunting Art Deco palace slowly being restored.", "regions": ["Jūrmala", "Ķemeri NP"]}, {"id": "sigulda", "name": "Sigulda & Gauja National Park", "text": "The Gauja River valley, carved deep into red sandstone over millennia, is Latvia's most dramatic natural landscape and its most popular tourism destination. The river has cut cliffs up to 90 metres tall, exposing sandstone faces riddled with caves, springs, and medieval ruins. Four castles sit within 15 km of each other: Turaida, New Sigulda Castle, Krimulda, and Cēsis (the most spectacular). Sigulda — the entry town — is nicknamed 'the Switzerland of Latvia'. The Olympic-specification bobsled/luge track is one of only 16 in the world, and the only one in the Baltic states — accessible for public rides in summer.", "regions": ["Sigulda", "Sigulda / Gauja NP", "Gauja NP", "Gauja Valley", "Saulkrasti"]}, {"id": "cesis", "name": "Cēsis", "text": "Cēsis (population 18,000) was the medieval headquarters of the Livonian Order, the German crusading military order that conquered and Christianised the eastern Baltic in the 13th century. The Cēsis Medieval Castle is the most evocative ruin in Latvia: visitors explore its towers and dungeons by the light of genuine hand-carried lanterns — no electric lights. The town itself has a beautifully preserved historic centre with a Protestant church dating from 1281.", "regions": ["Cēsis"]}, {"id": "bauska", "name": "Bauska & South Latvia", "text": "Bauska (9,500), at the confluence of the Mūsa and Mēmele rivers 65 km south of Riga, is gateway to two of Latvia's finest historic sites. Bauska Castle (15th century, Livonian Order) and Rundāle Palace (18th century, Baroque-Rococo) sit 15 km apart and make a natural paired day trip. Rundāle was designed by Bartolomeo Rastrelli — the same architect who built the Winter Palace and the Catherine Palace in Russia — for the Dukes of Courland. Its gilded halls, Rococo plasterwork, and formal French garden are among the finest in northern Europe.", "regions": ["Bauska", "Aizkraukle", "Gulf of Riga", "Gulf of Riga coast", "Pāvilosta", "Rural Latvia", "Tērvete", "All Latvia", "Kurzeme / All Latvia"]}]}, "lithuania": {"overview": "Lithuania is the largest and most southerly of the Baltic states, with 2.8 million people and a capital in Vilnius. Lithuania was the last pagan state in Europe, not officially Christianised until 1387. At its medieval peak, the Grand Duchy of Lithuania was the largest state in Europe, stretching from the Baltic to the Black Sea.\n\nLithuanian is one of the most archaic languages in the Indo-European family — linguists use it to reconstruct Proto-Indo-European, the common ancestor of most European and South Asian languages. The language is grammatically closer to Sanskrit than to most modern European tongues. Lithuania uses the euro and joined the EU and NATO in 2004.\n\nLithuania declared independence from the Soviet Union in March 1990 — the first Soviet republic to do so. The Soviet military crackdown in January 1991 killed 14 civilians at the Vilnius TV Tower, creating national martyrs still honoured today. The Baltic coast — the 'Lithuanian Riviera' — runs for only 99 km but includes the extraordinary Curonian Spit, a UNESCO World Heritage Site.", "stops": [{"id": "palanga", "name": "Palanga & Kretinga", "text": "Palanga (17,000 permanent residents) swells to 200,000 in summer, Lithuania's main beach resort. The town organises around its 470-metre pier, its pine-shaded park designed by French landscape architect Édouard André in 1897 (the same architect who designed parts of the Champs-Élysées gardens), and the Amber Museum in the Tiškevičiai Palace. Palanga's Concert Hall hosts world-class performers throughout July. Kretinga, 12 km inland, contains one of the most surprising attractions on the route: a fully functioning tropical winter garden (actually open year-round) with palm trees inside a 19th-century manor.", "regions": ["Palanga", "Palanga area", "Kretinga", "Palanga / Kretinga"]}, {"id": "klaipeda", "name": "Klaipėda", "text": "Lithuania's only seaport (152,000 people) was the German city of Memel until 1923, when it was annexed by Lithuania following a local uprising. Hitler held his annexation speech from the Theatre Square balcony in March 1939. The German half-timbered Fachwerk architecture of the Old Town survived the Second World War intact — making Klaipėda's Old Town one of the only surviving examples of this style on the Lithuanian coast. The port is the embarkation point for the Curonian Spit ferries. The Lithuanian Sea Museum at Smiltynė, reachable by free passenger ferry, is the most-visited museum in Lithuania.", "regions": ["Klaipėda"]}, {"id": "curonian", "name": "Curonian Spit", "text": "The Curonian Spit (Kuršių Nerija) is a 97-kilometre sandy peninsula, nowhere wider than 3.8 km, separating the Curonian Lagoon from the Baltic Sea. Shared between Lithuania and the Russian exclave of Kaliningrad, the Lithuanian section (52 km) is a UNESCO World Heritage Site. The spit contains the tallest moving sand dunes in Europe (up to 67 metres), ancient forests, buried medieval villages (four were swallowed by sand in the 17th–19th centuries), and the distinctive fishing villages of Juodkrantė, Pervalka, Preila, and Nida. Thomas Mann spent three summers in Nida (1930–32), writing 'Joseph and His Brothers' in a wooden cottage that now bears his name. The lagoon side offers calm, warm swimming; the Baltic side has open ocean beaches with consistent wind.", "regions": ["Neringa", "Nida / Neringa", "Juodkrantė / Neringa", "Nida / Curonian Spit", "Neringa / Curonian Spit", "Curonian Spit", "Nemunas Delta"]}, {"id": "siauliai", "name": "Šiauliai & Hill of Crosses", "text": "Šiauliai (100,000), Lithuania's fourth-largest city, is visited almost exclusively for the Hill of Crosses 12 km north — the most extraordinary pilgrimage site in the Baltic states. The Hill of Crosses is a small mound covered with over 200,000 crosses, crucifixes, statues, and rosaries, placed by Lithuanian Catholics as acts of devotion and political defiance across centuries. Soviet authorities bulldozed the entire hill three times (1961, 1973, 1975). Each time, it was rebuilt overnight by local people. Pope John Paul II visited in 1993. The crosses now cover every square centimetre of the hill and overflow onto the surrounding paths.", "regions": ["Šiauliai"]}, {"id": "zemaitija", "name": "Žemaitija & Samogitia", "text": "The Samogitian highlands in northwestern Lithuania form a distinct cultural and geographical region (Žemaitija in Lithuanian). The Samogitians were the last people in Europe to convert to Christianity, maintaining pagan traditions into the late 14th century. Žemaitija National Park centres on Lake Plateliai, a glacial lake of extraordinary clarity in a landscape of moraines and ancient oak groves. The Plokštinė Cold War Museum, 13 km north of Plateliai, occupies actual underground Soviet R-12 nuclear missile silos, operational from 1963 to 1978 and preserved exactly as they were decommissioned.", "regions": ["Žemaitija NP", "Žemaitija", "Samogitia", "Salantai, Samogitia", "Samogitia / Klaipeda markets", "Samogitia / Rural Lithuania"]}, {"id": "kaunas", "name": "Kaunas", "text": "Lithuania's second city (285,000) served as the country's provisional capital from 1919 to 1940, when Vilnius was occupied by Poland. The city was built largely from scratch in those two decades in a Functionalist and Expressionist architectural style that UNESCO inscribed in September 2023 as 'Modernist Kaunas: Architecture of Optimism, 1919–1939' — making it the world's newest major UNESCO World Heritage Site. Kaunas has Lithuania's most important art museum (the M.K. Čiurlionis Museum), the only Devil Museum in the world, and the Ninth Fort — a former Tsarist fortress used as a Nazi execution site where over 50,000 people were murdered, now Lithuania's principal Holocaust memorial.", "regions": ["Kaunas", "Kaunas district"]}, {"id": "vilnius", "name": "Vilnius", "text": "Lithuania's capital (570,000) has one of the largest surviving medieval Old Towns in Europe — a UNESCO World Heritage Site covering 360 hectares of Baroque churches, university courtyards, and hidden passageways. Unlike Tallinn's compact and touristic Old Town, Vilnius's is a functioning city. The bohemian Užupis quarter declared independence as an artistic republic on April 1, 1997, complete with a president, an army of 12, and a constitution translated into 75 languages. The Museum of Occupations and Freedom Fights (KGB Museum) occupies the actual KGB headquarters building, with original basement cells and execution chambers intact. The Gate of Dawn houses a 17th-century miracle-working icon of the Virgin Mary, one of the most venerated pilgrimage objects in the Baltic and Polish Catholic world.", "regions": ["Vilnius"]}, {"id": "trakai", "name": "Trakai", "text": "A small town 28 km from Vilnius, Trakai was the medieval capital of the Grand Duchy of Lithuania. The island castle on Lake Galvė — a 14th-century Gothic brick fortress on a natural island, reached by two wooden footbridges — is the most photogenic castle in Lithuania. Trakai is also home to the Karaite community, a Turkic-Jewish ethnic group brought from Crimea as royal bodyguards by Grand Duke Vytautas the Great in the 14th century. Fewer than 300 Karaites remain; they maintain their distinctive cuisine (kibinai pastries — crescent-shaped and filled with lamb or pork), their own prayer houses (kenesas), and a separate language.", "regions": ["Trakai"]}, {"id": "elsewhere_lit", "name": "Across Lithuania", "text": "Lithuania has several unique sites slightly off the main coastal route. The Orvydas Garden in Salantai is one of the most unusual folk-art environments in Europe: a private garden created over decades by sculptor Vilius Orvydas, filled with hundreds of religious sculptures, Soviet military equipment, pagan symbols, and massive boulders. The Stelmužė Oak in northeast Lithuania is believed to be 1,500–2,000 years old, one of the oldest living trees in Europe. Druskininkai, a spa town in the far south, contains the Grūtas Park — a forest filled with removed Soviet-era statues, displayed on their original plinths surrounded by barbed wire and gulag watchtowers.", "regions": ["All Lithuania", "Rural Lithuania", "Druskininkai", "Northeast Lithuania"]}]}, "poland": {"overview": "Poland's Baltic coastline historically belonged to Pomerania — a territory that changed hands between German, Danish, Swedish, and Polish rulers over the centuries. For this trip we follow the eastern section: from the moving sand dunes of Słowiński National Park through the Tri-City metropolitan area (Gdańsk, Sopot, Gdynia) to the extraordinary Hel Peninsula.\n\nGdańsk — the dominant city — has one of the most historically charged locations in modern Europe. The Second World War began here on September 1, 1939, at Westerplatte. Forty-one years later, the trade union Solidarity was born in the city's Lenin Shipyard, launching the political movement that ended Communist rule across Eastern Europe. The city was 90% destroyed in 1945; its reconstruction — completed by 1960 — is one of the most faithful urban restorations in history.\n\nPoland uses the złoty (PLN; approximately €1 = 4.25 PLN). English is widely spoken in the Tri-City's tourist areas.", "stops": [{"id": "leba", "name": "Łeba & Słowiński National Park", "text": "Łeba (3,500 permanent residents) is a small fishing town that swells into a major summer resort. It sits on an isthmus between Lake Łeba and the Baltic, at the edge of Słowiński National Park. The park protects one of the largest active dune fields in Europe — bare white sand advancing 3–12 metres per year, burying and re-revealing ancient forest. The dunes rise to 40–50 metres and extend for kilometres, creating a landscape that looks more like the Sahara than Poland. Sandboarding is possible on the steeper faces.", "regions": ["Łeba", "Pomerania coast", "Polish Baltic coast", "Pomerania"]}, {"id": "gdansk", "name": "Gdańsk", "text": "Poland's gateway to the sea (480,000 people) was one of the most important trading cities in medieval Europe as a member of the Hanseatic League. The Royal Way — a processional route through the city's most magnificent buildings — connects the Golden Gate to the Green Gate on the Motława River waterfront. Long Street and Long Market, lined with multi-coloured facades rebuilt after WWII destroyed 90% of the historic fabric, form one of the most beautiful streetscapes in northern Europe. The Gdańsk Crane (built c.1444) is the largest surviving wooden port crane from medieval Europe. The European Solidarity Centre (2014), shaped like a ship's hull in corten steel, commemorates the workers' movement that changed the world. The city also holds the Amber Museum in the 14th-century Gothic Great Mill — the world's finest collection of Baltic amber.", "regions": ["Gdańsk", "Malbork", "Sztutowo", "Gdańsk Oliwa", "Gdańsk / Kashubia", "Rewa / Bay of Puck"]}, {"id": "sopot", "name": "Sopot", "text": "The smallest of the Tri-City municipalities (37,000 residents), Sopot has been a beach resort since the early 19th century. The town organises around the Monte Cassino pedestrian street (Monciak) leading to Europe's longest wooden pier (511 metres, first built 1827). The Grand Hotel Sofitel, opened in 1927 on the seafront, hosted Hitler, Mussolini, and post-war, every major world leader visiting Poland. The Forest Opera (Opera Leśna), built into a natural pine forest amphitheatre in 1909 with capacity for 5,000, is one of the most atmospheric outdoor concert venues in Europe — extraordinary acoustics, stars overhead, pine scent in the air.", "regions": ["Sopot"]}, {"id": "gdynia", "name": "Gdynia", "text": "Poland's youngest major city (250,000) was barely a fishing village in 1918; by 1939, built almost entirely from scratch in Functionalist and Art Deco styles, it was one of the busiest ports on the Baltic. Gdynia's modernity feels different from Gdańsk's centuries of layered history: it was a deliberate showcase for independent Poland's ambition and self-belief. The South Pier hosts the naval museum, the warship ORP Błyskawica (a destroyer that served in the Norwegian campaign, at Dunkirk, and at Tobruk), and the Art Deco maritime terminal — now the Emigration Museum, dedicated to the millions who left through this pier for America and Brazil.", "regions": ["Gdynia"]}, {"id": "hel", "name": "Hel Peninsula", "text": "The Hel Peninsula (Mierzeja Helska) is a 35-kilometre sandy spit stretching east into the Gulf of Gdańsk. At its narrowest point it is only 100 metres wide — open sea on both sides simultaneously. The peninsula developed from an archipelago of islands that merged over centuries as sand accumulated. The tip, the town of Hel (3,500), is accessible by train, ferry, or bicycle along the dedicated coastal cycling trail. The Baltic grey seal rehabilitation centre (Fokarium), run by the University of Gdańsk Marine Station, is the only such facility in Poland. Feeding shows run three times daily.", "regions": ["Hel Peninsula", "Hel Peninsula gateway"]}, {"id": "kashubia", "name": "Kashubia", "text": "The region between Gdańsk and the coast inland is historically Kashubia — home to Poland's only legally recognised regional minority, with its own distinct language (Kashubian, related to Polish but mutually unintelligible), cuisine, and traditions. The Kashubian lake district contains over 1,000 lakes, and the Wdzydze outdoor museum (Poland's oldest open-air folk museum, opened 1906) preserves traditional Kashubian buildings. Kashubian culinary specialities include herring prepared with raisins and apples, Baltic porter beer (a dark, rich style with roots in the Hanseatic trade), and Goldwasser liqueur — infused with real gold leaf, produced in Gdańsk since the 16th century.", "regions": ["Kashubia"]}]}};

function setInfoCountry(co) {
  infoCountry = co;
  document.querySelectorAll('.info-co-tab').forEach(b => b.classList.toggle('active', b.dataset.co === co));
  renderInfo();
}


const INFO_DATA_NO = {
  "estonia": {
    "overview": "Estland er det nordligste av de baltiske statene, med 1,3 millioner innbyggere og Tallinn som hovedstad. Landet ble EU- og NATO-medlem i 2004, og var det første i verden til å gjennomføre juridisk bindende valg på nett og erklære internettilgang som en grunnleggende menneskerettighet. Estisk er et finsk-ugrisk språk, nærmere beslektet med finsk enn med latvisk eller litauisk.\n\nEstland ble uavhengig fra Sovjetunionen i 1991 gjennom Syngerevolusjonen – tre uker med massearrangementer som kulminerte med en 675 km lang menneskekjede gjennom alle tre baltiske stater 23. august 1989. Landet har siden bygget et av verdens mest digitalt avanserte samfunn: Skype, Wise og Bolt ble alle grunnlagt her.\n\nLandskapet er gammelt og flatt – 60 prosent skog, over 1 500 øyer og store høymyrer som har samlet torv i 10 000 år. Høyeste punkt, Suur Munamägi, er bare 318 meter. Somrene bringer nesten 19 timers dagslys og Østersjøtemperaturer på 18–22 °C i juli.",
    "stops": {
      "tallinn": {"name": "Tallinn", "text": "Estlands hovedstad (440 000 innbyggere) ligger på sørsiden av Finskebukta, to timers ferge fra Helsinki. Den er skarpt delt mellom den UNESCO-listede middelalderlige gamlebyen på Toompea-åsen og den moderne byen rundt. Gamlebyens 2,4 km lange mur med 26 gjenværende tårn ble bygget mellom 1200- og 1400-tallet av danske, tyske og hanseatiske herskere. Tallinn er formet av seks ulike kolonimakter – danske, livlandske, svenske, russiske, tyske og sovjetiske – som alle har satt synlige arkitektoniske spor. Det er i dag en av de best bevarte middelalderbyer i Nord-Europa og den mest besøkte av de baltiske hovedstedene."},
      "lahemaa": {"name": "Lahemaa nasjonalpark", "text": "Estlands største nasjonalpark (725 km²) ble opprettet i 1971 som den første nasjonalparken i hele Sovjetunionen. Navnet betyr «buktenesland»: fire halvøyer stikker ut i Finskebukta, adskilt av lune bukter. Parken inneholder eldgamle kalksteinsletter, høymyrer, kystskog og fire restaurerte barokkherregårder: Palmse (1785), Sagadi, Kolga og Vihula. Fiskerlandsbyene Käsmu, Altja og Võsu bevarer tradisjonell kystkultur. Käsmu – «kapteinenes landsby» – var hjemsted for Estlands mest velstående sjøfarere og rommer landets største naturlige steinfelt."},
      "parnu": {"name": "Pärnu", "text": "Estlands «sommerhovedstad» (50 000 innbyggere) femdobler befolkningen i juli som landets mest populære badested. Byens terapeutiske tradisjon begynte i 1794. Det hvite sandstranden vender vest mot Rigabukten og gir lang kveldssolskinn. Vannet når 20–22 °C i juli–august, blant det varmeste langs estiske kysten. Promenaden bak stranden er kantledd med vakre historiske villaer fra tsartiden, inkludert Villa Ammende (1905), ett av Estlands vakreste jugendstil-trehus. Pärnu Hansadager – middelaldermarkedet som er turrens ankerpunkt – holdes i gamlebyen hvert år."},
      "haapsalu": {"name": "Haapsalu", "text": "Denne lille kystbyen (10 000 innbyggere) ved en grunn lagune var ett av Det russiske imperiums mest prestisjefylte feriesteder på 1800-tallet. Pyotr Tsjajkovskij tilbrakte sommeren 1867 her, og det melankolske lyset over lagunen sies å ha inspirert partier i «Svanesjøen». Tsjajkovskij-benken på promenaden markerer komponistens favorittsted. 1200-tallsborgkatedralen er den best bevarte katedralfestningen i Estland, med den legendariske Hvite Dame som sies å vise seg i katedralvinduet ved fullmåne i august. Jernbanestasjonen har verdens lengste overdekkede perrong (216 meter)."},
      "saaremaa": {"name": "Saaremaa", "text": "Estlands største øy (2 673 km², 30 000 innbyggere) var stengt militær sone fra 1944 til 1991, noe som ved et lykkelig uhell bevarte øyas tradisjonelle gårdsbruk, alvar-heier og muntlige kulturtradisjoner. Øya er nå Estlands mest besøkte innenlandsdestinasjon. Middelalderborgen i Kuressaare (1300-tall, Tyske ridderorden) har aldri blitt vesentlig ødelagt – en bemerkelsesverdig sjeldenhiet. Kaali-krateret (dannet for ~3 500 år siden) er ett av verdens yngste og best bevarte meteorittnedslags-steder; bronsealderens hellige steinring rundt det er fortsatt intakt. Fergen fra Virtsu tar 27 minutter."},
      "islands": {"name": "Estiske øyer", "text": "Den vest-estiske øygruppen inneholder over 1 500 øyer, hvorav 18 er fast bebodd. Kihnu (23 km², ~600 innbyggere) er UNESCOs immaterielle kulturarv – ett av de siste stedene i Nord-Europa der en tradisjonell kvinnekultur har overlevd nesten intakt, med tradisjonelle stripete körts-skjørt som hverdagsplagg. Vormsi var en overveiende svensk øy inntil 1944, da nesten hele befolkningen flyktet til Sverige; de håndhuggede kalksteins-solkorsene i kirkegården er arven deres. Ruhnu, 70 km fra kysten, har «syngende sand» og Estlands eldste trekirke (1643). Muhus Koguva landsby er det fineste eksemplet på tradisjonell estisk kystgårdsarkitektur."},
      "hiiumaa": {"name": "Hiiumaa", "text": "Estlands nest største øy (1 023 km², 9 000 innbyggere) var også et sovjet-sperreområde, noe som har bevart dens unikt stille og skogkledde karakter. Kõpu fyr (1531) er ett av verdens eldste kontinuerlig drevne fyrtårn. Tahkuna (1875) og Ristna (1874) ble prefabrikkert i Paris og sendt til Estland. Minneklokken ved Tahkuna fyr ringer i vinden som et permanent minnesmerke for de 852 menneskene som omkom da fergen MS Estonia sank 27.–28. september 1994 – den verste maritime katastrofen i Europas fredstid etter krigen."},
      "elsewhere_est": {"name": "Øvrige Estland", "text": "Flere ekstraordinære steder belønner omveier fra kystruten. Tartu (93 000 innbyggere) er Estlands universitetsby – grunnlagt i 1632 – og den kulturelle motvekten til Tallinn: mer estisktalende, mer intellektuell og med noen av landets beste restauranter. Sillamäe ved nordøstkysten ble bygget fra 1947 som en hemmelig by for uranberedning til den sovjetiske atombommen – slettet fra alle kart inntil 1991. Rummu-steinbruddet (40 km sørvest for Tallinn) er et av Europas mest uvanlige badesteder: et sovjet-fengselsteinsbrudd oversvømt etter uavhengigheten, med nedsunkne murer og trær synlige gjennom krystallklart vann."},
    }
  },
  "latvia": {
    "overview": "Latvia ligger i sentrum av de baltiske statene, omgitt av Estland i nord, Litauen i sør, Russland og Hviterussland i øst og Østersjøen i vest. Landets hovedstad Riga (615 000 innbyggere) er den største byen i hele Baltikum. Latvia bruker euro og ble EU- og NATO-medlem i 2004.\n\nLatvisk er ett av bare to gjenlevende baltiske språk (litauisk er det andre), og begge bevarer trekk fra proto-indoeuropeisk som ikke finnes andre steder i levende språk. Latvias befolkning har sunket kraftig siden uavhengigheten: fra 2,67 millioner i 1990 til 1,84 millioner i dag, primært gjennom emigrasjon til Tyskland og Storbritannia.\n\nLatvia er delt i fire historiske regioner: Vidzeme, Kurzeme (Courland-halvøya), Zemgale og Latgale. Skog dekker 54 prosent av landet. Gauja-dalen skjærer gjennom rød devonsk sandstein i nordøst og skaper Latvias mest dramatiske naturlandskap.",
    "stops": {
      "kolka": {"name": "Cape Kolka og Kurzeme-kysten", "text": "Courland-halvøya stikker nordover; dens nordligste spiss, Cape Kolka, er det dramatiske punktet der det åpne Østersjøen og den lune Rigabukten kolliderer synlig med ulike bølgemønstre og farger. ⚠️ Det er strengt forbudt og livsfarlig å bade ved Cape Kolka: de møtende strømmene er uforutsigbare og dødelige. Odden faller innenfor Slītere nasjonalpark, som beskytter eldgammel kystskog og de siste restene av livonierne – en finsk-ugrisk folkegruppe. Den militære sperresonen inntil 1991 har holdt kysten nesten urørt."},
      "ventspils": {"name": "Ventspils", "text": "Latvias sjette største by (36 000 innbyggere) var Sovjetunionens travleste råoljeeksportterminal. Inntektene finansierte noe av Baltikums beste familieinfrastruktur: en prisvinnende utendørs lekerby, en omhyggelig stelt strandhage med Blue Flag-strand og det smalsporete Mazbānītis-toget gjennom parken. Den livlandske ridderborgen fra 1290 i sentrum er godt restaurert og huser et museum om latvisk middelalderhistorie. Ventspils er den nærmeste storbyen til Irbene radioteleskop (30 km nord) – den tidligere sovjetiske signaletterretningsstasjonen."},
      "kuldiga": {"name": "Kuldīga", "text": "En av Latvias best bevarte historiske småbyer. Kuldīga var hertigdømmets Courlands residensby på 1600-tallet. Gamlebyens brosteinsgate, fargerike trehus og 1600-tallsmursteinbro (1617) over elven Venta er nominert til UNESCOs tentative verdensarvliste. Ventas Rumba – 249 meter bred men bare 1,8 meter høy – er Europas bredeste naturlige foss. Riežupe sandsteinsgrotter (4 km nord) ble gravd ut for hånd av tre generasjoner av én familie på 1700–1800-tallet for å utvinne kvartssand til glassproduksjon – 460 m lyssatte underjordiske tunneler."},
      "liepaja": {"name": "Liepāja", "text": "Latvias tredje største by (64 000 innbyggere) kaller seg «byen der vinden fødes». Karosta-distriktet – en befestet havneby bygget for 30 000 tsaristiske sjøfolk fra 1893 – ble forlatt av sovjet-styrker i 1994 og etterlot en av de mest stemningsfulle samlingene av imperialistisk militærarkitektur i Europa: den bysantinsk-ortodokse marinekatedralen, mursteinsbarakker og de nordre forter – 2 km med artillerikasematter som langsomt raser ut i Østersjøen. Karosta fengsel (1905) er det eneste intakte tsaristiske militærfengselet i Europa åpent for besøkende, med overnatting i originale celler. Hellig Treenighets-katedralen har verdens største fungerende mekaniske pipeorgel."},
      "riga": {"name": "Riga", "text": "Latvias hovedstad (615 000) er den største byen i Baltikum og en av de arkitektonisk mest mangfoldige byene i Nord-Europa. Grunnlagt i 1201 av biskop Albert vokste den til den dominerende hansabyen på østlige Østersjøen. Gamlebyen (UNESCO verdensarv 1997) bevarer hanseatisk arv i lagerhus, laugsaler og det rekonstruerte Svartehode-huset. Alberta gate og omgivelsene har verdens tetteste samling av jugendstil-arkitektur – over 800 bygninger, mange av Mikhail Eisenstein. KGB-hjørnebygget (Stūra Māja) ved krysset Brīvības/Stabu fungerte som latvisk KGB-base 1940–1991; kjellercellene og forhørsrommene er bevart nøyaktig slik KGB forlot dem."},
      "jurmala": {"name": "Jūrmala og Ķemeri", "text": "Jūrmala er et 32 km langt feriestrøk vest for Riga langs Rigabuktens hvite sandstrand. Under Sovjet var det prestisjeferiemålet for hele USSR – besøk krevde spesialtillatelse – noe som utilsiktet bevarte den ekstraordinære villaarkitekturen fra 1880–1920-tallet. Over 4 000 trebygde jugendstil-villaer preger gatene bak stranden. Den tilstøtende Ķemeri nasjonalpark beskytter en høymyr av nasjonal betydning med en 3,4 km lang treplankeløype, og det hjemsøkende Ķemeri sanatoriet fra 1936 – et Art Deco-palass under restaurering."},
      "sigulda": {"name": "Sigulda og Gauja nasjonalpark", "text": "Gauja-elvas dal, skåret 50–90 meter ned i devonsk rød sandstein, er Latvias mest dramatiske naturlandskap. Elven har avdekket sandsteinsklipper med huler, kilder og borgruiner. Fire borger ligger innenfor 15 km: Turaida (1214), Sigulda (1207), Krimulda (1226) og Cēsis. Sigulda kalles «Latvias Sveits». Den olympiske bob- og kjelkebanen – en av kun 16 i verden – er åpen for publikum om sommeren med hjulsler. Taubanen over den 900 m brede Gauja-dalen gir et unikt perspektiv på dalens dybde."},
      "cesis": {"name": "Cēsis", "text": "Cēsis (18 000 innbyggere) var middelalderhovedstaden for Den livlandske ridderordenen – den tyske korstogsmilitærordenen som kristnet det østlige Østersjøen på 1200-tallet. Den middelalderske Cēsis-borgen (påbegynt 1214) var en av Livlands mektigste festninger. Besøkende utforsker de mørke tårnene og fengslene ved hjelp av ekte håndholdte lykter – uten elektrisk lys. Den tilstøtende nye borgen (1784) huser byhistoriemuseet. Cēsis har et nydelig bevart historisk sentrum med en protestantisk kirke fra 1281."},
      "bauska": {"name": "Bauska og Sør-Latvia", "text": "Bauska (9 500 innbyggere), ved samløpet av elvene Mūsa og Mēmele 65 km sør for Riga, er porten til to av Latvias fineste historiske steder. Bauska borg (1443) vokter elvekrysset. Rundāle palass (17 km sør) er Latvias arkitektoniske juvél: bygget 1736–1740 for Ernst Johann von Biron, hertug av Courland, og tegnet av Bartolomeo Rastrelli – den samme arkitekten som Vinterpalasset og Katarinapalasset i Russland. Den forgylte Gyldne sal, den Hvite ballsal og den franske formalhagen er sammenlignbare med Versailles i barokk ambisjon."},
    }
  },
  "lithuania": {
    "overview": "Litauen er det største og mest sørlige av de baltiske statene, med 2,8 millioner innbyggere og Vilnius som hovedstad. På sitt middelalderlige høydepunkt var Storfyrstedømmet Litauen den største staten i Europa, og strakte seg fra Østersjøen til Svartehavet. Dette arvet er synlig i dag: Vilnius gamlebyen, et av de største bevarte middelalderlige bysentrene i Nord-Europa, ble bygget som en imperiehovedstad.\n\nLitauisk er ett av de mest arkaiske indoeuropeiske språkene som fortsatt tales: språkvitere bruker det til å rekonstruere proto-indoeuropeisk fordi litauisk bevarer grammatiske strukturer som finnes i sanskrit, men som er tapt i moderne europeiske språk.\n\nLitauen erklærte uavhengighet fra Sovjetunionen 11. mars 1990 – den første av alle Sovjet-republikkene. Det militære angrepet 13. januar 1991 drepte 14 sivile ved Vilnius TV-tårnet. Litauen var den siste hedenske staten i Europa: offisiell kristning kom først i 1387. Østersjøkysten er bare 99 km lang, men inkluderer den eksepsjonelle Kurlandhalvøya – et UNESCO verdensarvsted.",
    "stops": {
      "palanga": {"name": "Palanga og Kretinga", "text": "Palanga (17 000 fastboende) vokser til over 200 000 om sommeren som Litauens viktigste strandferested. Byen organiserer seg rundt den 470 meter lange trebryggen og den store parken tegnet i 1897 av den franske landskapsarkitekten Édouard André – den samme som tegnet deler av Champs-Élysées-hagene – over 101 hektar rundt Tiškevičiai-palasset. Palasset huser verdens største ravsamling: 28 000 gjenstander, inkludert et eksemplar på 3,5 kg og hundrevis med forhistoriske insekter. Birutė-åsen er et hedensk hellig sted der vestalske ildvoktersker holdt en evig flamme."},
      "klaipeda": {"name": "Klaipėda", "text": "Litauens eneste sjøhavn (152 000 innbyggere) var den tyske byen Memel det meste av sin historie, og ble litauisk i 1923. 22. mars 1939 ankom Adolf Hitler med krigsskip og holdt tale fra balkongen på Teatertorget og annekterte Memel. Bygningen Hitler talte fra står fortsatt; en plakette markerer balkongen. Den tyske Fachwerk-halvtrebygningsarkitekturen i gamlebyen overlevde krigen intakt. Det litauiske havmuseet på Smiltynė – nådd med gratis gangferge på 7 minutter – er Litauens mest besøkte museum: haikeveksler, sjøløve-forestillinger, delfiner og en 1800-talls stjernformet festning."},
      "curonian": {"name": "Kurlandhalvøya", "text": "Kurlandhalvøya (Kuršių Nerija) er en 97 km lang sandhalvøy, ingensteds bredere enn 3,8 km, som skiller Kurlagunen fra det åpne Østersjøen. Den er et UNESCO verdensarvsted (2000). På 1700- og 1800-tallet begravet ustabiliserte sanddyner fire landsbyer fullstendig. Det massive gjenplantingsarbeidet på 1800-tallet skapte furuskogen som nå dekker det meste av halvøyen. Europas høyeste vandresanddyner når 67 meter ved Parnidis-dynen sør for Nida – den russiske grensen er 200 meter lenger sør. Kurlagunen på østsiden er jevnt varmere og roligere enn det åpne Østersjøen, ideelt for barn. Thomas Mann tilbrakte tre somre (1930–1932) i Nida mens han skrev «Josef og hans brødre»."},
      "siauliai": {"name": "Šiauliai og Korshøyden", "text": "Šiauliai (100 000 innbyggere), Litauens fjerde største by, besøkes nesten utelukkende for Korshøyden 12 km nord. Stedet har vært brukt til fromhetsplassering av kors siden 1800-tallets begynnelse; praksisen intensiverte etter opprørene i 1831 og 1863. Sovjetmyndighetene bulldoserte åsen tre ganger (1961, 1973, 1975) og satte vakter. Innen dager var korset gjenoppbygd av lokalbefolkningen. Over 200 000 kors, krusfiks, Jomfru Maria-figurer og rosenkranser dekker nå hver kvadratcentimeter – og kimer sagte i vinden. Pave Johannes Paul II besøkte stedet 7. september 1993 og satte opp et kors selv."},
      "zemaitija": {"name": "Žemaitija og Samogitia", "text": "Den samogitiske høysletten i nordvest-Litauen er en særegen kulturell region kjent gjennom århundrer for sin befolknings stridbarhet – samogitene (Žemaičiai) motstod det tyske korstogangrepet lenger enn noen annen baltisk gruppe, og holdt hedendommen levende til slutten av 1300-tallet. Žemaitija nasjonalpark sentrerer seg rundt Plateliai-sjøen – Samogitias største innsjø (12,7 km², maks. dybde 49 m) – i et morene-landskap med eldgamle eikelunder. Tretten kilometer nord for Plateliai ligger Plokštinė museum for den kalde krigen i ekte underjordiske R-12 atomrakettsiloer, operative fra 1963 til 1978."},
      "kaunas": {"name": "Kaunas", "text": "Litauens nest største by (285 000 innbyggere) var landets midlertidige hovedstad fra 1919 til 1940 mens Vilnius var polsk. I løpet av disse to tiårene ble Kaunas bygget nesten fra bunnen av i funksjonalistisk og litauisk nasjonalromantisk stil, som UNESCO innskrev september 2023 som «Modernistisk Kaunas: Optimismens arkitektur, 1919–1939» – verdens nyeste store verdensarvsted. Laisvės Alėja (Frihetsgaten), den 2 km lange gangpromenaden, er byens åndelige sentrum. Kaunas huser M.K. Čiurlionis-museet med verdens største samling av Litauens mest kjente maler. Den niende fortet er Litauens viktigste Holocaust-minnested der over 50 000 mennesker ble myrdet 1941–44."},
      "vilnius": {"name": "Vilnius", "text": "Litauens hovedstad (575 000 innbyggere) har en av de største bevarte middelalderlige gamlebyene i Europa – et UNESCO verdensarvsted (1994) på 360 hektar med barokkkirker, universitetsgårdsplasser og smale brosteinsgate. Vilnius universitetet, grunnlagt i 1579, er ett av de eldste i Øst-Europa. Byens historie er eksepsjonelt kompleks: den har vært imperiehovedstad, polsk, kortvarig napoleonsk, russisk, polsk igjen (1920–1939), sovjetisk og selvstendig litauisk siden 1990. Det bohemske Užupis-kvarteret erklærte seg uavhengig som kunstnerrepublikk 1. april 1997, med sin egen president, en hær på tolv og en grunnlov oversatt til 75 språk."},
      "trakai": {"name": "Trakai", "text": "En liten by 28 km vest for Vilnius, Trakai var den middelalderlige hovedstaden i Storfyrstedømmet Litauen. Øyslottet på Galvė-sjøen – en gotisk mursteinsfestning på en naturlig øy forbundet med to trebroer – er det mest fotograferte slottet i Litauen. Trakai er også hjemsted for karaittene: en tyrkisk-jødisk gruppe brakt fra Krim som kongelige livvakter av Storhertug Vytautas rundt 1397. Under 300 karaitter finnes i dag; de bevarer egne bønnehus (knesaer), kibinaier (bakverk) og et kritisk truet tyrkisk-beslektet språk."},
      "elsewhere_lit": {"name": "Øvrige Litauen", "text": "Litauen har flere ekstraordinære steder litt utenfor kystruten. Orvydas-hagen nær Salantai er ett av de mest bemerkelsesverdige folkekunstomgivelsene i Europa: en privat eiendom dekket med hundrevis av religiøse stein- og treskulpturer, sovjet-militærutstyr og hedenske symboler – skapt over tiår av Vilius Orvydas (1952–1992) til tross for konstant sovjet-trakassering. Druskininkai, en kurbad i syd, inneholder Grūtas-parken – en skog fylt med fjernede sovjet-statuer på originalsokkler, omgitt av piggtråd og gulags vakttårn, lokalt kalt «Stalins verden». Stelmužė-eiken i nordøst antas å være 1 500–2 000 år gammel."},
    }
  },
  "poland": {
    "overview": "Polens Østersjøkyst – historisk Pommern – har skiftet hender mellom tyske, danske, svenske og polske makter gjennom århundrene. Den østlige delen vi besøker er den historisk mest ladede kyststrekken i Østersjøen. Andre verdenskrig begynte her: klokken 04:47 den 1. september 1939 åpnet det tyske treningsskipet Schleswig-Holstein ild mot den polske garnisonen på Westerplatte i Gdańsk havn. Førtien år senere undertegnet arbeidere augustavtalene i 1980 i samme bys Leninverft og skapte Solidarność – det første uavhengige sivilsamfunnsorganet i Sovjetblokken, som veltet kommunistisk styre over hele Øst-Europa innen 1989.\n\nGdańsk ble 90 prosent ødelagt i 1945. Den påfølgende gjenoppbyggingen – fasade for fasade fra historiske fotografier over tre tiår – er en av de mest trofaste byrestaureringene som noen gang er gjennomført.\n\nPoland bruker polsk zloty (PLN; ca. 4,25 PLN per euro). Engelsk er utbredt i Tresidet-området. Gdańsk-buktas vann er det varmeste langs hele Østersjøruten om sommeren: 21–23 °C i juli og august.",
    "stops": {
      "leba": {"name": "Łeba og Słowiński nasjonalpark", "text": "Łeba (3 500 fastboende) er en liten fiskeby som vokser til et stort sommerferiestead ved kanten av Słowiński nasjonalpark. Parken beskytter ett av Europas største aktive dynesystemer – naken hvit sand som avanserer 3–12 meter i året og begraver gammel skog. Dynene reiser seg til 40–50 meter og kan sees på lang avstand over tregrensene. Fem km fra Łeba, gjemt i kystskogen, ligger det tyske WWII-rakettprøvestedet fra 1943 der V-1-flygeblomber og de første guidede missilene ble testet."},
      "gdansk": {"name": "Gdańsk", "text": "Polens maritime hovedstad (480 000 innbyggere) var en av de viktigste hansabyene fra 1361 til 1669. Kongsgaten løper fra Gullporten gjennom Długa-gaten og Langtorget til Grønnporten: 750 meter av en av Nord-Europas vakreste bygateprofiler, nesten alle fasader gjenoppbygd fra historiske fotografier etter krigen. Gdańsk-kranen (Żuraw, 1444) er den største bevarte treportskranen fra middelalderens Europa. European Solidarity Centre (2014) reiser seg ved porten til det tidligere Leninverftet der Solidarność ble grunnlagt; i den tilstøtende BHP-hallen ble augustavtalene fra 1980 undertegnet – det opprinnelige forhandlingsbordet er fortsatt der."},
      "sopot": {"name": "Sopot", "text": "Den minste av Trisidet-kommunene (37 000 innbyggere) har vært et strandferiestead siden en napoleonsk offiser åpnet sjøbadetablissement her i 1823. Den 511 meter lange trebryggen – Europas lengste – ble først bygget i 1827. Grand Hotel Sofitel (1927) huset både Hitler og Mussolini på 1930-tallet, og etter krigen alle større verdensledere på statsbesøk til Polen. Skogsoperaen (Opera Leśna, 1909) er bygget inn i et naturlig furu-amfiteater med sitteplass for 5 000 – ett av Europas mest akustisk enestående utendørskonsertsteder. Krzywy Domek (2004) er ett av Polens mest fotograferte bygninger."},
      "gdynia": {"name": "Gdynia", "text": "Polens yngste storby (250 000 innbyggere) var en fiskerby med 1 200 innbyggere i 1918; innen 1939 var den en av Østersjøens travleste havner, bygget fra bunnen av i funksjonalistisk og Art Deco-stil. Søndre kai huser Emigrasjonsmuseet i det restaurerte 1933-terminalen: den samme bygningen som to millioner migranter passerte gjennom på vei til Amerika mellom krigene. Like ved ligger det navale museum, WWII-jageren ORP Błyskawica og det tremaststede treningsskipet Dar Pomorza (1909)."},

const INFO_PHOTO_CACHE = {};
async function loadInfoPhotos() {
  const toFetch = [];
  for (const stops of Object.values(INFO_PHOTOS)) {
    for (const photo of Object.values(stops)) {
      if (photo.wiki && !INFO_PHOTO_CACHE[photo.wiki]) toFetch.push(photo);
    }
  }
  await Promise.allSettled(toFetch.map(async photo => {
    try {
      const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(photo.wiki)}`);
      if (!r.ok) return;
      const d = await r.json();
      if (d.thumbnail?.source) INFO_PHOTO_CACHE[photo.wiki] = d.thumbnail.source;
      else if (d.originalimage?.source) INFO_PHOTO_CACHE[photo.wiki] = d.originalimage.source;
    } catch(e) {}
  }));
  // Fill placeholders in-place (preserves open/closed state of sections)
  document.querySelectorAll('.info-photo-wrap[data-wiki]').forEach(el => {
    const src = INFO_PHOTO_CACHE[el.dataset.wiki];
    if (src) {
      el.removeAttribute('data-wiki');
      el.innerHTML = `<img src="${src}" style="width:100%;display:block;object-fit:cover;max-height:190px" loading="lazy" onerror="this.parentNode.style.display='none'" alt="${el.dataset.caption}"><div style="font-size:11px;color:var(--txt3);padding:5px 10px;line-height:1.4">${el.dataset.caption}</div>`;
    }
  });
}

function infoPhoto(photo){
  const src=photo.wiki?INFO_PHOTO_CACHE[photo.wiki]:(photo.url||'');
  if(!src&&photo.wiki)return`<div class="info-photo-wrap" style="margin:0 16px 12px;border-radius:10px;overflow:hidden;background:var(--bg3);min-height:8px" data-wiki="${photo.wiki}" data-caption="${photo.caption}"></div>`;
  if(!src)return'';
  return `<div class="info-photo-wrap" style="margin:0 16px 12px;border-radius:10px;overflow:hidden;background:var(--bg3)"><img src="${src}" style="width:100%;display:block;object-fit:cover;max-height:190px" loading="lazy" onerror="this.parentNode.style.display='none'" alt="${photo.caption}"><div style="font-size:11px;color:var(--txt3);padding:5px 10px;line-height:1.4">${photo.caption}</div></div>`;
}
function renderInfo() {
  const list = document.getElementById('info-list');
  if (!list) return;
  const data = INFO_DATA[infoCountry];
  if (!data) return;
  const dataNO = INFO_DATA_NO[infoCountry];
  const useNO = lang === 'no';
  
  let html = '';
  const ph = INFO_PHOTOS[infoCountry] || {};
  const overview = useNO && dataNO ? dataNO.overview : data.overview;
  html += `<div class="info-overview">${overview}</div>`;
  if (ph._overview) html += infoPhoto(ph._overview);
  
  // City stops
  data.stops.forEach(stop => {
    const entries = ENTRIES.filter(e => e.co === infoCountry && stop.regions.includes(e.re));
    if (!entries.length && !stop.text) return;
    const stopNO = useNO && dataNO && dataNO.stops[stop.id];
    const stopName = stopNO ? stopNO.name : stop.name;
    const stopText = stopNO ? stopNO.text : stop.text;
    html += `<details class="info-stop">
      <summary>${stopName} <span class="info-stop-arrow">▶</span></summary>
      <div class="info-stop-body">
        ${ph[stop.id] ? infoPhoto(ph[stop.id]) : ''}
        <div class="info-city-text">${stopText}</div>`;
    entries.forEach(e => {
      const text = (lang==='no'&&(LO_NO[e.id]||e.s_no)) ? (LO_NO[e.id]||e.s_no) : (e.lo || e.s || '');
      const wiki = WIKI[e.id];
      html += `<div class="info-entry">
          <div class="info-entry-name">
            <span class="info-entry-dot" style="background:${COUNTRY_COLOR[e.co]}"></span>
            ${getName(e)}
          </div>
          ${text ? `<div class="info-entry-text">${text}</div>` : ''}
          <div class="info-entry-footer">
            ${wiki ? `<a class="info-wiki" href="${wiki}" target="_blank" rel="noopener">📖 Wikipedia</a>` : ''}
            <span class="entry-id">#${ENTRY_NUMS.get(e.id).toString().padStart(3,'0')}</span><span class="score-badge" style="color:${scoreColor(matchScore(e))}">${matchScore(e)}${t('pct_match')}</span>
            <button class="info-open-explore" data-explore-id="${e.id}">📋 Details</button>
            <button class="info-plan-btn${onPlan(e.id)?' on-plan':''}" data-plan-id="${e.id}">${onPlan(e.id)?t('on_plan'):t('add_plan')}</button>
          </div>
        </div>`;
    });
    html += `</div></details>`;
  });
  list.innerHTML = html;
}

function goBackFromInfo() {
  const pv = infoPrevView;
  const pe = infoPrevEntry;
  infoPrevView = null;
  infoPrevEntry = null;
  const btn = document.getElementById('info-back-btn');
  if (btn) btn.style.display = 'none';
  if (pv) showView(pv);
  if (pe) setTimeout(() => openSheet(pe), 150);
}

function showInfo(id) {
  const e = ENTRIES.find(x => x.id === id);
  if (!e) return;
  // Remember where we came from and which entry was open
  const activeScreen = document.querySelector('.screen.active');
  infoPrevView = activeScreen ? activeScreen.id.replace('screen-', '') : null;
  infoPrevEntry = sheetEntry || null;
  closeSheet();
  showView('info');
  // Show back button if we came from somewhere
  const backBtn = document.getElementById('info-back-btn');
  if (backBtn) backBtn.style.display = infoPrevView && infoPrevView !== 'info' ? 'block' : 'none';
  setInfoCountry(e.co === 'all' ? 'estonia' : e.co);
  setTimeout(() => {
    // Find and open the correct details element
    const allDetails = document.querySelectorAll('.info-stop');
    allDetails.forEach(det => {
      const btn = det.querySelector(`[data-explore-id="${id}"]`);
      if (btn) {
        det.open = true;
        const ent = btn.closest('.info-entry');
        ent.scrollIntoView({behavior:'smooth', block:'center'});
        ent.classList.add('hl');
        setTimeout(()=>ent.classList.remove('hl'), 1800);
      }
    });
  }, 200);
}

// Info country tab clicks + explore button delegation
document.addEventListener('click', e => {
  const tab = e.target.closest('.info-co-tab');
  if (tab) { setInfoCountry(tab.dataset.co); return; }
  const eb = e.target.closest('.info-open-explore');
  if (eb) {
    const entry = ENTRIES.find(x => x.id === eb.dataset.exploreId);
    if (entry) { openSheet(entry); }
  }
  const pb = e.target.closest('.info-plan-btn');
  if (pb) {
    togglePlan(pb.dataset.planId);
    const inPlan = onPlan(pb.dataset.planId);
    pb.textContent = inPlan ? t('on_plan') : t('add_plan');
    pb.classList.toggle('on-plan', inPlan);
  }
});

// ─── TIC-TAC-TOE ────────────────────────────────────────────────────
let ttt;
const TTT_WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function tttInit(){ttt={board:Array(9).fill(null),turn:0,score:[0,0,0],done:false};}
function tttClick(i){
  if(ttt.done||ttt.board[i])return;
  ttt.board[i]=ttt.turn===0?'X':'O';
  const w=tttCheck();
  if(w){ttt.score[ttt.turn]++;ttt.done=true;}
  else if(!ttt.board.includes(null)){ttt.score[2]++;ttt.done=true;}
  else ttt.turn^=1;
  renderGames();
}
function tttCheck(){
  for(const[a,b,c]of TTT_WINS){
    if(ttt.board[a]&&ttt.board[a]===ttt.board[b]&&ttt.board[a]===ttt.board[c])return[a,b,c];
  }return null;
}
function renderTtt(){
  const w=tttCheck();
  const winSet=new Set(w||[]);
  const status=ttt.done?(w?(ttt.turn===0?gs('ttt_x_wins'):gs('ttt_o_wins')):gs('draw')):(ttt.turn===0?gs('ttt_x_turn'):gs('ttt_o_turn'));
  const board=ttt.board.map((v,i)=>`<div class="ttt-cell ${v?v.toLowerCase():''} ${winSet.has(i)?'win':''}" onclick="tttClick(${i})">${v||''}</div>`).join('');
  const score=`<div class="game-score"><div>✕ <span>${ttt.score[0]}</span></div><div>${gs('ttt_draws')} <span>${ttt.score[2]}</span></div><div>○ <span>${ttt.score[1]}</span></div></div>`;
  document.getElementById('games-content').innerHTML=gameWrap(
    `${score}<div class="game-status">${status}</div><div class="ttt-board">${board}</div>`,
    ttt.done?`<button class="game-btn game-btn-primary" onclick="tttInit();renderGames()">${gs('new_game')}</button>`:''
  );
}

// ─── CONNECT FOUR ────────────────────────────────────────────────────
let c4;
function c4Init(){c4={board:Array(42).fill(0),turn:1,score:[0,0],done:false,win:[]};}
function c4Drop(col){
  if(c4.done)return;
  for(let r=5;r>=0;r--){const i=r*7+col;if(!c4.board[i]){c4.board[i]=c4.turn;break;}}
  const w=c4Check();
  if(w){c4.score[c4.turn-1]++;c4.done=true;c4.win=w;}
  else if(!c4.board.includes(0))c4.done=true;
  else c4.turn=c4.turn===1?2:1;
  renderGames();
}
function c4Check(){
  const b=c4.board,dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let r=0;r<6;r++)for(let c=0;c<7;c++){
    const i=r*7+c;if(!b[i])continue;
    for(const[dc,dr]of dirs){
      const cells=[i];
      for(let k=1;k<4;k++){const nr=r+dr*k,nc=c+dc*k;if(nr<0||nr>5||nc<0||nc>6)break;cells.push(nr*7+nc);}
      if(cells.length===4&&cells.every(x=>b[x]===b[i]))return cells;
    }
  }return null;
}
function renderC4(){
  const winSet=new Set(c4.win);
  const status=c4.done?(c4.win.length?(c4.turn===1?gs('p1_wins'):gs('p2_wins')):gs('draw')):(c4.turn===1?gs('p1_turn'):gs('p2_turn'));
  let cols='';
  for(let col=0;col<7;col++){
    let cells='';
    for(let r=0;r<6;r++){const i=r*7+col;const v=c4.board[i];cells+=`<div class="c4-cell ${v?'p'+v:''} ${winSet.has(i)?'win':''}"></div>`;}
    cols+=`<div class="c4-col-btn" onclick="c4Drop(${col})">${cells}</div>`;
  }
  const score=`<div class="game-score"><div>🔴 P1 <span>${c4.score[0]}</span></div><div>🟡 P2 <span>${c4.score[1]}</span></div></div>`;
  document.getElementById('games-content').innerHTML=gameWrap(
    `${score}<div class="game-status">${status}</div><div class="c4-board">${cols}</div>`,
    c4.done?`<button class="game-btn game-btn-primary" onclick="c4Init();renderGames()">${gs('new_game')}</button>`:''
  );
}

// ─── DOTS & BOXES ────────────────────────────────────────────────────
let dab;
const DAB_SIZE=4;
function dabInit(){
  dab={h:Array((DAB_SIZE+1)*DAB_SIZE).fill(0),v:Array(DAB_SIZE*(DAB_SIZE+1)).fill(0),
       boxes:Array(DAB_SIZE*DAB_SIZE).fill(0),turn:1,score:[0,0],done:false};
}
function dabClickH(idx){dabClick('h',idx);}
function dabClickV(idx){dabClick('v',idx);}
function dabClick(type,idx){
  if(dab.done)return;
  const arr=type==='h'?dab.h:dab.v;
  if(arr[idx])return;
  arr[idx]=dab.turn;
  const scored=dabCheckBoxes();
  const total=DAB_SIZE*DAB_SIZE;
  if(dab.score[0]+dab.score[1]===total)dab.done=true;
  else if(!scored)dab.turn=dab.turn===1?2:1;
  renderGames();
}
function dabCheckBoxes(){
  let scored=false;
  for(let r=0;r<DAB_SIZE;r++)for(let c=0;c<DAB_SIZE;c++){
    const bi=r*DAB_SIZE+c;
    if(dab.boxes[bi])continue;
    const top=dab.h[r*DAB_SIZE+c],bot=dab.h[(r+1)*DAB_SIZE+c],
          lft=dab.v[r*(DAB_SIZE+1)+c],rgt=dab.v[r*(DAB_SIZE+1)+c+1];
    if(top&&bot&&lft&&rgt){dab.boxes[bi]=dab.turn;dab.score[dab.turn-1]++;scored=true;}
  }
  return scored;
}
function renderDab(){
  const CELL=56,DOT=10,HALF=DOT/2;
  const W=DAB_SIZE*CELL+DOT,H=DAB_SIZE*CELL+DOT;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block;margin:0 auto;touch-action:none">`;
  for(let r=0;r<DAB_SIZE;r++)for(let c=0;c<DAB_SIZE;c++){
    const bi=r*DAB_SIZE+c;
    if(dab.boxes[bi]){
      const clr=dab.boxes[bi]===1?'rgba(232,87,26,.25)':'rgba(26,92,168,.25)';
      svg+=`<rect x="${HALF+c*CELL}" y="${HALF+r*CELL}" width="${CELL}" height="${CELL}" fill="${clr}"/>`;
    }
  }
  for(let r=0;r<=DAB_SIZE;r++)for(let c=0;c<DAB_SIZE;c++){
    const idx=r*DAB_SIZE+c;const v=dab.h[idx];
    const x1=HALF+c*CELL,y1=HALF+r*CELL,x2=x1+CELL;
    const clr=v===1?'#e8571a':v===2?'#1a5ca8':'#ddd';const sw=v?5:4;
    svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y1}" stroke="${clr}" stroke-width="${sw}" stroke-linecap="round" style="cursor:pointer" onclick="dabClickH(${idx})"/>`;
    if(!v)svg+=`<rect x="${x1}" y="${y1-8}" width="${CELL}" height="16" fill="transparent" onclick="dabClickH(${idx})"/>`;
  }
  for(let r=0;r<DAB_SIZE;r++)for(let c=0;c<=DAB_SIZE;c++){
    const idx=r*(DAB_SIZE+1)+c;const v=dab.v[idx];
    const x1=HALF+c*CELL,y1=HALF+r*CELL,y2=y1+CELL;
    const clr=v===1?'#e8571a':v===2?'#1a5ca8':'#ddd';const sw=v?5:4;
    svg+=`<line x1="${x1}" y1="${y1}" x2="${x1}" y2="${y2}" stroke="${clr}" stroke-width="${sw}" stroke-linecap="round" style="cursor:pointer" onclick="dabClickV(${idx})"/>`;
    if(!v)svg+=`<rect x="${x1-8}" y="${y1}" width="16" height="${CELL}" fill="transparent" onclick="dabClickV(${idx})"/>`;
  }
  for(let r=0;r<=DAB_SIZE;r++)for(let c=0;c<=DAB_SIZE;c++){
    svg+=`<circle cx="${HALF+c*CELL}" cy="${HALF+r*CELL}" r="5" fill="#2c1810"/>`;
  }
  for(let r=0;r<DAB_SIZE;r++)for(let c=0;c<DAB_SIZE;c++){
    const bi=r*DAB_SIZE+c;
    if(dab.boxes[bi]){
      const clr=dab.boxes[bi]===1?'#e8571a':'#1a5ca8';
      svg+=`<text x="${HALF+c*CELL+CELL/2}" y="${HALF+r*CELL+CELL/2+5}" text-anchor="middle" fill="${clr}" font-weight="700" font-size="18">${dab.boxes[bi]===1?'A':'B'}</text>`;
    }
  }
  svg+='</svg>';
  const status=dab.done?(dab.score[0]>dab.score[1]?gs('pa_wins'):dab.score[1]>dab.score[0]?gs('pb_wins'):gs('draw')):(dab.turn===1?gs('pa_turn'):gs('pb_turn'));
  const score=`<div class="game-score"><div>🔴 A <span>${dab.score[0]}</span></div><div>🔵 B <span>${dab.score[1]}</span></div></div>`;
  document.getElementById('games-content').innerHTML=gameWrap(
    `${score}<div class="game-status">${status}</div>${svg}`,
    dab.done?`<button class="game-btn game-btn-primary" onclick="dabInit();renderGames()">${gs('new_game')}</button>`:''
  );
}

let nim;
const NIM_START=21;
function nimInit(){nim={stones:NIM_START,turn:1,score:[0,0],done:false,msg:''};}
function nimTake(n){
  if(nim.done||n<1||n>3||n>nim.stones)return;
  nim.stones-=n;
  if(nim.stones===0){
    nim.score[nim.turn-1]++;

    nim.done=true;
  } else {
    nim.turn=nim.turn===1?2:1;
    nim.msg='';

}

// ─── BATTLESHIP ──────────────────────────────────────────────────────
let bs;
const BS_SHIPS=[{id:'C',name:'Carrier',size:5},{id:'B',name:'Battleship',size:4},{id:'D',name:'Destroyer',size:3},{id:'S',name:'Submarine',size:3},{id:'P',name:'Patrol',size:2}];
function bshipInit(){
  bs={phase:'setup',player:1,horiz:true,selShip:0,
    grids:[null,{placed:[],shots:[]},{placed:[],shots:[]}]};
}
function bshipFlip(){bs.horiz=!bs.horiz;renderGames();}
function bshipSelShip(i){bs.selShip=i;renderGames();}
function bshipPlace(x,y){
  const g=bs.grids[bs.player];
  const ship=BS_SHIPS[bs.selShip];
  if(g.placed.find(s=>s.id===ship.id))return;
  const cells=bshipCells(x,y,ship.size,bs.horiz);
  if(!cells||cells.some(([cx,cy])=>g.placed.some(s=>bshipCells(s.x,s.y,s.size,s.h).some(([sx,sy])=>sx===cx&&sy===cy))))return;
  g.placed.push({id:ship.id,name:ship.name,size:ship.size,x,y,h:bs.horiz,cells});
  if(g.placed.length===BS_SHIPS.length){
    if(bs.player===1){bs.phase='privacy1';bs.player=2;}
    else{bs.phase='privacy2';}
  } else {
    bs.selShip=g.placed.length;
  }
  renderGames();
}
function bshipCells(x,y,size,h){
  const cells=[];
  for(let i=0;i<size;i++){const cx=h?x+i:x,cy=h?y:y+i;if(cx>9||cy>9)return null;cells.push([cx,cy]);}
  return cells;
}
function bshipReveal(from){bs.phase=from==='privacy1'?'setup':'play';bs.player=from==='privacy1'?2:1;renderGames();}
function bshipShoot(x,y){
  if(bs.phase!=='play')return;
  const shooter=bs.player,target=bs.player===1?2:1;
  const g=bs.grids[shooter];
  if(g.shots.find(s=>s.x===x&&s.y===y))return;
  const hit=bs.grids[target].placed.some(s=>s.cells.some(([cx,cy])=>cx===x&&cy===y));
  g.shots.push({x,y,hit});
  const sunk=bs.grids[target].placed.filter(s=>s.cells.every(([cx,cy])=>g.shots.some(sh=>sh.hit&&sh.x===cx&&sh.y===cy)));
  if(sunk.length===BS_SHIPS.length){bs.phase='gameover';bs.winner=bs.player;renderGames();return;}
  bs.phase='passto'+target;
  renderGames();
}
function bshipPassTo(p){bs.phase='play';bs.player=p;renderGames();}
function bshipGridHTML(player,forShooting,shooter){
  let html='<div class="bship-grid">';
  for(let y=0;y<10;y++)for(let x=0;x<10;x++){
    let cls='bship-cell';
    const shots=shooter?bs.grids[shooter].shots:[];
    const shot=shots.find(s=>s.x===x&&s.y===y);
    const isShip=forShooting?false:bs.grids[player].placed.some(s=>s.cells.some(([cx,cy])=>cx===x&&cy===y));
    if(shot){
      const hitShip=bs.grids[player].placed.find(s=>s.cells.some(([cx,cy])=>cx===x&&cy===y));
      if(hitShip&&hitShip.cells.every(([cx,cy])=>shots.some(sh=>sh.hit&&sh.x===cx&&sh.y===cy)))cls+=' sunk';
      else cls+=shot.hit?' hit':' miss';
    } else if(isShip) cls+=' ship';
    const onclick=forShooting?`onclick="bshipShoot(${x},${y})"`:
      (bs.phase==='setup'?`onclick="bshipPlace(${x},${y})"`:'' );
    html+=`<div class="${cls}" ${onclick}></div>`;
  }
  return html+'</div>';
}
function bshipShipName(ship){const k={Carrier:'carrier',Battleship:'battleship',Destroyer:'destroyer',Submarine:'submarine',Patrol:'patrol'};return gs('bship_ship_'+(k[ship.name]||ship.name.toLowerCase()));}
function renderBship(){
  const el=document.getElementById('games-content');
  if(bs.phase==='setup'){
    const g=bs.grids[bs.player];
    const ship=BS_SHIPS[bs.selShip]||BS_SHIPS[0];
    const shipBtns=BS_SHIPS.map((s,i)=>`<button class="bship-ship-btn ${bs.selShip===i&&!g.placed.find(p=>p.id===s.id)?'active':''} ${g.placed.find(p=>p.id===s.id)?'placed':''}" onclick="bshipSelShip(${i})">${bshipShipName(s)} (${s.size})</button>`).join('');
    el.innerHTML=gameWrap(`
      <div class="game-status">${gs('bship_place',bs.player,bshipShipName(ship),ship.size)}</div>
      <div class="bship-ships">${shipBtns}</div>
      <div class="bship-grids">
        <div><div class="bship-label">${gs('bship_your')}</div>${bshipGridHTML(bs.player,false,null)}</div>
      </div>
      <div class="game-btn-row" style="margin-top:4px">
        <button class="game-btn game-btn-secondary" onclick="bshipFlip()">${bs.horiz?gs('horiz'):gs('vert')}</button>
      </div>`);
  } else if(bs.phase==='privacy1'||bs.phase==='privacy2'){
    const next=bs.phase==='privacy1'?2:1;
    const msg=bs.phase==='privacy1'?gs('bship_p1_done'):gs('bship_both_ready');
    el.innerHTML=gameWrap(`<div class="privacy-screen">
      <div class="big-icon">🙈</div>
      <h2>${gs('bship_look_away',next===2?1:2)}</h2>
      <p>${msg}</p>
      <button class="game-btn game-btn-primary" onclick="bshipReveal('${bs.phase}')">${gs('bship_i_ready',next)}</button>
    </div>`);
  } else if(bs.phase.startsWith('passto')){
    const to=parseInt(bs.phase.slice(-1));
    el.innerHTML=gameWrap(`<div class="privacy-screen">
      <div class="big-icon">🙈</div>
      <h2>${gs('bship_pass_to',to)}</h2>
      <p>${gs('bship_look_while',to===1?2:1,to)}</p>
      <button class="game-btn game-btn-primary" onclick="bshipPassTo(${to})">${gs('bship_i_ready',to)}</button>
    </div>`);
  } else if(bs.phase==='play'){
    const target=bs.player===1?2:1;
    const hits=bs.grids[bs.player].shots.filter(s=>s.hit).length;
    const sunk=bs.grids[target].placed.filter(s=>s.cells.every(([cx,cy])=>bs.grids[bs.player].shots.some(sh=>sh.hit&&sh.x===cx&&sh.y===cy))).length;
    el.innerHTML=gameWrap(`
      <div class="game-status">${gs('bship_shoot',bs.player,target)}</div>
      <div class="game-score"><div>${gs('bship_hits')} <span>${hits}</span></div><div>${gs('bship_sunk')} <span>${sunk}/${BS_SHIPS.length}</span></div></div>
      <div class="bship-grids">
        <div><div class="bship-label">${gs('bship_enemy_sea',target)}</div>${bshipGridHTML(target,true,bs.player)}</div>
      </div>`);
  } else if(bs.phase==='gameover'){
    el.innerHTML=gameWrap(`<div class="privacy-screen">
      <div class="big-icon">🏆</div>
      <h2>${gs('bship_wins',bs.winner)}</h2>
      <p>${gs('bship_sunk_all',bs.winner===1?2:1)}</p>
    </div>`,`<button class="game-btn game-btn-primary" onclick="bshipInit();renderGames()">${gs('new_game')}</button>`);
  }
}


// ─── MASTERMIND ─────────────────────────────────────────────────────
let mm;
const MM_COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
function mmInit(){
  mm={code:[],guess:[null,null,null,null],guesses:[],phase:'setup',selSlot:0,done:false};
}
function mmSetCode(i){
  if(mm.code.length<4){mm.code.push(i);if(mm.code.length===4){mm.phase='privacy';renderGames();return;}}
  renderGames();
}
function mmReveal(){mm.phase='play';renderGames();}
function mmSelSlot(i){mm.selSlot=i;renderGames();}
function mmSetColor(ci){
  mm.guess[mm.selSlot]=ci;
  if(mm.selSlot<3)mm.selSlot++;
  renderGames();
}
function mmSubmit(){
  if(mm.guess.includes(null))return;
  const g=mm.guess.slice(),c=mm.code.slice();
  let blacks=0,whites=0;
  const gu=[...g],cu=[...c];
  for(let i=3;i>=0;i--){if(gu[i]===cu[i]){blacks++;gu.splice(i,1);cu.splice(i,1);}}
  for(const x of gu){const j=cu.indexOf(x);if(j>=0){whites++;cu.splice(j,1);}}
  mm.guesses.push({colors:g,blacks,whites});
  if(blacks===4){mm.done=true;mm.phase='won';}
  else if(mm.guesses.length>=10){mm.done=true;mm.phase='lost';}
  else{mm.guess=[null,null,null,null];mm.selSlot=0;}
  renderGames();
}
function renderMM(){
  const el=document.getElementById('games-content');
  if(mm.phase==='setup'){
    const sofar=mm.code.map(i=>`<div class="mm-code-peg" style="background:${MM_COLORS[i]};width:36px;height:36px;border-radius:50%;flex-shrink:0"></div>`).join('');
    const empty=Array(4-mm.code.length).fill(`<div class="mm-code-peg" style="background:var(--bg3);width:36px;height:36px;border-radius:50%;border:2px solid var(--bg4)"></div>`).join('');
    el.innerHTML=gameWrap(`
      <div class="game-status">${gs('mm_setup_title')}</div>
      <div style="display:flex;gap:8px;justify-content:center;padding:8px">${sofar}${empty}</div>
      <div class="mm-colors">${MM_COLORS.map((c,i)=>`<div class="mm-color-btn" style="background:${c}" onclick="mmSetCode(${i})"></div>`).join('')}</div>
      ${mm.code.length>0?`<div class="game-btn-row"><button class="game-btn game-btn-secondary" onclick="mm.code=[];renderGames()">${gs('mm_clear')}</button></div>`:''}`);
  } else if(mm.phase==='privacy'){
    el.innerHTML=gameWrap(`<div class="privacy-screen">
      <div class="big-icon">🔐</div>
      <h2>${gs('mm_privacy_title')}</h2>
      <p>${gs('mm_privacy_msg')}</p>
      <button class="game-btn game-btn-primary" onclick="mmReveal()">${gs('mm_reveal',2)}</button>
    </div>`);
  } else {
    const rows=mm.guesses.map(g=>{
      const pegs=g.colors.map(i=>`<div class="mm-peg" style="background:${MM_COLORS[i]}"></div>`).join('');
      const fbPegs=Array(4).fill(0).map((_,i)=>`<div class="mm-fb-peg ${i<g.blacks?'black':i<g.blacks+g.whites?'white':''}"></div>`).join('');
      return `<div class="mm-row">${pegs}<div class="mm-feedback">${fbPegs}</div></div>`;
    }).join('');
    const curRow=mm.done?'':mm.guess.map((v,i)=>`<div class="mm-peg ${mm.selSlot===i?'active-slot':''}" style="background:${v!==null?MM_COLORS[v]:'var(--bg3)'}" onclick="mmSelSlot(${i})"></div>`).join('');
    const colorPicker=mm.done?'':`<div class="mm-colors">${MM_COLORS.map((c,i)=>`<div class="mm-color-btn" style="background:${c};opacity:${mm.done?0.5:1}" onclick="mmSetColor(${i})"></div>`).join('')}</div>`;
    const submitBtn=mm.done?'':(!mm.guess.includes(null)?`<button class="game-btn game-btn-primary" onclick="mmSubmit()">${gs('mm_submit')}</button>`:'');
    let status='';
    if(mm.phase==='won')status=gs('mm_won',mm.guesses.length);
    else if(mm.phase==='lost'){const codeDisp=mm.code.map(i=>`<span style="color:${MM_COLORS[i]};font-weight:900">●</span>`).join(' ');status=gs('mm_lost')+' '+codeDisp;}
    else status=gs('mm_turn',mm.guesses.length+1,10);
    el.innerHTML=gameWrap(`
      <div class="game-status">${status}</div>
      <div class="mm-board">${rows}${mm.done?'':` <div class="mm-row">${curRow}<div class="mm-feedback"></div></div>`}</div>
      ${colorPicker}
      <div class="game-btn-row">${submitBtn}</div>`,
      mm.done?`<button class="game-btn game-btn-primary" onclick="mmInit();renderGames()">${gs('new_game')}</button>`:''
    );
  }
}

// ─── BALTIC QUIZ ─────────────────────────────────────────────────────
let qz;
function quizInit(){
  qz={qs:generateQuiz(12),cur:0,score:0,answered:false,chosen:-1};
  renderGames();
}
function generateQuiz(n){
  const pool=ENTRIES.filter(e=>e.n&&e.s&&e.co!=='all');
  const cos=['estonia','latvia','lithuania','poland'];
  const cn=lang==='no'?{estonia:'Estland',latvia:'Latvia',lithuania:'Litauen',poland:'Polen'}:{estonia:'Estonia',latvia:'Latvia',lithuania:'Lithuania',poland:'Poland'};
  const ds=e=>(lang==='no'&&e.s_no)?e.s_no:e.s;
  const sh=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
  const cands=[];
  for(const e of sh(pool).slice(0,80)){
    const wrong=sh(cos.filter(c=>c!==e.co)).slice(0,3);
    const opts=sh([e.co,...wrong]);
    cands.push({q:gs('quiz_q_country',getName(e)),opts:opts.map(c=>cn[c]),ans:opts.indexOf(e.co),fact:ds(e).length>110?ds(e).slice(0,107)+'…':ds(e)});
  }
  for(const e of sh(pool).slice(0,80)){
    const desc=ds(e).length>130?ds(e).slice(0,127)+'…':ds(e);
    const wrong=sh(pool.filter(x=>x.id!==e.id&&x.co===e.co)).slice(0,3);
    if(wrong.length<3)continue;
    const opts=sh([e,...wrong]);
    cands.push({q:desc,opts:opts.map(x=>getName(x)),ans:opts.findIndex(x=>x.id===e.id),fact:'📍 '+e.re+', '+cn[e.co]});
  }
  for(const co of sh(cos)){
    const inC=pool.filter(e=>e.co===co),outC=pool.filter(e=>e.co!==co);
    for(let k=0;k<8;k++){
      const odd=sh(outC)[0],rest=sh(inC).slice(0,3);
      if(!odd||rest.length<3)break;
      const opts=sh([odd,...rest]);
      cands.push({q:gs('quiz_q_notin',cn[co]),opts:opts.map(x=>getName(x)),ans:opts.findIndex(x=>x.id===odd.id),fact:gs('quiz_actually_in',getName(odd),cn[odd.co])});
    }
  }
  return sh(cands).slice(0,n);
}
function quizAnswer(i){
  if(qz.answered)return;
  qz.answered=true;qz.chosen=i;
  if(i===qz.qs[qz.cur].ans)qz.score++;
  renderGames();
}
function quizNext(){
  qz.cur++;qz.answered=false;qz.chosen=-1;
  renderGames();
}
function renderQuiz(){
  const el=document.getElementById('games-content');
  if(qz.cur>=qz.qs.length){
    const pct=Math.round(qz.score/qz.qs.length*100);
    const msg=pct===100?gs('quiz_perfect'):pct>=80?gs('quiz_excellent'):pct>=60?gs('quiz_good'):gs('quiz_keep');
    el.innerHTML=gameWrap(`<div class="privacy-screen">
      <div class="big-icon">🏆</div>
      <h2>${msg}</h2>
      <div style="font-size:32px;font-weight:900;color:var(--accent)">${qz.score}/${qz.qs.length}</div>
      <p style="font-size:14px;color:var(--txt2)">${pct}% ${gs('quiz_correct')}</p>
    </div>`,`<button class="game-btn game-btn-primary" onclick="quizInit()">${gs('quiz_new')}</button>`);
    return;
  }
  const q=qz.qs[qz.cur];
  const dots=qz.qs.map((_,i)=>`<div class="quiz-dot ${i<qz.cur?'done':i===qz.cur?'current':''}"></div>`).join('');
  const opts=q.opts.map((o,i)=>{
    let cls='quiz-opt';
    if(qz.answered){if(i===q.ans)cls+=' correct';else if(i===qz.chosen&&i!==q.ans)cls+=' wrong';}
    return `<button class="${cls}" onclick="quizAnswer(${i})" ${qz.answered?'disabled':''}>${o}</button>`;
  }).join('');
  const fact=qz.answered?`<div style="font-size:12px;color:var(--txt3);text-align:center;padding:4px 0;line-height:1.4">${q.fact}</div>`:'';
  const scoreBar=`<div class="game-score"><div>${gs('quiz_score')} <span>${qz.score}</span></div><div>Q ${qz.cur+1}/${qz.qs.length}</div><div>${pct_so_far(qz.score,qz.cur)}</div></div>`;
  el.innerHTML=gameWrap(`
    ${scoreBar}
    <div class="quiz-progress">${dots}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">${opts}</div>
    ${fact}`,
    qz.answered?`<button class="game-btn game-btn-primary" onclick="quizNext()">${qz.cur<qz.qs.length-1?'Next →':'See results'}</button>`:''
  );
}
function pct_so_far(score,cur){if(cur===0)return'–';return Math.round(score/cur*100)+'% '+gs('quiz_correct');}
