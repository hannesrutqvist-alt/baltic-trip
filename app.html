<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffc3ac">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Boba-Baltic 26">
<title>Boba-Baltic 26</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff8f4;--bg2:#ffeee6;--bg3:#ffddd0;--bg4:#ffc3ac;
  --txt:#2c1810;--txt2:#7a4030;--txt3:#b07060;
  --accent:#e8571a;--accent2:#c94510;
  --green:#1a7a50;--amber:#c47a10;--red:#c03020;
  --mapblue:#2a6bbf;
  --est:#1a7a50;--lat:#1a5ca8;--lit:#6b35a8;--pol:#c03020;--all:#8a6050;
  --sheet-radius:20px;--nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input{font:inherit;color:inherit;background:none;border:none;outline:none}
a{color:var(--accent);text-decoration:none}
#app{display:flex;flex-direction:column;height:100dvh}
#screens{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
#nav{display:flex;background:var(--bg2);border-top:1px solid var(--bg4);height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);flex-shrink:0;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--txt3);transition:color .15s;font-size:11px;padding:6px 0;position:relative}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-count{position:absolute;top:8px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:16px;height:16px;padding:0 4px;display:none;align-items:center;justify-content:center;line-height:1}
.nav-count.show{display:flex}
.screen-header{padding:12px 16px 8px;display:flex;align-items:center;gap:10px;background:var(--bg);border-bottom:1px solid var(--bg3);flex-shrink:0;z-index:10}
.screen-title{font-size:18px;font-weight:700;flex:1}
.header-count{font-size:13px;color:var(--txt3);font-weight:400}
#map{flex:1;width:100%;z-index:1}
#map-controls{position:absolute;top:12px;right:12px;z-index:400;display:flex;flex-direction:column;gap:8px}
#btn-lang{position:fixed;top:14px;right:62px;z-index:600;background:rgba(44,24,16,.25);color:var(--txt);border-radius:99px;padding:5px 11px;font-size:12px;font-weight:700;letter-spacing:.5px;border:1px solid var(--bg4)}
.map-btn{width:40px;height:40px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(44,24,16,.2);color:var(--txt);transition:background .15s}
.map-btn:active,.map-btn.active{background:var(--accent);color:#fff}
.map-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#map-filter-bar{position:absolute;top:12px;left:12px;right:60px;z-index:400;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#map-filter-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--bg4);color:var(--txt2);transition:all .15s;cursor:pointer;white-space:nowrap}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.pill-est.active{background:var(--est);border-color:var(--est);color:#fff}
.pill.pill-lat.active{background:var(--lat);border-color:var(--lat);color:#fff}
.pill.pill-lit.active{background:var(--lit);border-color:var(--lit);color:#fff}
.pill.pill-pol.active{background:var(--pol);border-color:var(--pol);color:#fff}
.search-wrap{margin:8px 16px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;padding:10px 14px;gap:8px}
.search-wrap svg{width:17px;height:17px;stroke:var(--txt3);fill:none;stroke-width:2;flex-shrink:0}
.search-wrap input{flex:1;font-size:15px;color:var(--txt)}
.search-wrap input::placeholder{color:var(--txt3)}
.search-clear{color:var(--txt3);display:none;padding:2px}
.search-clear.show{display:block}
.filter-row{padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.list-scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.list-scroller::-webkit-scrollbar{width:3px}
.list-scroller::-webkit-scrollbar-track{background:transparent}
.list-scroller::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
.card{padding:14px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .1s}
.card:active{background:var(--bg3)}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:15px;line-height:1.3;margin-bottom:3px}
.card-short{font-size:13px;color:var(--txt2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.card-dist{font-size:12px;color:var(--txt3);font-weight:500}
.card-rating{display:flex;gap:2px}
.star{font-size:11px;opacity:.3}
.star.on{opacity:1;color:var(--amber)}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--bg4);color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.tag.cat-unusual{background:#2a1f47;color:#a78bfa}
.tag.cat-history{background:#1a2e1a;color:#6ee7b7}
.tag.cat-nature{background:#132a1a;color:#34d399}
.tag.cat-coldwar{background:#2a1a1a;color:#f87171}
.tag.cat-food{background:#2a2010;color:#fbbf24}
.tag.cat-sleep{background:#101a2a;color:#60a5fa}
.tag.cat-islands{background:#0f2232;color:#38bdf8}
.tag.cat-events{background:#2a1830;color:#e879f9}
.tag.flag-win{background:#1a2a10;color:#86efac}
.tag.flag-nm{background:#2a2210;color:#fcd34d;opacity:.75}
.tag.flag-sw{background:#0f2232;color:#7dd3fc}
.tag.flag-sa{background:#2a1a10;color:#fb923c}
.tag.flag-ki{background:#1a2a1a;color:#86efac}
.dist-group-header{padding:10px 16px 4px;font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--txt3);text-transform:uppercase;background:var(--bg);position:sticky;top:0;z-index:5}
#sheet-overlay{position:fixed;inset:0;background:rgba(44,24,16,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
#sheet-overlay.show{opacity:1;pointer-events:all}
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--bg2);border-radius:var(--sheet-radius) var(--sheet-radius) 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.15,1);max-height:88dvh;display:flex;flex-direction:column}
#sheet.open{transform:translateY(0)}
#sheet-handle{width:40px;height:4px;background:var(--bg4);border-radius:99px;margin:12px auto 0;flex-shrink:0}
#sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--safe-bottom) + 20px)}
#sheet-scroll::-webkit-scrollbar{display:none}
.sheet-header{padding:12px 16px 8px;display:flex;align-items:flex-start;gap:10px}
.sheet-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sheet-name{font-size:20px;font-weight:700;line-height:1.2;flex:1}
.sheet-region{font-size:13px;color:var(--txt3);margin-top:2px}
.sheet-cats{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap}
.sheet-ratings{margin:0 16px 14px;background:var(--bg3);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center}
.rating-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.rating-platform{font-size:11px;color:var(--txt3);font-weight:700;letter-spacing:.3px}
.rating-score{font-size:24px;font-weight:800;line-height:1}
.rating-count{font-size:10px;color:var(--txt3)}
.rating-stars{font-size:13px;color:var(--amber)}
.rating-sep{width:1px;height:44px;background:var(--bg4);flex-shrink:0}
.score-badge{font-size:11px;font-weight:800;padding:2px 7px;border-radius:99px;background:var(--bg4);color:var(--txt3);letter-spacing:.2px;white-space:nowrap}
.sheet-score{display:inline-block;font-size:22px;font-weight:800;padding:0 16px 12px}
.sheet-desc{padding:0 16px 12px;font-size:14px;color:var(--txt2);line-height:1.55}
.sheet-desc-full{display:none}
.sheet-expand{color:var(--accent);font-size:13px;padding:0 16px 12px;display:block;cursor:pointer}
.sheet-expand.hide{display:none}
.sheet-practical{margin:0 16px 12px;background:var(--bg3);border-radius:12px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-practical .pr-item{display:flex;flex-direction:column;gap:2px}
.sheet-practical .pr-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sheet-practical .pr-val{font-size:13px;color:var(--txt)}
.sheet-practical .pr-full{grid-column:1/-1}
.sheet-flags{padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.sheet-actions{padding:0 16px 16px;display:flex;gap:10px}
.btn-primary,.btn-secondary{flex:1;padding:13px 10px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--txt)}
.btn-secondary:active{background:var(--bg4)}
.btn-secondary.on-plan{background:var(--green);color:#fff}
.plan-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt3);padding:40px;text-align:center}
.plan-empty svg{width:48px;height:48px;stroke:var(--bg4);opacity:.6}
.plan-actions-row{padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.plan-actions-row button{flex:1;padding:10px;border-radius:10px;background:var(--bg3);font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
.plan-actions-row button:active{background:var(--bg4)}
.plan-card-remove{width:32px;height:32px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--txt3);flex-shrink:0}
.plan-card-remove:active{background:var(--red);color:#fff}
#offline-banner{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--accent);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;transform:translateY(-100%);transition:transform .3s}
#offline-banner.show{transform:translateY(0)}
.sort-wrap{padding:0 16px 8px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.sort-label{font-size:12px;color:var(--txt3);font-weight:600}
.sort-btn{padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--txt2);border:1px solid var(--bg4);transition:all .15s}
.sort-btn.active{background:var(--bg4);color:var(--txt)}
.leaflet-container{background:#e8d8cc}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(42,107,191,.2)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(42,107,191,.8)!important;color:#fff!important;font-weight:700}
.leaflet-popup-content-wrapper{background:var(--bg2);color:var(--txt);border-radius:10px;box-shadow:0 4px 16px rgba(44,24,16,.2)}
.leaflet-popup-tip{background:var(--bg2)}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--txt)!important;border-color:var(--bg4)!important}
</style>
</head>
<body>
<button id="btn-lang">NO</button>
<div id="offline-banner">📵 Offline</div>
<div id="app">
  <div id="screens">
    <div id="screen-map" class="screen active">
      <div id="map-filter-bar">
        <button class="pill active" data-cat="all">All 315</button>
        <button class="pill" data-cat="unusual">Unusual</button>
        <button class="pill" data-cat="history">History</button>
        <button class="pill" data-cat="nature">Nature</button>
        <button class="pill" data-cat="events">Events</button>
        <button class="pill" data-cat="coldwar">Cold War</button>
        <button class="pill" data-cat="food">Food</button>
        <button class="pill" data-cat="sleep">Sleep</button>
        <button class="pill" data-cat="islands">Islands</button>
        <button class="pill" data-flag="sw">Swim</button>
        <button class="pill" data-flag="plan">Plan</button>
      </div>
      <div id="map"></div>
      <div id="map-controls">
        <button class="map-btn" id="btn-gps">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
        </button>
      </div>
    </div>
    <div id="screen-explore" class="screen">
      <div class="screen-header">
        <div class="screen-title">Explore <span class="header-count" id="explore-count"></span></div>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" type="search" placeholder="Search places…" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear">✕</button>
      </div>
      <div class="filter-row" id="explore-cats">
        <button class="pill active" data-cat="all">All</button>
        <button class="pill" data-cat="unusual">Unusual</button>
        <button class="pill" data-cat="history">History</button>
        <button class="pill" data-cat="nature">Nature</button>
        <button class="pill" data-cat="events">Events</button>
        <button class="pill" data-cat="coldwar">Cold War</button>
        <button class="pill" data-cat="food">Food</button>
        <button class="pill" data-cat="sleep">Sleep</button>
        <button class="pill" data-cat="islands">Islands</button>
        <button class="pill" data-flag="sw">Swim</button>
        <button class="pill" data-flag="plan">Plan</button>
      </div>
      <div class="filter-row" id="explore-flags">
        <button class="pill pill-est" data-country="estonia">🇪🇪 Estonia</button>
        <button class="pill pill-lat" data-country="latvia">🇱🇻 Latvia</button>
        <button class="pill pill-lit" data-country="lithuania">🇱🇹 Lithuania</button>
        <button class="pill pill-pol" data-country="poland">🇵🇱 Poland</button>
      </div>
      <div class="sort-wrap">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" data-sort="score">Match %</button>
        <button class="sort-btn" data-sort="dist">Distance</button>
        <button class="sort-btn" data-sort="rating">Rating</button>
      </div>
      <div class="list-scroller" id="explore-list"></div>
    </div>
    <div id="screen-nearby" class="screen">
      <div class="screen-header">
        <div class="screen-title">Nearby <span class="header-count" id="nearby-count"></span></div>
        <button class="map-btn" id="btn-nearby-locate" style="width:36px;height:36px;border-radius:8px">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
        </button>
      </div>
      <div id="nearby-loc-bar" style="padding:8px 16px;font-size:13px;color:var(--txt3);flex-shrink:0">
        <span id="nearby-loc-label">Tap locate to get your position</span>
      </div>
      <div class="filter-row" id="nearby-cats">
        <button class="pill active" data-cat="all">All</button>
        <button class="pill" data-cat="unusual">Unusual</button>
        <button class="pill" data-cat="history">History</button>
        <button class="pill" data-cat="nature">Nature</button>
        <button class="pill" data-cat="events">Events</button>
        <button class="pill" data-cat="coldwar">Cold War</button>
        <button class="pill" data-cat="food">Food</button>
        <button class="pill" data-cat="sleep">Sleep</button>
        <button class="pill" data-cat="islands">Islands</button>
        <button class="pill" data-flag="sw">Swim</button>
        <button class="pill" data-flag="plan">Plan</button>
      </div>
      <div class="list-scroller" id="nearby-list"></div>
    </div>
    <div id="screen-plan" class="screen">
      <div class="screen-header">
        <div class="screen-title">My Plan <span class="header-count" id="plan-count"></span></div>
      </div>
      <div id="plan-actions-row" class="plan-actions-row" style="display:none">
        <button id="btn-plan-maps">📍 Open All in Maps</button>
        <button id="btn-plan-copy">📋 Copy Coords</button>
      </div>
      <div class="list-scroller" id="plan-list"></div>
    </div>
  </div>
  <nav id="nav">
    <button class="nav-btn active" data-view="map">
      <svg viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      Map
    </button>
    <button class="nav-btn" data-view="explore">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Explore
    </button>
    <button class="nav-btn" data-view="nearby">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
      Nearby
    </button>
    <button class="nav-btn" data-view="plan">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Plan
      <span class="nav-count" id="plan-nav-count">0</span>
    </button>
  </nav>
</div>
<div id="sheet-overlay"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-scroll">
    <div class="sheet-header">
      <div class="sheet-dot" id="sh-dot"></div>
      <div><div class="sheet-name" id="sh-name"></div><div class="sheet-region" id="sh-region"></div></div>
      <div style="display:flex;gap:4px;margin-left:auto" id="sh-rating"></div>
    </div>
    <div class="sheet-cats" id="sh-cats"></div>
    <div class="sheet-ratings" id="sh-ratings" style="display:none"></div>
    <div class="sheet-score" id="sh-score"></div>
    <div class="sheet-desc" id="sh-desc-short"></div>
    <button class="sheet-expand" id="sh-expand">Read more ▾</button>
    <div class="sheet-desc sheet-desc-full" id="sh-desc-full"></div>
    <div class="sheet-practical" id="sh-practical"></div>
    <div class="sheet-flags" id="sh-flags"></div>
    <div id="sh-coords" style="padding:0 16px 10px;font-size:11px;color:var(--txt3);font-family:monospace"></div>
    <div class="sheet-actions">
      <button class="btn-primary" id="sh-maps">📍 Open in Google Maps</button>
      <button class="btn-secondary" id="sh-plan">✅ Add to Plan</button>
    </div>
  </div>
</div>
<script>
const ENTRIES=[{"id":"est-t01","n":"Tallinn Old Town","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"Best-preserved medieval Old Town in northern Europe — UNESCO. Müürivahe wall-side vendors, Saint Catherine's artisan passage, medieval pharmacy operating since 1422.","ll":[59.4356,24.7406],"rt":3,"tg":["UNESCO","medieval","city wall","architecture","free"],"lo":"Every conqueror of Estonia left their mark on Toompea hill. The Lower Town keeps its 13th–14th century street grid intact. Müürivahe Street runs along the city wall with hand-knitted wool vendors in medieval niches. Saint Catherine's Passage (Katariina käik) has glassblowers and jewellers in medieval workshops. The Danish King's Garden on Toompea has a free walkable city wall section.","pr":{"time":"Half to full day","cost":"Free (most areas)","transport":"10-min walk from ferry terminal","tips":"Kohtu tänav viewpoint best after 17:00. Börsi passage has key dates in Estonian history inscribed on the walls. Go before 9am to beat cruise-ship crowds."},"n_no":"Tallinns gamle bydel","s_no":"Nordens best bevarte middelalderby – UNESCO. Müürivahe-gateselgere langs bymuren, Sankt Katarinas håndverkerspassasje og et middelalderapotek i drift siden 1422."},{"id":"est-t02","n":"Kiek in de Kök & Bastion Passages","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"15th-century cannon tower with 17th-century underground tunnels. Used as WWII bomb shelters; squatted by Soviet-era punks.","ll":[59.4347,24.7389],"rt":2,"tg":["fortifications","underground","Cold War","WWII","tunnels"],"lo":"The Bastion Passages are carved through medieval limestone — completely dark without the guide's lantern. At various points squatted by Tallinn punk youth in the Soviet era. The Carved Stone Museum holds medieval architectural fragments excavated from Old Town building sites.","pr":{"time":"2–3 hours","cost":"Full complex €16; passages only €10","transport":"Komandandi tee 2, Old Town","tips":"Book the Bastion Passages tour in advance in summer. Dress warmly — tunnels are cold year-round."},"n_no":"Kiek in de Kök og Bastion Passages","s_no":"Kanongtårn fra 1400-tallet med underjordiske tunneler fra 1600-tallet. Brukt som bomberom under WWII – og squattet av punks i sovjettiden."},{"id":"est-t03","n":"KGB Museum — Hotel Viru Floor 23","co":"estonia","re":"Tallinn","ty":"attraction","ca":["coldwar","unusual"],"s":"The KGB secretly occupied the non-existent 23rd floor of Hotel Viru 1969–1991. Surveillance equipment still intact. Guided tours only.","ll":[59.4368,24.7549],"rt":3,"tg":["KGB","Cold War","spy","surveillance","Soviet","guided only"],"lo":"Spy cameras in hotel rooms, microphones in restaurant tables, a full listening room with Soviet tape recorders. Discovered only in 1994. Tours show the listening room, Cold War electronics, and KGB operational methods.","pr":{"time":"1 hour","cost":"€20 adult","transport":"Viru väljak 4, city centre — book in advance","tips":"Pre-book: viru.ee or +372 680 9300. Guided only; no walk-ins. Max 25 per tour."},"n_no":"KGB-museet — Hotel Viru, 23. etasje","s_no":"KGB okkuperte i hemmelighet den ikke-eksisterende 23. etasjen på Hotel Viru fra 1969 til 1991. Overvåkningsutstyret er fortsatt intakt. Kun guidede turer."},{"id":"est-t04","n":"Seaplane Harbour (Lennusadam)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"World-class maritime museum in restored WWI seaplane hangars. Board WWII submarine Lembit bow to stern, walk through an icebreaker.","ll":[59.4517,24.7384],"rt":3,"tg":["maritime","submarine","icebreaker","museum","WWII","seaplane hangar"],"lo":"The three barrel-vaulted concrete hangars (1916) are one of the world's first reinforced concrete buildings. The Lembit submarine (1936) lets you walk through torpedo tubes, engine room, and crew bunks. The icebreaker and WWII torpedo boat are also boardable.","pr":{"time":"2–3 hours","cost":"€22 adult","transport":"Vesilennuki 6, Kalamaja — 15 min walk from Old Town","tips":"Allow extra time for the submarine — at least 45 min. Pre-book in peak season."},"n_no":"Sjøflyterminalen (Lennusadam)","s_no":"Førsteklasses maritimt museum i restaurerte sjøflyhangarer fra WWI. Gå om bord i WWII-ubåten Lembit og vandre gjennom et isbryterfartøy."},{"id":"est-t05","n":"Patarei Prison","co":"estonia","re":"Tallinn","ty":"attraction","ca":["coldwar","history","unusual"],"s":"Sea fortress turned prison used by three regimes — Estonian, Nazi, Soviet — until 1997. Cells frozen in time. 'Communism is Prison' exhibition.","ll":[59.4489,24.7434],"rt":3,"tg":["prison","Soviet","Cold War","dark tourism","three regimes"],"lo":"Built 1840s as a Tsarist sea fortress; used as a prison from 1920. Used under Estonian, Nazi, and Soviet rule. The cells, corridors, and exercise yards are preserved almost exactly as left. One of the most powerful dark tourism sites in the Baltic states.","pr":{"time":"2 hours","cost":"Check current admission","transport":"Pakri 2, Kalamaja — 20 min walk from Old Town","tips":"Not suitable for young children. Photography allowed throughout."},"n_no":"Patarei fengsel","s_no":"Sjøfestning omgjort til fengsel, brukt av tre regimer – estisk, nazistisk og sovjetisk – frem til 1997. Cellene er frosset i tid."},{"id":"est-t06","n":"Town Hall Pharmacy (Raeapteek)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"Operating continuously since 1422 — one of the oldest pharmacies in Europe. Free medieval remedy museum. Still sells modern medicines.","ll":[59.4371,24.7453],"rt":2,"tg":["pharmacy","medieval","1422","operating","unique","free"],"lo":"In 1422, remedies here included dried crocodile and powdered unicorn horn. The pharmacy has survived 600 years of plague, war, and occupation. Medieval recipe books displayed. You can still buy paracetamol in a building that opened when Gutenberg was 20 years old.","pr":{"time":"30 minutes","cost":"Free museum","transport":"Raekoja plats 11, Old Town","tips":"The medieval remedies section is genuinely surprising. Also a functioning pharmacy."},"n_no":"Rådshusapoteket (Raeapteek)","s_no":"I kontinuerlig drift siden 1422 – et av Europas eldste apotek. Gratis museum om middelaldermedisin. Selger fortsatt moderne medisiner."},{"id":"est-t07","n":"Linnahall Rooftop","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual","coldwar"],"s":"Brutalist 1980 Olympics venue, now derelict. Locals climb the rooftop for sunset views over the harbour and Old Town. Free (informal access).","ll":[59.4468,24.7513],"rt":2,"tg":["Soviet","brutalism","rooftop","view","free","derelict"],"lo":"Built for the 1980 Moscow Olympics sailing events — Tallinn's showpiece of Soviet modernity. Abandoned since the 1990s. The massive stepped limestone pyramid is gradually deteriorating. The roof gives one of the best views in Tallinn.","pr":{"time":"1 hour","cost":"Free","transport":"5 min walk from ferry terminal","tips":"Visit at sunset. Wear sturdy shoes. Check current access status before visiting."},"n_no":"Linnahall-taket","s_no":"Brutalistisk OL-anlegg fra 1980, nå forlatt. Tallinnere klatrer opp på taket for solnedgangsutsikt over havnen og gamlebyen. Gratis (uoffisiell adgang)."},{"id":"est-t08","n":"Estonian Open Air Museum","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history"],"s":"80+ historic buildings from across Estonia — farmsteads, windmills, a church — showing rural life 18th–20th centuries. Working windmills, smoke sauna, Kolu Tavern.","ll":[59.4494,24.653],"rt":2,"tg":["open-air museum","farmstead","windmills","smoke sauna","traditional","crafts"],"lo":"An entire Estonian farm complex from different regions and eras: thatched barns, smoke saunas, granaries, a chapel, a mill. Craft demonstrations on summer weekends. The Kolu Tavern serves kama, smoked fish, and dark rye bread in a restored 19th-century inn.","pr":{"time":"Half day","cost":"~€10 adult","transport":"Rocca al Mare, 8km west — bus 21/21B from city centre","tips":"Combine with Kolu Tavern lunch. Weekend craft demonstrations are worth timing your visit around."},"n_no":"Estlands friluftsmuseum","s_no":"Over 80 historiske bygninger fra hele Estland – gårdsbruk, vindmøller og en kirke – som viser landliv fra 1700- til 1900-tallet."},{"id":"est-t09","n":"St Olaf's Church Tower","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history"],"s":"258 steps for Tallinn's best Old Town panorama. In the 16th century this was one of the tallest buildings in the world (159m).","ll":[59.44,24.7468],"rt":2,"tg":["church","viewpoint","medieval","climb","tallest"],"lo":"The tower offers a view at rooftop level looking across the spires — better than Toompea because you're looking at the spires from above rather than among them.","pr":{"time":"1 hour","cost":"€3","transport":"Pikk 24, Old Town","tips":"Go early morning or late evening for the best light and fewest people at the top."},"n_no":"Olavskirken tårn","s_no":"258 trinn til Tallinns beste panoramautsikt over gamlebyen. På 1500-tallet var dette en av verdens høyeste bygninger (159 m)."},{"id":"est-t10","n":"Naissaar Island — Mine Factory & Rocket Base","co":"estonia","re":"Tallinn environs","ty":"attraction","ca":["coldwar","nature","islands"],"s":"Former Soviet mine factory and rocket base 10km from Tallinn. Three hiking trails, underground bunkers, two free RMK campsites.","ll":[59.5669,24.6101],"rt":3,"tg":["Cold War","island","mine factory","rocket base","bunkers","free camping"],"lo":"Militarised 1914; civilian population evacuated. Soviet mine factory produced anti-ship explosive mines; a 1963 rocket base had 150km-range missiles. Three marked trails: military (north), nature (central), mines (south). Underground bunkers require a headtorch.","pr":{"time":"Full day; overnight recommended","cost":"Ferry ~€10–15 return","transport":"Seasonal ferry from Pirita harbour (summer only)","tips":"Bring headtorch for bunkers. Two free RMK campsites on island. Minimum one night recommended."},"n_no":"Naissaar – Minefabrikk og rakettbase","s_no":"Tidligere sovjetisk minefabrikk og rakettbase, 10 km fra Tallinn. Tre turløyper, underjordiske bunkere og to gratis RMK-campingplasser."},{"id":"est-t11","n":"Kadriorg Palace & KUMU Art Museum","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","nature"],"s":"Peter the Great's baroque palace (1718), Museum of Foreign Art, free park with rose gardens. Adjacent KUMU — Estonia's national art museum built into limestone cliff.","ll":[59.4401,24.7308],"rt":2,"tg":["palace","baroque","Peter the Great","KUMU","park","tram accessible"],"lo":"The park is freely accessible year-round. The presidential palace across the square has beehives — the president gifts honey to state visitors (a charming tradition). KUMU covers Estonian art 18th century to contemporary.","pr":{"time":"2–3 hours","cost":"Palace ~€6; KUMU ~€10; park free","transport":"Tram 1 or 3 from Old Town to Kadriorg (last stop). ~10 min.","tips":"The park is free and beautiful. Combine both museums or choose one."},"n_no":"Kadriorg-palasset og KUMU kunstmuseum","s_no":"Peter den stores barokkpalass (1718), museum for utenlandsk kunst og gratis park med rosehager. Like ved ligger KUMU – Estlands nasjonale kunstmuseum."},{"id":"est-t12","n":"Museum of Occupations (Vabamu)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","coldwar"],"s":"Interactive museum of Soviet and Nazi occupation 1940–1991 told through individual family stories. Rebuilt 2018 with modern format.","ll":[59.4365,24.788],"rt":3,"tg":["occupation","Soviet","Nazi","deportation","museum","modern","interactive"],"lo":"'Vabamu' means 'freedoms.' The museum tells both occupations through voices of people who lived them — deportation, collaboration, resistance, survival. Completely rebuilt in 2018. One of the most personal history museums in the Baltic states.","pr":{"time":"2–3 hours","cost":"~€10 adult","transport":"Freedom Square area, Tallinn","tips":"The introductory film establishes essential context. Allow 2 hours minimum."},"n_no":"Okkupasjonsmuseet (Vabamu)","s_no":"Interaktivt museum om den sovjetiske og nazistiske okkupasjonen 1940–1991, fortalt gjennom enkeltfamiliers historier."},{"id":"est-t13","n":"Fotografiska Tallinn","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual"],"s":"World-class photography gallery in Telliskivi Creative City. Top-floor restaurant with Old Town panorama. Rotating international exhibitions.","ll":[59.4353,24.7417],"rt":2,"tg":["photography","gallery","art","views","Telliskivi"],"lo":"The Stockholm Fotografiska brand's Tallinn location is in a converted Telliskivi factory. Exhibitions change regularly and are consistently at museum standard. The rooftop restaurant has one of the best city views.","pr":{"time":"2–3 hours","cost":"Check fotografiska.com","transport":"Telliskivi 60A, Kalamaja","tips":"Combine with Telliskivi street art walk and dinner in the creative district."},"n_no":"Fotografiska Tallinn","s_no":"Verdensledende fotografigalleri i Telliskivi kreativby. Restaurant i øverste etasje med panoramautsikt over gamlebyen."},{"id":"est-t14","n":"Põhjala Brewery Tap Room","co":"estonia","re":"Tallinn","ty":"food","ca":["food"],"s":"Estonia's most acclaimed craft brewery. Baltic Porters, barrel-aged stouts, sour ales. Michelin-recommended. Noblessner Port.","ll":[59.455,24.7353],"rt":3,"tg":["craft beer","Baltic Porter","brewery","oak-aged","Michelin recommended"],"lo":"Põhjala specialises in Baltic Porters aged in oak barrels — rich, smooth, with dark fruit and chocolate. Also produces world-class imperial stouts, IPAs, and wild ales.","pr":{"time":"2 hours","cost":"€5–8 per pint","transport":"Noblessner Port, 20 min walk from Old Town","tips":"Check pohjala.ee for tap room hours and brewery tour availability."},"n_no":"Põhjala Brewery – tapperom","s_no":"Estlands mest prisbelønte håndverksbryggeri. Baltic Porters, fatmodnet stout og syrlige aler. Michelin-anbefalt. Noblessner havn."},{"id":"est-t15","n":"Olde Hansa Restaurant","co":"estonia","re":"Tallinn","ty":"food","ca":["food","history"],"s":"Medieval Hanseatic tavern on Town Hall Square. Elk, wild boar, brown bear sourced locally. Costumed servers, honey beer in clay jugs.","ll":[59.4359,24.7448],"rt":2,"tg":["medieval","restaurant","elk","bear","boar","honey beer"],"lo":"Sources ~10 brown bears per year from Estonian hunters — slow-cooked bear appears seasonally. Elk sirloin, boar sausage with pine needles, smoked fish plates are reliable menu staples. The honey beer is brewed to a medieval recipe.","pr":{"time":"2 hours","cost":"~€25–45 per head","transport":"Vana turg 1, Old Town","tips":"Book ahead for evenings in summer. Lunch is calmer and better value."},"n_no":"Olde Hansa Restaurant","s_no":"Middelaldersk hanseatisk kro på Rådhusplassen. Elg, villsvin og bjørn fra lokale produsenter. Servitører i kostyme og honningøl i leirgryter."},{"id":"est-t16","n":"Balti Jaama Turg Market","co":"estonia","re":"Tallinn","ty":"food","ca":["food","unusual"],"s":"Tallinn's liveliest market — smoked fish, reindeer burgers, kama smoothies below; Soviet memorabilia (badges, posters, toys) in the antiques hall above.","ll":[59.4395,24.735],"rt":2,"tg":["market","smoked fish","Soviet memorabilia","street food"],"lo":"The Food Street serves smoked fish, kama smoothies, Estonian craft beer, vegan pastries. Upstairs: Soviet-era antiques — medals, pioneer badges, propaganda posters, Agfa cameras.","pr":{"time":"1–2 hours","cost":"Free entry; €5–15 for food","transport":"Kopli 1, next to Balti Jaam train station","tips":"Saturday mornings busiest and best. Soviet antiques upstairs are a treasure trove."},"n_no":"Balti Jaama Turg-markedet","s_no":"Tallinns mest livlige marked – røkt fisk, reinsdyrburgere og kama-smoothies under; sovjetmemorabilia (merker, plakater, leketøy) i antikvitetshallen over."},{"id":"est-t17","n":"Rataskaevu 16","co":"estonia","re":"Tallinn","ty":"food","ca":["food"],"s":"Beloved Old Town restaurant: braised elk with blackcurrant, smoked pork ribs with sauerkraut. Elk main ~€14. Book ahead.","ll":[59.4363,24.7439],"rt":2,"tg":["Estonian cuisine","elk","game","restaurant","Old Town"],"lo":"One of Tallinn's most consistent restaurants. The braised elk is the signature dish. Menu changes seasonally — in autumn: wild mushroom risotto and game stews. Cosy, unhurried, and notably better value than most Old Town restaurants.","pr":{"time":"1.5 hours","cost":"~€15–25 per head","transport":"Rataskaevu 16, Old Town","tips":"Book ahead. Lunch is better value."},"n_no":"Rataskaevu 16","s_no":"Elsket restaurant i gamlebyen: braisert elg med solbær, røkte svineribber med surkål. Elgrett ca. €14. Forhåndsbestilling anbefales."},{"id":"est-l01","n":"Viru Bog Boardwalk","co":"estonia","re":"Lahemaa NP","ty":"nature","ca":["nature"],"s":"Estonia's most iconic bog walk. 3.5km boardwalk to observation tower. Wheelchair accessible first 1.5km. Completely silent. Free.","ll":[59.4644,25.6383],"rt":3,"tg":["bog","boardwalk","nature trail","wheelchair accessible","free","silence"],"lo":"After 1km of pine forest the boardwalk emerges onto open bog — flat, eerie, dark peat pools reflecting the sky. Full 6km loop continues through forest. Autumn: amber, rust, and deep green colours.","pr":{"time":"2–3 hours","cost":"Free","transport":"35km from Tallinn. Park roadside on Road 1 (600m from Viru Bog sign).","tips":"Early morning best. Mosquito repellent in summer. Ticks April–October."},"n_no":"Viru myr-løypen","s_no":"Estlands mest ikoniske myrtur. 3,5 km treplankeløype til utsiktstårn. Rullestolvennlig de første 1,5 km. Fullstendig stille. Gratis."},{"id":"est-l02","n":"Hara Harbour Soviet Submarine Base","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["coldwar","unusual"],"s":"Abandoned Soviet submarine demagnetisation facility inside Lahemaa NP. Concrete piers reaching into the Baltic. Almost no visitors. Guided tours + glamping available.","ll":[59.541,25.366],"rt":3,"tg":["Cold War","submarine","Soviet","demagnetisation","Lahemaa","unusual"],"lo":"Established 1953, closed 1991. The degaussing piers — where submarine hulls were stripped of magnetic signatures — still extend into the sea. Non-profit Hara Sadam manages guided tours and on-site glamping accommodation.","pr":{"time":"2–3 hours","cost":"Adult €10","transport":"Juminda Peninsula, 65km east of Tallinn","tips":"Book via harasadam.ee. Best late afternoon light on the ruins."},"n_no":"Hara havn – Sovjetisk ubåtbase","s_no":"Forlatt sovjetisk demagnetiseringsanlegg for ubåter inne i Lahemaa nasjonalpark. Betongbrygger ut i Østersjøen. Guidede turer og glamping tilgjengelig."},{"id":"est-l03","n":"Käsmu Village","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["history","nature"],"s":"'The Captains' Village' — former naval school, unofficial sea museum (just knock on the door), Estonia's largest natural boulder field.","ll":[59.6,25.9167],"rt":2,"tg":["fishing village","maritime","boulders","museum","coastal"],"lo":"Captains' houses (ornate wooden homes enriched by Baltic trade) line the streets. The unofficial sea museum owner knows everyone who ever worked the Baltic. The coastline is strewn with glacial boulders.","pr":{"time":"Half day","cost":"Free village; small donation for museum","transport":"65km from Tallinn","tips":"Ask the museum owner about Soviet border regulations — the stories are extraordinary."},"n_no":"Käsmu-landsbyen","s_no":"«Kapteinenes landsby» – tidligere sjømannsskole, uoffisielt sjømuseum og Estlands største naturlige steinfelt."},{"id":"est-l04","n":"Palmse Manor","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["history"],"s":"Crown jewel of Lahemaa's manor houses. 18th-century baroque with formal gardens, coach house, distillery, and ornamental lake.","ll":[59.513,25.955],"rt":2,"tg":["manor house","baroque","gardens","museum","park"],"lo":"Built 1680s, renovated in baroque style late 18th century. Museum in manor house; surrounding buildings include restored distillery, coach house, bath house. The park with ornamental lake is one of the most beautiful in Estonia.","pr":{"time":"2–3 hours","cost":"€5 adult","transport":"Inside Lahemaa NP, 65km from Tallinn — car recommended","tips":"Combine with Viru Bog and Käsmu for a full Lahemaa day."},"n_no":"Palmse gods","s_no":"Perlen blant Lahemeas herregårder. Barokkgods fra 1700-tallet med formell hage, vognhus, destilleri og prydsjø."},{"id":"est-l05","n":"Oandu Old-Growth Forest Trail","co":"estonia","re":"Lahemaa NP","ty":"nature","ca":["nature"],"s":"4.7km through ancient spruce forest. Elk, bear, and lynx footprints in soft ground. One of Estonia's finest primeval-forest walks.","ll":[59.565,26.102],"rt":2,"tg":["old-growth forest","hiking","wildlife","lynx","elk","free"],"lo":"Dead standing trees host ten woodpecker species. Ground thick with moss and fallen timber. Interpretation signs explain animal footprints — which animal, how long ago. Completely different experience from the bog walks.","pr":{"time":"2–3 hours","cost":"Free","transport":"Oandu village, Lahemaa NP","tips":"Waterproof boots. Ticks April–October: check skin after."},"n_no":"Oandu urskogsti","s_no":"4,7 km gjennom urgammel granskog. Elg-, bjørne- og gaupespor i myk jord. En av Estlands fineste urskogsturer."},{"id":"est-p01","n":"Pärnu Beach & Promenade","co":"estonia","re":"Pärnu","ty":"nature","ca":["nature"],"s":"Estonia's finest beach. Summer capital. 1.5km pier for sunset walks. Mud spa culture since 1838. Water 20–22°C in July–August.","ll":[58.3859,24.4971],"rt":2,"tg":["beach","Baltic Sea","spa","pier","summer capital","free"],"lo":"The pier stretches 1.5km into the Gulf of Riga. Spa culture predates the beach resort: the first mud bath house opened 1838. Villa Ammende (1904 Art Nouveau villa) is worth seeing even if not staying there.","pr":{"time":"Half to full day","cost":"Free beach","transport":"130km south of Tallinn. Lux Express bus ~€10–15, 2–2.5hrs.","tips":"Mid-week in summer for fewer crowds. Villa Ammende esplanade is a beautiful free evening walk."},"n_no":"Pärnu strand og promenade","s_no":"Estlands fineste strand. Sommerhovedstaden. 1,5 km lang brygge for solnedgangsturer. Gjørme-spakultur siden 1838. Vanntemperatur 20–22 °C i juli–august."},{"id":"est-p02","n":"Pärnu Medieval Days Festival","co":"estonia","re":"Pärnu","ty":"festival","ca":["history","unusual"],"s":"Most authentic medieval market in the Baltic. Every vendor must sell handcrafted goods — no mass production. July 3–5 annually.","ll":[58.3741,24.5022],"rt":3,"tg":["festival","medieval","Hanseatic","crafts","July 3-5"],"lo":"Live blacksmiths, leatherworkers, lute makers, glassblowers demonstrating actual techniques. Period music. All goods must be handmade by rule. The genuinely good crafts sell out early.","pr":{"time":"Full day","cost":"Small entry fee","transport":"Pärnu centre; book RV parking outside town early","tips":"Arrive Friday afternoon. Buy early — genuinely good crafts sell out Saturday noon."},"n_no":"Pärnu middelaldermarked","s_no":"Det mest autentiske middelaldermarkedet i Baltikum. Alle selgere må tilby håndlagde varer – ingen masseproduksjon. 3.–5. juli."},{"id":"est-h01","n":"Haapsalu Bishop's Castle & White Lady","co":"estonia","re":"Haapsalu","ty":"attraction","ca":["history","unusual"],"s":"13th-century castle. The White Lady appears in the cathedral window on August full moon. Tchaikovsky visited 1867. World's longest covered railway platform (216m).","ll":[58.9472,23.5386],"rt":2,"tg":["castle","medieval","White Lady","Tchaikovsky","spa","railway","longest platform"],"lo":"The town is a perfectly preserved Tsarist seaside resort — wooden spa villas, ornate promenade, therapeutic mud tradition. The railway station was built for visiting Russian tsars. The White Lady festival is in August.","pr":{"time":"Half day","cost":"Castle ~€8; railway museum €5","transport":"100km from Tallinn; regular buses ~1.5hrs","tips":"The esplanade sunset walk is free and beautiful."},"n_no":"Haapsalus biskopsborg og Den hvite dame","s_no":"Borg fra 1200-tallet. Den hvite dame vises i domkirkens vindu ved fullmåne i august. Tsjajkovskij besøkte byen i 1867."},{"id":"est-s01","n":"Kaali Meteorite Crater","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["unusual","nature"],"s":"Impact lake 110m wide formed ~3,500 years ago. Ancient Estonians considered it sacred — the stone wall they built around it still stands. Free entry.","ll":[58.3728,22.6694],"rt":2,"tg":["meteorite","crater","Bronze Age","sacred","island","free"],"lo":"The meteorite was ~10m across, hit at 20 km/s. Nine craters total; the main one is water-filled. The Bronze Age sacred stone ring wall still stands. Two metres away: a tiny Meteoritics Museum.","pr":{"time":"1 hour","cost":"Free; museum ~€2","transport":"Ferry Virtsu→Kuivastu then causeway to Saaremaa; 40km to Kaali village","tips":"Combine with Kuressaare Castle in a full island day."},"ki":1,"n_no":"Kaali meteorittkrater","s_no":"Innsjø etter et meteorittnedslag for ca. 3 500 år siden, 110 m bred. Gamle estere betraktet den som hellig. Gratis inngang."},{"id":"est-s02","n":"Kuressaare Castle","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["history"],"s":"Best-preserved medieval castle in the Baltic states. Water-filled moat still intact. Excellent museum including Soviet-era island history (it was a closed military zone).","ll":[58.25,22.4833],"rt":2,"tg":["castle","medieval","moat","museum","Teutonic Order"],"lo":"Built by the Teutonic Order in the 14th century, never substantially destroyed — an extraordinary rarity. The round tower views are spectacular.","pr":{"time":"2–3 hours","cost":"€12 adult","transport":"Kuressaare, Saaremaa island capital","tips":"Climb the round tower for the moat-reflection view."},"n_no":"Kuressaare slott","s_no":"Det best bevarte middelalderslottet i de baltiske statene. Vanngraven er fortsatt intakt. Utmerket museum med øyas historie."},{"id":"est-s03","n":"Kiipsaare Lighthouse — Leaning Tower","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["unusual","nature"],"s":"The sand spit has completely eroded — the lighthouse now stands in the sea, tilted at a dramatic angle. Free. Walk across the beach to reach it.","ll":[58.4956,21.8214],"rt":2,"tg":["lighthouse","tilted","island","unusual","sea","free"],"lo":"Built 1933 on Harilaid Peninsula. Sand swept away by Baltic currents over 90 years. Now leans significantly over the sea. At low tide you can walk to it. The light still works.","pr":{"time":"1 hour","cost":"Free","transport":"Harilaid Peninsula, northwest Saaremaa","tips":"Check tide times before visiting."},"n_no":"Kiipsaare fyr – det skjeve tårnet","s_no":"Sandtangen er fullstendig erodert – fyret står nå i havet, dramatisk skjevt. Gratis. Gå over stranden for å nå frem."},{"id":"est-s04","n":"Kihnu Island — Living UNESCO Heritage","co":"estonia","re":"Kihnu","ty":"attraction","ca":["islands","history"],"s":"Women wear traditional striped skirts daily — not for tourists. UNESCO Intangible Cultural Heritage. 30-min ferry from mainland takes the RV.","ll":[58.1413,24.0208],"rt":3,"tg":["UNESCO","living heritage","island","traditional","striped skirts","fishing"],"lo":"One of the last places in Europe where a traditional culture has survived largely unbroken. The 23km island circuit by bike covers all highlights. Fresh smoked fish is the signature experience.","pr":{"time":"Full day; overnight recommended","cost":"Ferry ~€12 return (takes vehicles)","transport":"30 min ferry from Munalaiu near Pärnu","tips":"Book vehicle ferry well ahead in July. Home-cooked meals at farms — ask locally."},"n_no":"Kihnu – levende UNESCO-arv","s_no":"Kvinner bærer tradisjonelle stripete skjørt til daglig. UNESCO immaterielle kulturarv. 30 minutters ferge fra fastlandet tar med campingvogna."},{"id":"est-s05","n":"Vormsi Island — 330 Sun Crosses","co":"estonia","re":"Vormsi","ty":"attraction","ca":["islands","unusual"],"s":"Cemetery with 330+ hand-carved limestone sun crosses — every one unique, every one made by a local farmer. Almost no tourists.","ll":[58.9702,23.2654],"rt":3,"tg":["cemetery","sun crosses","Swedish heritage","island","unique"],"lo":"13th–19th century crosses represent a blend of Scandinavian and Baltic medieval heritage found nowhere else. The island was a Soviet border zone. Today ~240 inhabitants. Fossil outcrops at Saxby point. Rumpo Peninsula hiking trail.","pr":{"time":"Half day","cost":"Ferry ~€10 return","transport":"45-min ferry from Rohuküla near Haapsalu","tips":"No petrol station on island. Bring cash. Bike rental at Sviby harbour."},"n_no":"Vormsi – 330 solkors","s_no":"Kirkegård med over 330 håndhuggede kalksteins-solkors – hvert eneste unikt, alle laget av lokale bønder. Nesten ingen turister."},{"id":"est-s06","n":"Ruhnu Island","co":"estonia","re":"Ruhnu","ty":"attraction","ca":["islands","unusual","nature"],"s":"70km offshore, ~100 residents. Singing sands, possibly-Eiffel-designed cast-iron lighthouse (1884), oldest wooden church in Estonia (1643). Local seaweed gin.","ll":[57.8053,23.2519],"rt":3,"tg":["island","singing sands","lighthouse","seaweed gin","seals","remote"],"lo":"Limo Beach sand squeaks underfoot — a real acoustic phenomenon. The native Ruhnu sheep exist nowhere else on Earth. After day visitors leave by ferry, you have the island to yourself. Watch seals from the eastern shore at dusk.","pr":{"time":"Overnight strongly recommended","cost":"Ferry ~€20 return (from Saaremaa)","transport":"2h ferry from Roomassaare (Saaremaa). Book weeks ahead for July.","tips":"Bring cash. Limited shop hours. Seaweed gin only available on the island."},"n_no":"Ruhnu","s_no":"70 km fra kysten, ~100 innbyggere. Syngende sanddyner, et støpejernsfyr fra 1884, Estlands eldste trekirke (1643). Lokal tang-gin."},{"id":"est-s07","n":"Koguva Village, Muhu Island","co":"estonia","re":"Muhu","ty":"attraction","ca":["history","islands"],"s":"Outstanding example of Estonian peasant architecture — stone fences, thatched barns, largely unchanged since the 19th century. Four farmhouses form a living museum.","ll":[58.5986,23.0836],"rt":2,"tg":["village","architecture","Muhu embroidery","heritage","museum","islands"],"lo":"Traditional Muhu embroidery (richest needlework tradition in Estonia) available at craft shops. Kõinastu Island wading tours in summer: wade through the shallow sea with a guide.","pr":{"time":"2 hours","cost":"Museum ~€5; village free","transport":"Ferry Virtsu→Kuivastu (takes RV); Koguva on western Muhu","tips":"Buy embroidered textiles here — the real thing."},"n_no":"Koguva-landsbyen, Muhu","s_no":"Et enestående eksempel på estisk bondearchitektur – steingjerdene, stråtakslader, stort sett uendret siden 1800-tallet."},{"id":"est-s08","n":"Kõpu Lighthouse, Hiiumaa","co":"estonia","re":"Hiiumaa","ty":"attraction","ca":["history","islands"],"s":"Third-oldest continuously active lighthouse in the world — built 1531. Took 30 years (plague interrupted construction). Views 50km out to sea.","ll":[58.9159,22.1997],"rt":2,"tg":["lighthouse","1531","Hanseatic","island","Soviet ruins"],"lo":"Essential to Baltic trade for 500 years. Sits on Hiiumaa's highest hill (68m). The island has two other accessible French-built lighthouses (Tahkuna and Ristna, 1873–74). Derelict Soviet coastal batteries at Tahkuna are free to explore.","pr":{"time":"3–4 hours for all three lighthouses","cost":"€2 per lighthouse; €5 for all three","transport":"Ferry from Rohuküla (~1hr); car essential on island","tips":"Soviet military ruins at Tahkuna are free and fascinating."},"n_no":"Kõpu fyr, Hiiumaa","s_no":"Verdens tredje eldste fyr i kontinuerlig drift – bygget i 1531. Tok 30 år å fullføre (pesten avbrøt arbeidet). Utsikt 50 km ut til havs."},{"id":"est-cw01","n":"Paldiski Nuclear Submarine Training Centre","co":"estonia","re":"Paldiski","ty":"attraction","ca":["coldwar","unusual"],"s":"Largest Soviet nuclear submarine training facility in the USSR. Two nuclear reactors still on site in concrete sarcophagi. Tours by appointment only.","ll":[59.3608,24.1069],"rt":3,"tg":["nuclear","submarine","Cold War","Soviet","reactor","tours by appointment"],"lo":"Paldiski was a fully closed Soviet city — 16,000+ military personnel. Two full-scale submarine mock-ups with operational nuclear reactors. Soviets couldn't remove the reactors when they left in 1994 — still under 24/7 supervision by AS ALARA.","pr":{"time":"2–3 hours","cost":"€15+ per person; children free","transport":"~50km west of Tallinn. Pre-book via alara.ee.","tips":"Weekdays only; bring photo ID. Dress warmly — the concrete building is cold and windswept."},"n_no":"Paldiski atomubåt-treningssenter","s_no":"Det største sovjetiske treningsanlegget for atomubåter i hele USSR. To atomreaktorer er fortsatt på stedet, innstøpt i betongsarkofager."},{"id":"est-cw02","n":"Sillamäe — Secret Soviet Uranium City","co":"estonia","re":"Sillamäe","ty":"attraction","ca":["coldwar","unusual","history"],"s":"Built to process uranium for the Soviet nuclear bomb. Erased from all maps. Intact Stalinist urbanism. Almost entirely Russian-speaking.","ll":[59.397,27.7633],"rt":3,"tg":["Soviet","uranium","nuclear","Stalinist architecture","secret city"],"lo":"Uranium here helped fuel 70,000+ Soviet nuclear weapons. City purpose-built from 1947 — not on any official map. Today: intact Stalinist neo-classical avenues, protected cinema, Prometheus monument. The Sillamäe Museum has a 'red room' with Soviet artefacts.","pr":{"time":"Half day","cost":"Museum small fee; town free","transport":"~170km east of Tallinn; best as day trip from Narva","tips":"Feels like stepping into the USSR. The town is predominantly Russian-speaking."},"n_no":"Sillamäe – den hemmelige soviétiske uranbyen","s_no":"Bygget for å foredle uran til den sovjetiske atombomben. Slettet fra alle kart. Intakt stalinistisk byarkitektur."},{"id":"est-f01","n":"Must leib (Dark Rye Bread)","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Estonia's national bread — dense sourdough rye with malt. At every meal. Buy from local bakeries only. €1–3/loaf.","ll":[59.437,24.745],"rt":3,"tg":["bread","rye","sourdough","staple","traditional"],"lo":"The best comes from small bakeries using centuries-old sourdough starters. The carrier for every smoked fish, curd cheese, and sour cream in Estonian cuisine. Ask for 'kohalik leib' (local bread) to get the non-supermarket version.","pr":{"time":"","cost":"€1–3","transport":"Any bakery in Estonia","tips":"Ask for 'kohalik leib'. Balti Jaama Turg has excellent freshly baked loaves."},"n_no":"Must leib (mørkt rugbrød)","s_no":"Estlands nasjonalbrød – kompakt surdeigs-rugbrød med malt. Serveres til alle måltider. Kjøp fra lokale bakerier. €1–3 per brød."},{"id":"est-f02","n":"Kama Drink","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Ground roasted barley, rye, oat, and pea flour stirred into kefir with honey. Estonia's ancient protein drink. Found at health cafes.","ll":[59.437,24.745],"rt":2,"tg":["kama","ancient food","kefir","Estonian","superfood"],"lo":"One of the oldest continuously-made foods in Estonia — appears in 13th-century chronicles. Mixed into kefir: thick, nutty, earthy-sweet. Try a kama smoothie at RØST Bakery in Rotermann Quarter.","pr":{"time":"","cost":"€3–5 (smoothie); €3 (powder packet)","transport":"Cafes in Tallinn; supermarkets nationwide","tips":"Buy a kama powder packet as a souvenir. RØST Bakery smoothie is the best version."},"n_no":"Kama-drikk","s_no":"Malt ristet bygg-, rug-, havre- og ertemel rørt ut i kefir med honning. Estlands urgamle proteindrikk. Finnes på helsecaféer."},{"id":"est-f03","n":"Roadside Smoked Fish","co":"estonia","re":"Estonian coast","ty":"food","ca":["food"],"s":"Warm alder-smoked Baltic herring, sprats, or pike-perch from roadside smokers. Eat outside. One of the most authentic Baltic food experiences.","ll":[58.944,23.541],"rt":3,"tg":["smoked fish","roadside","authentic","herring","alder","traditional"],"lo":"Roadside smokers set up near fishing harbours. Fish smoked that morning over alder wood, sold warm. Eat it outside with dark rye bread.","pr":{"time":"","cost":"€2–5 per portion","transport":"Roadside along Estonian coast — near Pärnu, Haapsalu, Käsmu","tips":"If you see smoke and a hand-lettered sign, stop immediately."},"n_no":"Røkt fisk langs veien","s_no":"Varmrøkt Østersjøsild, brisling eller gjørs, røkt over or-ved fra veikantselgere. En av de mest autentiske matopplevelsene i Baltikum."},{"id":"est-f04","n":"Kohuke (Curd Snack)","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Chocolate-coated chilled curd cheese bar in dozens of flavours. Estonia's most beloved everyday food. €0.50–1.50 at every supermarket.","ll":[59.437,24.745],"rt":3,"tg":["kohuke","curd","chocolate","snack","supermarket","cheap"],"lo":"Available in vanilla, strawberry, blueberry, caramel, coconut, and pistachio. The chilled curd bar dipped in chocolate is ridiculously good.","pr":{"time":"","cost":"€0.50–1.50 each","transport":"Every supermarket in Estonia","tips":"Try pistachio or coconut. A box of mixed kohuke makes an excellent souvenir."},"n_no":"Kohuke (ostemassebar)","s_no":"Sjokoladebelagt, kjølt ostemassebar i dusinvis av smaker. Estlands mest elskede hverdagsmat. €0,50–1,50 i alle supermarkeder."},{"id":"est-f05","n":"Vana Tallinn Liqueur","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Estonia's iconic dark spiced liqueur (40–45% ABV). Rum, citrus, cinnamon, vanilla. Mix into coffee or pour over ice cream. The national souvenir spirit.","ll":[59.437,24.745],"rt":2,"tg":["liqueur","spirits","Estonian","souvenir","spiced","Vana Tallinn"],"lo":"Created in the 1960s. The 45% version has more depth than the 40% export version. Drink it neat, mixed into coffee, poured over vanilla ice cream, or in cocktails.","pr":{"time":"","cost":"€10–20/bottle; €3–5 miniature","transport":"Any liquor store or supermarket in Estonia","tips":"Buy the 45% version. Miniatures available for €3–5."},"n_no":"Vana Tallinn-likør","s_no":"Estlands ikoniske mørke krydderlikør (40–45 % ABV). Rom, sitrus, kanel og vanilje. Bland i kaffe eller hell over iskrem."},{"id":"est-a01","n":"ÖÖD Mirror House","co":"estonia","re":"Near Tallinn","ty":"accommodation","ca":["sleep","unusual"],"s":"A mirrored cabin hidden in pine forest — it disappears into the trees. Floor-to-ceiling glass front, sauna, BBQ. ~€220–260/night.","ll":[59.4801,24.678],"rt":3,"tg":["mirror house","unusual accommodation","forest","sauna","romantic","Estonian invention"],"lo":"ÖÖD was invented in Estonia — a mirror-clad cabin that reflects its forest surroundings so completely it seems to vanish. Full-glass front wall, wood-burning sauna, espresso machine, contactless check-in.","pr":{"time":"Overnight","cost":"~€220–260 per night","transport":"~40 min from Tallinn Airport (Ihasalu location)","tips":"Book far in advance — all locations sell out months ahead in summer. oodhotels.com or Airbnb."},"n_no":"ÖÖD speilhus","s_no":"Et speilkledt hytterom gjemt i furuskog – det forsvinner inn i trærne. Gulv-til-tak glassfasade, badstue og grill. ~€220–260/natt."},{"id":"est-a02","n":"Ohesaare Windmill, Saaremaa","co":"estonia","re":"Saaremaa","ty":"accommodation","ca":["sleep","unusual"],"s":"Estonia's only gable windmill you can sleep in. Solar power, no mains electricity. June–August only. €95/night for 2 people.","ll":[58.19,22.24],"rt":2,"tg":["windmill","unusual accommodation","off-grid","Saaremaa","island"],"lo":"19th-century gable windmill converted to off-grid accommodation for up to 5 people. Solar-powered lighting only. The surrounding Saaremaa alvar meadows are peaceful.","pr":{"time":"Overnight","cost":"€95/night (2 people); extra bed €30","transport":"Ohesaare village, Saaremaa — car required","tips":"June–August only. Book directly: saaremaatuulik.ee. Bring food — no shops nearby."},"n_no":"Ohesaare vindmølle, Saaremaa","s_no":"Estlands eneste gavlvindmølle der du kan overnatte. Solenergi, ingen strøm fra nettet. Juni–august. €95 per natt for 2 personer."},{"id":"est-a03","n":"RMK Free Forest Campsites","co":"estonia","re":"All Estonia","ty":"accommodation","ca":["sleep"],"s":"Hundreds of free legal wild campsites across Estonia — fireplace, sometimes a toilet. The best wild camping system in Europe.","ll":[59.437,25.0],"rt":3,"tg":["wild camping","free","forest","RMK","legal","motorhome"],"lo":"RMK (Estonian State Forests) maintains free campsites throughout the country. No booking needed. Fire pits, benches, dry toilets, sometimes shelters. The RMK app shows all locations.","pr":{"time":"Overnight","cost":"Free","transport":"Across Estonia — download RMK app or rmk.ee","tips":"Download the RMK app before entering Estonia. Best sites in Lahemaa NP, Saaremaa, and Hiiumaa."},"n_no":"RMK gratis skogscampingplasser","s_no":"Hundrevis av gratis, lovlige friluftsplasser i hele Estland – bålplass og noen ganger toalett. Det beste systemet for friluftscamping i Europa."},{"id":"est-a04","n":"Pädaste Manor, Muhu Island","co":"estonia","re":"Muhu","ty":"accommodation","ca":["sleep"],"s":"16th-century manor on Muhu Island — Small Luxury Hotels of the World. Michelin-starred Alexander Restaurant.","ll":[58.579,23.168],"rt":2,"tg":["luxury hotel","manor","Michelin","Muhu island","island stay"],"lo":"The Alexander Restaurant is among Estonia's best — local seafood, foraged herbs, island-farmed meats. 24 rooms across period buildings. Spa overlooking the sea.","pr":{"time":"1–2 nights minimum","cost":"€352–1,330/night","transport":"Muhu island via Virtsu–Kuivastu ferry","tips":"Book Alexander Restaurant 4–6 weeks ahead in summer."},"n_no":"Pädaste gods, Muhu","s_no":"Herregård fra 1500-tallet på Muhu – en del av Small Luxury Hotels of the World. Michelin-stjernede Alexander Restaurant."},{"id":"est-fv01","n":"Tallinn Old Town Days","co":"estonia","re":"Tallinn","ty":"festival","ca":["history","unusual"],"s":"Annual June festival where the medieval Old Town fills with craftspeople, musicians, and period performers. One of the best free festivals in Estonia.","ll":[59.4356,24.7406],"rt":2,"tg":["festival","medieval","June","Old Town","free","crafts"],"lo":"Old Town Days fills the streets around Raekoja plats with historical demonstrations and craft markets. The Dominican Monastery courtyard and the streets around it are the focal points. Genuinely atmospheric.","pr":{"time":"Full day","cost":"Free","transport":"Tallinn Old Town","tips":"Early June each year. Check tallinnoldtowndays.ee for exact dates. Arrive early for best craft stalls."},"n_no":"Tallinns gamlebysdager","s_no":"Årlig junifestival der den middelalderske gamlebyen fylles av håndverkere, musikere og kostymedansere."},{"id":"lat-r01","n":"House of the Blackheads, Riga","co":"latvia","re":"Riga","ty":"attraction","ca":["history"],"s":"Opulent Flemish Renaissance hall for unmarried Hanseatic merchants. Destroyed in WWII, perfectly rebuilt 1999. The finest single building in Riga's Old Town.","ll":[56.9417,24.1042],"rt":3,"tg":["Hanseatic","architecture","guild hall","museum","Riga"],"lo":"The Brotherhood of Blackheads was a guild of unmarried foreign merchants. The building was destroyed in 1941 and the 1999 reconstruction is near-perfect. The grand interior is still used for concerts. Audio guides in 9 languages.","pr":{"time":"1–2 hours","cost":"€10 adult","transport":"Rātslaukums, Old Town, Riga. Daily 10:00–17:00.","tips":"Combine with the adjacent Occupation Museum and House of Three Brothers."},"n_no":"De svartehodenes hus, Riga","s_no":"Overdådig flamsk renessansebygg for ugifte hanseatiske kjøpmenn. Ødelagt under WWII, perfekt gjenoppbygd i 1999."},{"id":"lat-r02","n":"KGB Corner House (Stūra Māja), Riga","co":"latvia","re":"Riga","ty":"attraction","ca":["coldwar","history","unusual"],"s":"Soviet KGB's Latvian headquarters. Original basement prison cells, interrogation rooms, and solitary confinement preserved. Guided tours only, minimum age 12.","ll":[56.9582,24.1242],"rt":3,"tg":["KGB","Cold War","Soviet","prison","dark tourism","guided tour"],"lo":"The 'Corner House' was synonymous with terror for Riga's residents from 1940 to 1991. Interrogations, torture, and deportations were organised from this building. The basement is entirely preserved — soundproofed interrogation rooms, the corridor prisoners walked to their fate.","pr":{"time":"1.5 hours","cost":"€15 guided tour; small free exhibition for walk-ins","transport":"Corner of Brīvības and Stabu iela, Riga. Pre-book: bezrindas.lv.","tips":"Minimum age 12. The guided tour is essential — without context the cells are just cells."},"n_no":"KGB-hjørnebygget (Stūra Māja), Riga","s_no":"KGBs latviske hovedkvarter i sovjettiden. Opprinnelige fengselsceller, avhørsrom og isolasjonsceller er bevart. Kun guidede turer."},{"id":"lat-r03","n":"Riga Central Market","co":"latvia","re":"Riga","ty":"attraction","ca":["food","history","unusual"],"s":"Five former WWI Zeppelin hangars converted into Europe's largest covered market. Smoked fish displays like works of art. 3,000+ stands.","ll":[56.9437,24.1149],"rt":3,"tg":["market","Zeppelin","smoked fish","food","Hanseatic","free entry"],"lo":"The five pavilions (meat, fish, dairy, vegetables, general) were repurposed Zeppelin aircraft hangars from WWI, each over 200m long. The fish pavilion alone is worth the visit — smoked mackerel, pickled herring in 12 varieties, salted sprats. Buy provisions for two days.","pr":{"time":"1–2 hours","cost":"Free entry; €10–20 for shopping","transport":"Nēģu iela 7, adjacent to Riga Central Station. Open daily from 7am.","tips":"Fish pavilion busiest Saturday morning. Also check the dairy pavilion for Jāņu siers."},"n_no":"Rigas sentralmarked","s_no":"Fem tidligere zeppelinhangarer fra WWI omgjort til Europas største overdekkede marked. Røkt fisk-utstillingen er som et kunstverk."},{"id":"lat-r04","n":"Riga Art Nouveau Quarter","co":"latvia","re":"Riga","ty":"attraction","ca":["history","unusual"],"s":"800+ Art Nouveau buildings — the densest collection in the world. Alberta Street has Eisenstein's extravagant facades of enormous sculpted faces and gargoyles.","ll":[56.958,24.115],"rt":2,"tg":["Art Nouveau","architecture","Eisenstein","museum","walking","free views"],"lo":"Alberta iela 2a, 4, 6, 8 are all by Mikhail Eisenstein (father of film director Sergei Eisenstein) — extravagant facades with screaming faces and mythological figures. Number 12 is the Art Nouveau Museum. The 'Black Cat' building on Meistaru iela (iron black cats on the rooftop) is nearby.","pr":{"time":"1–2 hours walking","cost":"Museum entry varies; street views free","transport":"Alberta iela, Centrs district, ~15 min walk from Old Town","tips":"Pick up a free Art Nouveau walking map from the tourist information at Town Hall Square."},"n_no":"Rigas jugendstilkvarter","s_no":"Over 800 jugendstilbygninger – den tetteste samlingen i verden. Alberta gata har Eisensteins ekstravagante fasader."},{"id":"lat-r05","n":"Museum of the Occupation of Latvia","co":"latvia","re":"Riga","ty":"attraction","ca":["history"],"s":"One of the most powerful occupation museums in Europe. Soviet and Nazi occupations 1940–1991 told through personal testimonies, Gulag artefacts, and deportation records.","ll":[56.948,24.108],"rt":3,"tg":["occupation","Soviet","Nazi","deportation","museum","dark tourism"],"lo":"The museum tells both occupations through individual stories — Latvians deported to Siberia, families torn apart, resistance fighters. The documentary film on arrival is a required starting point.","pr":{"time":"2–3 hours","cost":"€8 adult; guided tour €15","transport":"Town Hall Square area, Riga Old Town. Closed Tuesdays and Wednesdays.","tips":"Allow at least 2 hours. The guided tour provides essential context."},"n_no":"Museum for Latvias okkupasjon","s_no":"Et av Europas mest grepende okkupasjonsmuseer. Den sovjetiske og nazistiske okkupasjonen 1940–1991 fortalt gjennom personlige vitnesbyrd."},{"id":"lat-r06","n":"Latvian Academy of Sciences Observation Deck","co":"latvia","re":"Riga","ty":"attraction","ca":["unusual","history"],"s":"Stalinist 'wedding cake' tower built 1958. 360° panorama from 65m. Almost no tourists — a genuine hidden gem.","ll":[56.944,24.126],"rt":2,"tg":["Stalinist architecture","viewpoint","Soviet","observation deck","hidden gem"],"lo":"Locals call it 'Stalin's Birthday Cake' — a stepped neo-classical shape similar to Moscow's Seven Sisters. The observation deck gives an excellent panorama over Riga's rooftops, the Daugava River, and the Soviet-era suburbs.","pr":{"time":"30 minutes","cost":"~€3–5","transport":"Akademijas laukums, 10 min walk from Old Town","tips":"Far fewer people than St Peter's Church tower, with better views."},"n_no":"Latvias vitenskapsakademi – utsiktsdekk","s_no":"Stalinistisk «bryllupskake»-tårn bygget i 1958. 360° panorama fra 65 m. Nesten ingen turister – en ekte skjult perle."},{"id":"lat-r07","n":"Riga Motor Museum","co":"latvia","re":"Riga","ty":"attraction","ca":["history","unusual"],"s":"One of the best car museums in Europe. Features Stalin's, Brezhnev's, and Khrushchev's armoured limousines alongside rare pre-war vehicles.","ll":[56.9707,24.2276],"rt":2,"tg":["cars","Soviet","Stalin","Brezhnev","museum","limousine"],"lo":"The Soviet leaders' cars are the highlight — Stalin's 1946 ZIS-110 and Brezhnev's bullet-proof Chaika. Brezhnev's story: after a stroke he collected luxury foreign cars (Rolls-Royces, Mercedes) as gifts — all displayed here.","pr":{"time":"1.5–2 hours","cost":"€12 adult","transport":"Sergeja Eizenšteina 6, Riga suburbs — bus or tram. Tue–Sun 10:00–18:00.","tips":"Interactive exhibits work well for children."},"n_no":"Rigas motormuseum","s_no":"Et av Europas beste bilmuseer. Viser Stalins, Bresjnevs og Khrusjtsjovs pansrede limousiner side om side med sjeldne førkrigskjøretøy."},{"id":"lat-r08","n":"Rozengrāls Restaurant, Riga","co":"latvia","re":"Riga","ty":"food","ca":["food","history"],"s":"Medieval-themed restaurant in a Riga Old Town cellar. Braised rabbit with prunes, stewed veal cheeks, skewered pig meat. Atmospheric.","ll":[56.948,24.108],"rt":2,"tg":["medieval","restaurant","Latvian","atmospheric","cellar","rabbit"],"lo":"One of the most consistent medieval-themed restaurants in the Baltic states. The cellar setting is genuine — 13th-century foundations. The braised rabbit with prunes and pine nuts is the signature dish.","pr":{"time":"2 hours","cost":"~€20–35 per head","transport":"Rozena iela, Riga Old Town","tips":"Book ahead for evenings."},"n_no":"Rozengrāls Restaurant, Riga","s_no":"Middelalder-tematisert restaurant i en kjeller i Rigas gamle bydel. Braisert kanin med svisker, stuet kalvekinn og kjøtt på spyd."},{"id":"lat-r09","n":"LIDO Self-Service, Riga","co":"latvia","re":"Riga","ty":"food","ca":["food"],"s":"Huge self-service Latvian buffet in a wooden complex near the Daugava. Traditional dishes for ~€6–7. Perfect for a quick, authentic, budget lunch.","ll":[56.933,24.127],"rt":2,"tg":["buffet","Latvian","budget","traditional","family friendly","self-service"],"lo":"The flagship LIDO complex on Krasta iela is a timber-built folk-style complex with live music at weekends. Queues at peak times but moves fast. Grey peas with bacon, pork schnitzel, potato pancakes, and dozens of desserts.","pr":{"time":"30–45 minutes","cost":"~€6–7 for a full meal","transport":"Krasta iela 76, Riga — or central branches. Multiple locations.","tips":"Weekend afternoons can be busy. Great for families with children."},"n_no":"LIDO Self-Service, Riga","s_no":"Stor selvbetjeningsbuffet med lettisk mat i et trekompleks ved Daugava. Tradisjonelle retter for ~€6–7. Perfekt for en rask, ekte og budsjettvennlig lunsj."},{"id":"lat-j01","n":"Jūrmala Beach & Art Nouveau Villas","co":"latvia","re":"Jūrmala","ty":"attraction","ca":["history","nature"],"s":"26km of white sand beach on the Gulf of Riga. Soviet restricted resort — special pass required to visit. Hundreds of 1880s–1920s Art Nouveau wooden villas survive.","ll":[56.9771,23.7983],"rt":2,"tg":["beach","Art Nouveau","Soviet history","villas","train accessible"],"lo":"Jūrmala was reserved for party elite and loyal workers — the restriction preserved the beach town's extraordinary pre-war villa architecture. The Dzintari Concert Hall hosts the New Wave music competition each July.","pr":{"time":"Half to full day","cost":"Free; summer road toll ~€2","transport":"25km from Riga. Train from Riga Central: ~30 min, ~€2. Very frequent service.","tips":"Get off at Majori for the main beach. Walk the residential streets behind the beach for villa architecture."},"n_no":"Jūrmala – strand og Art Nouveau-villaer","s_no":"26 km med hvit sanstrand ved Rigabukten. Hundrevis av trebygde Art Nouveau-villaer fra 1880–1920-tallet er bevart."},{"id":"lat-k01","n":"Great Ķemeri Bog Boardwalk","co":"latvia","re":"Ķemeri NP","ty":"nature","ca":["nature"],"s":"3.4km circular boardwalk through a pristine raised bog. Dwarf pines, peat pools, complete silence. Best bog walk in Latvia.","ll":[56.9165,23.4647],"rt":3,"tg":["bog","boardwalk","nature trail","free","silence","Latvia"],"lo":"The boardwalk leads across sphagnum moss bog, past dark peat pools that reflect the sky. In autumn the bog turns copper and amber. At the centre: an observation tower. The surrounding sulfur springs that made Ķemeri a 19th-century spa town are on a short side trail.","pr":{"time":"2–3 hours","cost":"Free","transport":"Train from Riga to Ķemeri station (~50 min), then 3.5km walk to trailhead.","tips":"Combine with Jūrmala beach (15km north). Bring mosquito repellent in summer. Best light at dawn."},"n_no":"Den store myrstien i Ķemeri","s_no":"3,4 km lang rundtur på treplanker gjennom en urørt høymyr. Dvergfuruer, torvdammer, fullstendig stillhet. Latvias beste myrtur."},{"id":"lat-c01","n":"Cape Kolka — Two Seas Collide","co":"latvia","re":"Kurzeme","ty":"attraction","ca":["nature","unusual"],"s":"The northernmost tip of Courland, where the open Baltic Sea and Gulf of Riga visibly collide. Different wave patterns, different water colours. Windswept, remote.","ll":[57.75,22.6],"rt":3,"tg":["cape","two seas","Livonian","remote","free","coastal"],"lo":"The collision of two bodies of water is genuinely visible — different wave patterns on each side. The area was a Soviet restricted military zone; abandoned radar stations remain in the forest. Ancestral homeland of the nearly-extinct Livonian people.","pr":{"time":"Half day","cost":"Free","transport":"~160km from Riga (2–2.5 hrs by car). Very infrequent buses.","tips":"Bring food and water — almost no services at the cape. The forests either side are excellent for walking."},"n_no":"Cape Kolka – to hav møtes","s_no":"Den nordligste odden av Courland, der det åpne Østersjøen og Rigabukten møtes i et synlig bølgekrasj. Vindfullt og avsidesliggende."},{"id":"lat-c02","n":"Mazirbe Boat Cemetery","co":"latvia","re":"Kurzeme","ty":"attraction","ca":["unusual","nature"],"s":"Hauntingly beautiful collection of decaying old fishing boats on the shore near Mazirbe. One of the most photographed sites in Latvia.","ll":[57.6767,22.3167],"rt":2,"tg":["boat cemetery","decay","photography","coastal","free","unusual"],"lo":"The wooden fishing boats were simply left when their owners could no longer maintain them. Over decades they have settled into the shore, colonised by grass and wildflowers.","pr":{"time":"1 hour","cost":"Free","transport":"15km south of Cape Kolka on the coast road. Near Mazirbe village.","tips":"Best in morning light. Also visit the Liv People's House in Mazirbe."},"n_no":"Mazirbe båtkirkegård","s_no":"En stemningsfull samling av forfalne gamle fiskebåter på stranden nær Mazirbe. Et av de mest fotograferte stedene i Latvia."},{"id":"lat-c03","n":"Slītere Lighthouse & Blue Hills Trail","co":"latvia","re":"Slītere NP","ty":"nature","ca":["nature","unusual"],"s":"1849 lighthouse atop the Blue Hills — an ancient Ice Age coastline now 15–20m above sea level in forest. Spring-fed Blue Lakes at the cliff base.","ll":[57.6333,22.2833],"rt":2,"tg":["lighthouse","Ice Age","nature trail","Blue Hills","free","ancient coastline"],"lo":"The Blue Hills (Zilaiskalns) are a fossilised shoreline of an Ice Age lake — what was Baltic coast thousands of years ago, now deep in old-growth forest. At the base: spring-fed Blue Lakes with extraordinary water clarity.","pr":{"time":"2–3 hours","cost":"Free","transport":"Inside Slītere NP; car essential","tips":"Walk down from the lighthouse to the Blue Lakes at the cliff base."},"n_no":"Slītere fyr & Blå-fjell-stien","s_no":"Fyrtårn fra 1849 på toppen av Blå fjellene – en gammel istidskyst. Kildematede Blå innsjøer ved foten av skrenten."},{"id":"lat-c04","n":"Kuldīga — Europe's Widest Waterfall","co":"latvia","re":"Kuldīga","ty":"attraction","ca":["nature","unusual"],"s":"249m wide, only 2m tall — completely absurd. In summer, people wade across the lip. The 17th-century brick bridge downstream is one of the most photographed in Latvia.","ll":[56.9678,21.9789],"rt":3,"tg":["waterfall","widest","Kuldīga","Hanseatic","bridge","free"],"lo":"The Ventas Rumba looks more like a weir until you stand next to it and feel the scale. In spring, vimba fish attempt to leap upstream. The adjacent old town of Kuldīga has beautiful Hanseatic architecture. The Riežupe Sand Caves are 4km north (€6, guided candlelit tour).","pr":{"time":"2–3 hours","cost":"Free (waterfall); Sand Caves €6","transport":"165km from Riga (~2.5 hrs); 100km from Liepāja","tips":"Stand on the brick bridge 200m downstream for the best perspective shot."},"n_no":"Kuldīga – Europas bredeste foss","s_no":"249 m bred, kun 2 m høy – helt absurd. Om sommeren vasser folk rett over kanten. Den 1600-talls mursteinbroen er blant de mest fotograferte i Latvia."},{"id":"lat-c05","n":"Irbene Radio Telescope (VIRAC)","co":"latvia","re":"Ventspils","ty":"attraction","ca":["coldwar","unusual"],"s":"Soviet Navy signals intelligence station with 32m radio telescope, 700m underground tunnel, and ghost town ruins. Now used for real radio astronomy.","ll":[57.5581,21.8536],"rt":3,"tg":["Cold War","radio telescope","Soviet","spy station","underground tunnel","unique"],"lo":"Built for intercepting Western satellite communications. Closed military town of 2,000+ residents completely hidden from maps. Soviets poured acid on the motors when leaving in 1994 but couldn't remove the dishes. Now part of the European VLBI Network for radio astronomy.","pr":{"time":"2–3 hours","cost":"Contact VIRAC: infovirac@venta.lv or +371 29230818","transport":"~30km north of Ventspils. Car essential.","tips":"Pre-arrange guided tours in advance. Tours from 1 March to 30 November. Enter the underground tunnel."},"n_no":"Irbene radioteleskop (VIRAC)","s_no":"Tidligere signaletterretningsstasjon for den sovjetiske marinen, med 32 m radioteleskop og 700 m underjordisk tunnel. Brukes nå til ekte radioastronomi."},{"id":"lat-c06","n":"Karosta Military District, Liepāja","co":"latvia","re":"Liepāja","ty":"attraction","ca":["coldwar","unusual"],"s":"30,000 Soviet military personnel once lived in this fully closed city. They simply left in 1994. Byzantine Orthodox cathedral, Tsarist naval buildings, and abandoned Soviet apartment blocks.","ll":[56.5937,21.016],"rt":2,"tg":["Soviet","military","ghost district","cathedral","Northern Forts","free"],"lo":"Karosta ('War Harbour') served the Russian Imperial Navy, Latvia, Nazi Germany, and Soviet Union in sequence. The St Nicholas Naval Cathedral (1903) financed by Tsar Nicholas II was used as a cinema under the Soviets. The Northern Forts (Tsarist-era sea fortifications crumbling into the Baltic) are free to explore.","pr":{"time":"Half day","cost":"Free to explore independently","transport":"North
