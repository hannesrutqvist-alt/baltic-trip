lder residents may remember their grandparents' relationships with household snakes."},"ki":1,"n_no":"Hellig slangekult — Žaltys i levende minne","s_no":"Helt inn på 1900-tallet holdt litauiske bonderfamilier en hellig gresslange (žaltys) bak komfyren, la fram melk og trodde den beskyttet hjemmet."},{"id":"lit-w05","n":"Stelmužė Oak — Europe's Oldest Living Tree","co":"lithuania","re":"Northeast Lithuania","ty":"attraction","ca":["unusual","nature"],"s":"1,500–2,000 years old. Girth of 13 metres. Suspected ancient pagan worship site. One of the oldest known oaks in Europe. A living relic of the pre-Christian Baltic religion.","ll":[55.75,25.69],"rt":2,"tg":["oldest oak","1500-2000 years","13m girth","pagan worship","Lithuania","free","living relic","ancient"],"lo":"The Stelmužė Oak in Zarasai district is between 1,500 and 2,000 years old — it was a mature tree when the first Christian missionaries arrived in Lithuania (in the 14th century, making Lithuania the last European country to Christianise). Its girth is 13 metres. Researchers suspect it was a site of pagan worship before Christianity reached this corner of the Baltic. It continues to grow — alive, covered in moss, surrounded by a small protected grove.","pr":{"time":"30 minutes","cost":"Free","transport":"Stelmužė village, Zarasai district, northeast Lithuania (80km from Vilnius). Car required.","tips":"The oak is on private/communal land but freely accessible. Combine with Aukštaitija National Park lakes nearby for a full northeast Lithuania day."},"ki":1,"n_no":"Stelmužė Oak — Europas eldste levende tre","s_no":"1 500–2 000 år gammelt. Omkrets på 13 meter. Mistenkt å ha vært et gammelt hedensk tilbedelsesobjekt. En levende relikvie fra den førkristne baltiske religionen."},{"id":"pol-w01","n":"Invisible Museum Gdańsk — Tour Guided by the Blind","co":"poland","re":"Gdańsk","ty":"attraction","ca":["unusual"],"s":"Complete darkness museum where blind and visually impaired guides lead you through a pitch-black recreation of Gdańsk. You navigate by touch, smell, and sound. Draw a picture in the dark. One of the most unusual museum experiences in Europe.","ll":[54.356,18.643],"rt":3,"tg":["invisible museum","complete darkness","blind guides","touch","smell","sound","Gdańsk","unique","accessible","unusual"],"lo":"The Invisible Gdańsk Museum (Niewidzialny Gdańsk, ul. Okopowa 7) recreates the city of Gdańsk in complete darkness. Blind and visually impaired guides take you through by touch — identifying monuments by shape, reading information in Braille, trying to draw pictures you can't see. You use your hearing to navigate sound demonstrations and your sense of smell to identify places. 'You touch things you know every day... when you can't see them, it will take you a while to recognize the shape of the object.' One of Europe's most genuinely unusual museum experiences.","pr":{"time":"1–1.5 hours","cost":"~€8–12 adult; ~€5 child","transport":"ul. Okopowa 7, Gdańsk — 10 min walk from Old Town","tips":"Book in advance — groups are small by necessity. Suitable for children aged 7+ (good life experience). The guides are exceptional."},"ki":1,"n_no":"Invisible Museum Gdańsk — guidet av blinde","s_no":"Museum i fullstendig mørke der blinde og svaksynte guider leder deg gjennom en bekmørk gjenskapning av Gdańsk. Du navigerer ved hjelp av berøring, lukt og lyd."},{"id":"pol-w02","n":"Bioluminescence — Bay of Puck Glows Turquoise at Night","co":"poland","re":"Rewa / Bay of Puck","ty":"attraction","ca":["unusual","nature"],"s":"On warm summer nights, the Bay of Puck near Rewa glows turquoise. Millions of bioluminescent dinoflagellates light up with every movement. Throw sand, stomp your foot — the water explodes in cold blue-green light.","ll":[54.624,18.492],"rt":3,"tg":["bioluminescence","Bay of Puck","Rewa","turquoise glow","night swimming","dinoflagellates","Poland","free","unique"],"lo":"The Bay of Puck near Rewa (30km north of Gdańsk) experiences bioluminescence on hot, calm, dark summer nights. 'At night in Rewa the Bay of Puck glows with a turquoise light.' Caused by Alexandrium ostenfeldii dinoflagellates — first documented in Polish waters in 1997 (normally a tropical phenomenon). 'Fleeing fish will flash bright streaks like underwater flares.' ⚠️ The organisms may be mildly toxic — swallow as little water as possible. Best July–August during warm spells.","pr":{"time":"1–2 hours (night)","cost":"Free","transport":"Rewa village, ~30km north of Gdańsk. Near the Hel Peninsula junction.","tips":"Arrive at night on a warm, windless evening. Throw sand into the water to test — if you see flashes, it's active. Don't swallow the water (potential toxicity warning)."},"sw":1,"ki":1,"n_no":"Bioluminescence — Puck-bukta lyser turkis om natten","s_no":"På varme sommernetter lyser Puck-bukta nær Rewa turkis. Millioner av bioluminescerende dinoflagellater tennes opp med enhver bevegelse."},{"id":"pol-w03","n":"Amber UV Night Hunt — Beaches Glow in the Dark","co":"poland","re":"Polish Baltic coast","ty":"attraction","ca":["unusual","nature"],"s":"Baltic amber fluoresces bright blue-green under a UV torch at night — making it easy to spot on dark beaches. Night amber hunting with a €10 UV torch is one of the most satisfying Baltic experiences. Hel Peninsula and beaches near Łeba are best.","ll":[54.6117,18.8081],"rt":3,"tg":["amber hunting","UV torch","night","glowing beach","Hel Peninsula","Poland","free","treasure hunt","unique"],"lo":"Baltic amber is autofluorescent — it glows intensely blue-green under a 395nm UV (black light) torch while surrounding stones and pebbles stay dark. Normal daylight amber appears golden but blends with pebbles; at night with a UV torch it leaps out of the seaweed. 'Arrive at the shore after stormy weather and at night, equipped with a UV light torch.' Everything you find on the public beach is legally yours to keep. A €10 UV torch from any hardware store transforms the beach into a treasure hunt. Best spots: beaches after storms on the Hel Peninsula, beaches near Łeba, Sobieszewo Island.","pr":{"time":"1–3 hours (night)","cost":"Free (need a UV torch, ~€10–15)","transport":"Any Baltic beach in Poland — best after NW wind storms","tips":"Buy a 395nm UV torch (hardware shop or online) before the trip. Go at dawn (4–5am) or after midnight. Walk the seaweed line slowly. Every glowing orange-gold speck is potential amber."},"ki":1,"n_no":"Amber UV Night Hunt — strendene lyser i mørket","s_no":"Baltisk rav fluorescerer klart blågrønt under en UV-lommelykt om natten. Nattlig ravjakt med en UV-lommelykt til €10 er en av de mest tilfredsstillende Østersjø-opplevelsene."},{"id":"pol-w04","n":"Torpedownia — Submerged German Torpedo Station, Gdynia","co":"poland","re":"Gdynia","ty":"attraction","ca":["unusual","coldwar","history"],"s":"A German torpedo testing and launch station from 1942, now partially submerged and abandoned just off the Gdynia coast. The long wooden pier was blown up. Walls and machinery visible from the beach — swimable to in calm conditions.","ll":[54.5879,18.5458],"rt":2,"tg":["torpedo station","submerged","German","WWII","Gdynia","abandoned","underwater","unusual","free"],"lo":"The Torpedownia (torpedo testing station) was built by German forces in 1942–1945 at Babie Doły in northern Gdynia for torpedo calibration and testing. After the war the Soviets used it for military dive training. Then it was abandoned. The long wooden approach pier was demolished. The station is now partially submerged and slowly collapsing into the Baltic Sea — parts visible from the beach, parts underwater. Atlas Obscura-listed. Coordinates: 54.587905, 18.54578. ⚠️ In poor structural condition.","pr":{"time":"1–2 hours","cost":"Free","transport":"Babie Doły beach, northern Gdynia (6 miles from city centre). Bus from Gdynia.","tips":"Visible from the beach. Can be swum to in calm conditions. ⚠️ Structures are unstable — do not climb on them. Best observed from water level."},"n_no":"Torpedownia — nedsenkt tysk torpedostasjon, Gdynia","s_no":"En tysk torpedo-testnings- og oppskytningstasjon fra 1942, nå delvis nedsenkt og forlatt like utenfor Gdynias kyst."},{"id":"pol-w05","n":"Mechowskie Sand Caves — Northern Europe's Only Sandstone Caves","co":"poland","re":"Pomerania","ty":"attraction","ca":["unusual","nature"],"s":"The only sandstone caves in all of Poland and northern Europe — formed by glacial water during the last ice age. 61m accessible route with stalactites and red iron-oxide formations. Nature reserve since 1955. Near Rewa (60km from Gdańsk).","ll":[54.64,18.46],"rt":2,"tg":["sand caves","only in Northern Europe","stalactites","glacial","Pomerania","nature reserve","unusual","60km Gdańsk"],"lo":"The Mechowskie Caves near Rewa are unique in all of northern Europe — the only sandstone caves formed during the last glaciation, when meltwater carved cavities through the sand and clay. Inside: a 61-metre accessible corridor with two entrances, ceilings as low as 2m, stalactites, flowstones, and striking red iron-oxide formations. Protected as a nature reserve since 1955. Easy to reach from the Hel Peninsula or Gdańsk as a day addition.","pr":{"time":"1 hour","cost":"Small entry fee (~15 PLN)","transport":"Mechowo village, near Rewa, ~60km north of Gdańsk. Car or bus from Tri-City.","tips":"Combine with Rewa (where the Bay of Puck bioluminescence occurs at night) for a genuinely unusual day."},"ki":1,"n_no":"Mechowskie sandsteinshuler — Nord-Europas eneste sandsteinshuler","s_no":"De eneste sandsteinshuler i hele Polen og Nord-Europa – dannet av istidens smeltevann. 61 meter tilgjengelig rute med stalaktitter og røde jernoksidformasjoner."},{"id":"kid-est01","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual","history"],"ll":[59.448,24.7558],"rt":3,"tg":["science","interactive","planetarium","kids"],"ki":1,"ad":1,"pr":{"time":"2–3 hours","cost":"€6–9 (age 3–6); €16 adult","transport":"15-min walk from Tallinn Old Town","tips":"Planeta function renderPlan(){const entries=ENTRIES.filter(e=>onPlan(e.id)).map(e=>gps?({...e,_d:haversine(gps.lat,gps.lon,e.ll[0],e.ll[1])}):e).sort((a,b)=>(a._d||0)-(b._d||0));document.getElementById('plan-count').textContent=entries.length?`(${entries.length})`:'';document.getElementById('plan-actions-row').style.display=entries.length?'flex':'none';if(!entries.length){document.getElementById('plan-list').innerHTML=`<div class="plan-empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>${t('plan_empty_1')}<br>${t('plan_empty_2')} <b>${t('plan_add')}</b>.</p></div>`;return;}document.getElementById('plan-list').innerHTML=entries.map(e=>{const d=e._d!=null?fmtDist(e._d):'';const cats=(e.ca||[]).slice(0,2).map(catTag).join('');return`<div style="display:flex;align-items:center"><div class="card" data-id="${e.id}" style="flex:1;border:none;padding:12px 12px 12px 16px"><div class="card-dot" style="background:${COUNTRY_COLOR[e.co]}"></div><div class="card-body"><div class="card-name">${getName(e)}</div><div class="card-meta">${cats}${d?`<span style="font-size:12px;color:var(--txt3)">${d}</span>`:''}</div></div><div class="card-right"><div class="card-rating">${ratingEl(e.rt)}</div></div></div><button class="plan-card-remove" data-remove="${e.id}" style="margin-right:12px"><svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div style="height:1px;background:var(--bg3);margin:0 16px"></div>`;}).join('');}
function openSheet(e){sheetEntry=e;descExpanded=false;const c=COUNTRY_COLOR[e.co]||'#8a6050';document.getElementById('sh-dot').style.background=c;document.getElementById('sh-name').textContent=getName(e);document.getElementById('sh-region').textContent=`${COUNTRY_FLAG[e.co]||''} ${e.re}`;document.getElementById('sh-rating').innerHTML=ratingEl(e.rt);document.getElementById('sh-cats').innerHTML=(e.ca||[]).map(catTag).join('');document.getElementById('sh-desc-short').textContent=lang==='no'&&e.s_no?e.s_no:e.s;const fullDesc=e.lo||'';document.getElementById('sh-desc-full').textContent=fullDesc;document.getElementById('sh-desc-full').style.display='none';const expandBtn=document.getElementById('sh-expand');if(fullDesc){expandBtn.textContent=t('read_more');expandBtn.classList.remove('hide');}else{expandBtn.classList.add('hide');}const pr=e.pr||{};const prEl=document.getElementById('sh-practical');if(pr.time||pr.cost||pr.transport||pr.tips){prEl.innerHTML=[pr.time?`<div class="pr-item"><div class="pr-label">${t('pr_time')}</div><div class="pr-val">${pr.time}</div></div>`:'',pr.cost?`<div class="pr-item"><div class="pr-label">${t('pr_cost')}</div><div class="pr-val">${pr.cost}</div></div>`:'',pr.transport?`<div class="pr-item pr-full"><div class="pr-label">${t('pr_transport')}</div><div class="pr-val">${pr.transport}</div></div>`:'',pr.tips?`<div class="pr-item pr-full"><div class="pr-label">${t('pr_tips')}</div><div class="pr-val">${pr.tips}</div></div>`:''].join('');prEl.style.display='grid';}else{prEl.style.display='none';}const flags=[];if(e.ed)flags.push(`<span class="tag flag-win">📅 ${e.ed.replace(/2026-/g,'').replace('/','-')}</span>`);if(e.iw)flags.push(`<span class="tag flag-win">${t('flag_win')}</span>`);if(e.nm)flags.push(`<span class="tag flag-nm">${t('flag_nm')}</span>`);if(e.sw)flags.push(`<span class="tag flag-sw">${t('flag_sw')}</span>`);if(e.sa)flags.push(`<span class="tag flag-sa">${t('flag_sa')}</span>`);if(e.ki)flags.push(`<span class="tag flag-ki">${t('flag_ki')}</span>`);if(gps){const d=haversine(gps.lat,gps.lon,e.ll[0],e.ll[1]);flags.push(`<span class="tag">${bearingArrow(gps.lat,gps.lon,e.ll[0],e.ll[1])} ${fmtDist(d)} ${t('flag_away')}</span>`);}document.getElementById('sh-flags').innerHTML=flags.join('');document.getElementById('sh-coords').textContent=`${e.ll[0].toFixed(5)}, ${e.ll[1].toFixed(5)}`;const sc=matchScore(e);const scEl=document.getElementById('sh-score');scEl.textContent=`${sc}${t('pct_match')}`;scEl.style.color=scoreColor(sc);const rt=RATINGS[e.id];const rtEl=document.getElementById('sh-ratings');if(rt){let html='';if(rt.g!=null){const starsG='★'.repeat(Math.round(rt.g))+'☆'.repeat(5-Math.round(rt.g));const gcnt=rt.gn?`${rt.gn.toLocaleString()} ${t('reviews')}`:' ';html+=`<div class="rating-item"><div class="rating-platform">🌐 Google</div><div class="rating-score" style="color:#1a5ca8">${rt.g.toFixed(1)}</div><div class="rating-stars">${starsG}</div>${gcnt?`<div class="rating-count">${gcnt}</div>`:''}</div>`;if(rt.t!=null)html+='<div class="rating-sep"></div>';}if(rt.t!=null){const starsT='★'.repeat(Math.round(rt.t))+'☆'.repeat(5-Math.round(rt.t));const tcnt=rt.tn?`${rt.tn.toLocaleString()} ${t('reviews')}`:' ';html+=`<div class="rating-item"><div class="rating-platform">🟢 Tripadvisor</div><div class="rating-score" style="color:#1a7a50">${rt.t.toFixed(1)}</div><div class="rating-stars">${starsT}</div>${tcnt?`<div class="rating-count">${tcnt}</div>`:''}</div>`;}rtEl.innerHTML=html;rtEl.style.display='flex';}else{rtEl.innerHTML=`<div style="flex:1;text-align:center;color:var(--txt3);font-size:13px;padding:4px 0">${t('no_rating')}</div>`;rtEl.style.display='flex';}updateSheetPlanBtn();document.getElementById('sheet').classList.add('open');document.getElementById('sheet-overlay').classList.add('show');document.getElementById('sheet-scroll').scrollTop=0;}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheet-overlay').classList.remove('show');sheetEntry=null;}
function updateSheetPlanBtn(){const btn=document.getElementById('sh-plan');if(!sheetEntry)return;if(onPlan(sheetEntry.id)){btn.textContent=t('on_plan');btn.classList.add('on-plan');}else{btn.textContent=t('add_plan');btn.classList.remove('on-plan');}}
function applyLang(){const catPillMap={all:'cat_all',unusual:'cat_unusual',history:'cat_history',nature:'cat_nature',events:'cat_events',coldwar:'cat_coldwar',food:'cat_food',sleep:'cat_sleep',islands:'cat_islands'};const flagPillMap={sw:'cat_swim',plan:'cat_plan'};['map-filter-bar','explore-cats','nearby-cats'].forEach(barId=>{const bar=document.getElementById(barId);if(!bar)return;bar.querySelectorAll('[data-cat]').forEach(btn=>{const k=catPillMap[btn.dataset.cat];if(k)btn.textContent=(btn.dataset.cat==='all'?t('cat_all')+' '+ENTRIES.length:t(k));});bar.querySelectorAll('[data-flag]').forEach(btn=>{const k=flagPillMap[btn.dataset.flag];if(k)btn.textContent=t(k);});});const sortMap={score:'sort_score',dist:'sort_dist',rating:'sort_rating'};document.querySelectorAll('.sort-btn').forEach(btn=>{if(sortMap[btn.dataset.sort])btn.textContent=t(sortMap[btn.dataset.sort]);});const sl=document.querySelector('.sort-label');if(sl)sl.textContent=t('sort_label');const si=document.getElementById('search-input');if(si)si.placeholder=t('search_ph');const shm=document.getElementById('sh-maps');if(shm)shm.textContent=t('open_maps');const pm=document.getElementById('btn-plan-maps');if(pm)pm.textContent=t('plan_maps');const pc=document.getElementById('btn-plan-copy');if(pc)pc.textContent=t('plan_copy');const ll=document.getElementById('nearby-loc-label');if(ll&&!gps)ll.textContent=t('locate_hint');document.getElementById('offline-banner').textContent=t('offline');document.getElementById('btn-lang').textContent=lang==='no'?'EN':'NO';const navViews=['map','explore','nearby','plan'];const navKeys=['nav_map','nav_explore','nav_nearby','nav_plan'];navViews.forEach((v,i)=>{const btn=document.querySelector(`.nav-btn[data-view="${v}"]`);if(btn){const nodes=[...btn.childNodes].filter(n=>n.nodeType===3);if(nodes.length)nodes[nodes.length-1].textContent='\n      '+t(navKeys[i])+'\n    ';}});const titleMap={explore:'title_explore',nearby:'title_nearby',plan:'title_plan'};Object.entries(titleMap).forEach(([id,key])=>{const el=document.querySelector(`#screen-${id} .screen-title`);if(el){const txt=el.childNodes[0];if(txt&&txt.nodeType===3)txt.textContent=t(key)+' ';}});if(sheetEntry)updateSheetPlanBtn();}
let gpsMarker=null;
function locateMe(){if(!navigator.geolocation){alert('GPS not available');return;}navigator.geolocation.getCurrentPosition(pos=>{gps={lat:pos.coords.latitude,lon:pos.coords.longitude};if(MAP){if(gpsMarker)gpsMarker.remove();gpsMarker=L.circleMarker([gps.lat,gps.lon],{radius:7,fillColor:'#e8571a',fillOpacity:1,color:'#fff',weight:2}).addTo(MAP);MAP.setView([gps.lat,gps.lon],12);}renderNearby();renderExplore();renderPlan();},err=>{alert('Location error: '+err.message)},{enableHighAccuracy:true,timeout:10000});}
function showView(v){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('screen-'+v).classList.add('active');document.querySelector(`.nav-btn[data-view="${v}"]`).classList.add('active');if(v==='explore')renderExplore();else if(v==='nearby')renderNearby();else if(v==='plan')renderPlan();else if(v==='map'&&MAP)setTimeout(()=>MAP.invalidateSize(),50);}
function wireCombi(containerId,fkey,onchange){document.getElementById(containerId).addEventListener('click',e=>{const btn=e.target.closest('[data-cat],[data-flag]');if(!btn)return;const F=filters[fkey];if(btn.dataset.cat==='all'){F.cats=[];F.flags=[];document.querySelectorAll(`#${containerId} [data-cat],#${containerId} [data-flag]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');}else if(btn.dataset.cat){const c=btn.dataset.cat,on=btn.classList.contains('active');btn.classList.toggle('active');F.cats=on?F.cats.filter(x=>x!==c):[...F.cats,c];}else if(btn.dataset.flag){const fl=btn.dataset.flag,on=btn.classList.contains('active');btn.classList.toggle('active');F.flags=on?F.flags.filter(x=>x!==fl):[...F.flags,fl];}const allBtn=document.querySelector(`#${containerId} [data-cat="all"]`);if(F.cats.length===0&&F.flags.length===0)allBtn.classList.add('active');else allBtn.classList.remove('active');onchange();});}
function wirePills(containerId,filterKey,onchange){document.getElementById(containerId).addEventListener('click',e=>{const btn=e.target.closest('[data-cat],[data-country],[data-flag]');if(!btn)return;if(btn.dataset.cat){document.querySelectorAll(`#${containerId} [data-cat]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');filters[filterKey].cat=btn.dataset.cat;}else if(btn.dataset.country){const active=btn.classList.contains('active');document.querySelectorAll(`#${containerId} [data-country]`).forEach(b=>b.classList.remove('active'));if(!active){btn.classList.add('active');filters[filterKey].country=btn.dataset.country;}else filters[filterKey].country=null;}else if(btn.dataset.flag){const fl=btn.dataset.flag,active=btn.classList.contains('active');btn.classList.toggle('active');const flags=filters[filterKey].flags;if(active)filters[filterKey].flags=flags.filter(x=>x!==fl);else filters[filterKey].flags=[...flags,fl];}onchange();});}
document.getElementById('btn-lang').addEventListener('click',()=>setLang(lang==='en'?'no':'en'));
document.getElementById('nav').addEventListener('click',e=>{const btn=e.target.closest('[data-view]');if(btn)showView(btn.dataset.view);});
document.getElementById('btn-gps').addEventListener('click',locateMe);
document.getElementById('btn-nearby-locate').addEventListener('click',locateMe);
document.getElementById('sheet-overlay').addEventListener('click',closeSheet);
document.getElementById('sh-maps').addEventListener('click',()=>{if(sheetEntry)window.open(`https://maps.google.com/?q=${sheetEntry.ll[0]},${sheetEntry.ll[1]}`,'_blank');});
document.getElementById('sh-plan').addEventListener('click',()=>{if(sheetEntry)togglePlan(sheetEntry.id);});
document.getElementById('sh-expand').addEventListener('click',function(){descExpanded=!descExpanded;document.getElementById('sh-desc-full').style.display=descExpanded?'block':'none';this.textContent=descExpanded?t('read_less'):t('read_more');});
wireCombi('map-filter-bar','map',renderMapMarkers);
wireCombi('explore-cats','explore',renderExplore);
wirePills('explore-flags','explore',renderExplore);
wireCombi('nearby-cats','nearby',renderNearby);
document.querySelector('.sort-wrap').addEventListener('click',e=>{const btn=e.target.closest('[data-sort]');if(!btn)return;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filters.explore.sort=btn.dataset.sort;renderExplore();});
document.getElementById('search-input').addEventListener('input',function(){filters.explore.q=this.value;document.getElementById('search-clear').classList.toggle('show',!!this.value);renderExplore();});
document.getElementById('search-clear').addEventListener('click',()=>{document.getElementById('search-input').value='';filters.explore.q='';document.getElementById('search-clear').classList.remove('show');renderExplore();});
document.getElementById('explore-list').addEventListener('click',e=>{const card=e.target.closest('[data-id]');if(!card)return;const entry=ENTRIES.find(x=>x.id===card.dataset.id);if(entry)openSheet(entry);});
document.getElementById('nearby-list').addEventListener('click',e=>{const card=e.target.closest('[data-id]');if(!card)return;const entry=ENTRIES.find(x=>x.id===card.dataset.id);if(entry)openSheet(entry);});
document.getElementById('plan-list').addEventListener('click',e=>{const removeBtn=e.target.closest('[data-remove]');if(removeBtn){togglePlan(removeBtn.dataset.remove);return;}const card=e.target.closest('[data-id]');if(!card)return;const entry=ENTRIES.find(x=>x.id===card.dataset.id);if(entry)openSheet(entry);});
document.getElementById('btn-plan-maps').addEventListener('click',()=>{const entries=ENTRIES.filter(e=>onPlan(e.id));if(!entries.length)return;if(entries.length===1){window.open(`https://maps.google.com/?q=${entries[0].ll[0]},${entries[0].ll[1]}`,'_blank');return;}const pts=entries.slice(0,9);const dest=pts[pts.length-1];const wp=pts.slice(1,-1).map(e=>`${e.ll[0]},${e.ll[1]}`).join('/');window.open(`https://maps.google.com/maps/dir/${pts[0].ll[0]},${pts[0].ll[1]}/${wp?wp+'/':''}${dest.ll[0]},${dest.ll[1]}`,'_blank');});
document.getElementById('btn-plan-copy').addEventListener('click',()=>{const entries=ENTRIES.filter(e=>onPlan(e.id));if(!entries.length)return;const text=entries.map(e=>`${getName(e)}\t${e.ll[0]},${e.ll[1]}\t${e.re}`).join('\n');navigator.clipboard.writeText(text).then(()=>alert(t('coords_copied'))).catch(()=>alert(text));});
(()=>{let startY=0;document.getElementById('sheet').addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});document.getElementById('sheet').addEventListener('touchmove',e=>{if(document.getElementById('sheet-scroll').scrollTop===0&&e.touches[0].clientY-startY>60)closeSheet();},{passive:true});})();
window.addEventListener('online',()=>document.getElementById('offline-banner').classList.remove('show'));
window.addEventListener('offline',()=>{document.getElementById('offline-banner').textContent=t('offline');document.getElementById('offline-banner').classList.add('show');});
if(!navigator.onLine)document.getElementById('offline-banner').classList.add('show');
window.addEventListener('load',()=>{initMap();applyLang();updatePlanBadge();renderExplore();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');});
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</body>
