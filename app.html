e som polsk marineøvingsskip frem til 1981 — besøkte 383 havner, reiste 800 000 km. Kombinert billett tilgjengelig.","pol-h01":"En 35 km lang sandbanke som på det smaleste er 100 m bred med åpent hav på begge sider, med gråselreservat og fyrtårn fra 1838. Sykkel eller kjør til spissen: nordsiden har ordentlige bølger, sørsiden er flat som glass. Fokarium er gråselreservat ved spissen; stasjonen jobber med å redde den kritisk truede baltiske nisen (~500 igjen).","pol-sl01":"Europas største mobile sanddynesystem i Słowiński nasjonalpark beveger seg 3–10 m per år. Landskapet endres målbart hvert år; døde trær begravd i tiår avdekkes og begraves igjen. UNESCO Biosfærereservat. Sandboarding er mulig på de 30–42 m høye flanker. I nærheten: det tyske WWII-rakettforsøksområdet med V-1-ramper bevart i skogen (14 PLN inngang). Parkinngangen er 2 km fra Łeba by.","pol-f01":"Danziger Goldwasser, Gdańsks likør fra 1500-tallet, ble skapt av Ambrosius Vermoellen: en blanding av 20+ urter inkludert stjerneanis, kardemomme og peppermynte, med ekte 22 karats gullbladflak som driver rundt i flasken. 40 % ABV med urte- og anis-sitrussmak. Kjøp det hos Pod Łososiem eller i suvenirbutikker i Gdańsk gamlebyen.","pol-f02":"Sild kombinert med rosiner, pickles, fløte og hakket eple er en unikt regional kashubisk tilberedning. Kombinasjonen er overraskende – søt, syrlig, kremet og salt på én gang. Finnes kun på kashubiske restauranter; prøv det hos Tawerna Mestwin, beskrevet som «den eneste ekte kashubiske restauranten i Gdańsk».","pol-f03":"Baltic Porter er ølstilen født av baltiske handelsruter – mørk, fyldig, 7–9 % ABV og glatt. Historisk brygget for eksport over det kalde nordlige havet, der det høye alkoholinnholdet konserverte ølet under overfarten. Gdańsks Brovarnia-bryggeri produserer fremragende eksempler som kan drikkes på stedet.","pol-a01":"Luksuriøse husbåter fortøyd på elven Motława midt i Gdańsk gamlebyen, med private takterrasser og tilgang til sauna. Fullt utstyrte flytende leiligheter med utsikt mot de middelalderske kaikranene og kornlagrene. En helt annen måte å oppleve Gdańsk på – fra vannet, med kirkeklokker og elvebrus.","pol-k01":"Kashubia er en region med 1 000+ innsjøer sørvest for Gdańsk, med sitt eget EU-anerkjente minoritetsspråk og broderitradisjoner. Kashuberne har bevart sin kultur gjennom århundrer. Broderikunsten – intrikate botaniske mønstre – er kandidat til UNESCOs immaterielle arv. Wdzydze Kiszewskie har et utmerket friluftsmuseum.","all-p01":"Estland har allemannsretten – slå leir på udyrket offentlig land i opptil 24 timer, gratis, med hundrevis av RMK-plasser. Latvia: tillatt på det meste av offentlig land utenfor vernede områder. Litauen: kun på offisielt anviste steder. Polen: opptil 9 personer i 2 netter i statsskog siden 2021 – ingen biltilgang, ingen bål.","all-p02":"Alle fire land røker fisk over or og einer – samme urgamle teknikk. Artene varierer: sild (alle land), brisling (Latvia), ål (Litauen/Curonian Spit), gjørs (Polen), torsk (Polen/Latvia). Beste steder: veikantrokere i Estland, Rigas sentralmarkeds fiskepaviljong, Tik Pas Joną i Nida og fiskestander i Gdańsk.","all-p03":"En temabasert rute som knytter kaldkrigens viktigste steder: Hara ubåtbase og Paldiski nukleærtreningssenter i Estland, KGB-hovedkvarterer i Riga og Tallinn, regjeringsbunkeren ved Līgatne, den hemmelige signalteleskopen ved Irbene, militærfengslet Karosta og Cuba-krisens rakettsiloer ved Plokštinė.","all-p04":"Alle fire land har egne rugbrødtradisjoner: estisk must leib er det lett søte maltede brødet spist til alle måltider, latvisk rupjmaize er tettere og søtere (latviere spiser ~50 kg per person per år), litauisk juoda duona ble ansett som hellig i den førkristne baltiske religionen, og i Pommern serveres mørk surdeig som suppe-skål.","est-sw01":"En av Estlands beste villstrender — bredt hvitt sand, kystdyner, furuskog og nesten ingen fasiliteter. Vannet er grunt og varmt i juli. En havørnkoloni hekker i skogen bak stranden — skann trærne tidlig på morgenen. Ingen livredder. Valgerand camping er 200 m fra vannet og lett tilgjengelig fra stranden.","est-sw02":"Võsu er den mest besøkte strandlandsbyen i Lahemaa NP — en 3 km lang sandstrand med livreddere om sommeren, med furuskog i ryggen. Den tilstøtende Viru myr-stien (3,5 km tregang) skjærer gjennom høymyr, tranebærenger og kjøttfulle soldoggplanter. Morgensvømming etterfulgt av ettermiddags myrtur: to av Estlands beste naturopplevelser i 20 minutters radius.","est-sw03":"Laulasmaa ('syngende land') har sand som produserer en høyfrekvent piping når man går på den — forårsaket av perfekt runde 0,1–0,5 mm silisiumkorn som vibrerer på skjærplan når de komprimeres. Samme fenomen som på Ruhnu-øyas Limo Beach, men 40 km fra Tallinn. Bukta er lun, varm og vakker. Pipingen er tydeligst på den tørre øvre stranden. Nesten ingen turister selv i høysesong.","est-sw04":"Tuhkana er en av Saaremaas minst besøkte nordkyststrender med krystallklart grunt vann. Den gratis RMK-campingplassen like ved har bålplass og utedo – ingen andre fasiliteter, så ta med mat og vann. Et perfekt svøm-og-sov-stopp på Saaremaa-runden. Ankom før kl. 17:00 i juli for å sikre bålplass.","est-sw05":"Mändjala og Järve er Saaremaas mest kjente sandstrender, som strekker seg langs sydkysten mellom to landsbyer. Sandbunn er skånsom og grunn, egnet for barn. En dedikert sykkelvei fra Kuressaare (30 min, flat) gjør dem lett tilgjengelige uten bil. Vanntemperatur 18–21 °C i slutten av juli.","est-sw06":"Sääretirp er en sylsmal grus- og sand-odde på nord-Hiiumaa som strekker seg hundrevis av meter ut i havet — vann på begge sider samtidig. Fargene — grønt hav, hvit grus, mørk furu bak — er enestående. Nesten ingen kommer hit. En av Hiiumaas hemmelige perler. Den 24 km lange kystveisykkelturen langs halvøya er også en av Estlands mest pittoreske, og ender ved fyrtårnet på Cape Tahkuna.","est-sw07":"Peipus er Europas femte største innsjø (3 555 km²), delt mellom Estland og Russland. Ved Kauksi strekker en lang hvit sandstrand seg langs innsjøen, med badetemp varmere enn Østersjøen om sommeren. Den gratis RMK-campingplassen er 200 m unna. I skumringen er kveldslyset over vannet enestående. Ferskvann — ingen salt, ingen tang. De russiske gammeltroende fiskerlandsbyene ligger 30 km sørover.","est-sw08":"Otepää ('Estlands vinterhovedstad') sentrerer seg rundt issjøen Pühajärv — en buktende innsjø med fire øyer og en velsignelse fra Dalai Lama (1992). Legende: par som svømmer her på Sankt Hans-kvelden og drikker fra en sølvbeger, forblir forelskede for alltid. Stranden har garderobe, kafé, båtutleie og ballbaner. I juli når vanntemperaturen 22–24°C.","lat-sw01":"Garciems har Latvias høyeste kystdyner — en 0,8 km lang gåtur gjennom furuskog før du når stranden, noe som sikrer at folkemengder aldri materialiserer seg. Dynene i seg selv, dekket av furu og einer, er verdt turen. En 3,5 km lang solnedgangssti løper langs dynene mot Pēterupe. Kiteboarding på vindfulle dager. Ta med mat og vann — ingen fasiliteter på stranden. En av Rigabuktens virkelig skjulte kyster.","lat-sw02":"Latvias mest dramatiske kystlinje ved Jūrkalne har klipper på opptil 20 m av rød og hvit devonsk sandstein som stuper rett ned i havet. Paraglidere utnytter oppdriftsstrømmene, og ville orkidéer vokser i de nedre skråningene. To utsiktspunkter – fra strand og klippekant – gir helt forskjellige perspektiver. Nesten ingen infrastruktur.","lat-sw03":"Pāvilosta (befolkning 858) er en ekte latvisk fiskerlandsby med svarttjæret trehusarkitektur og en bred sandstrand med naturlige grå dyner bak. Kitesurfing- og windsurfingmiljøet er sterkt her — pålitelig vindkorridor fra den åpne Østersjøen. Røkt fisk er tilgjengelig direkte fra lokale røkere ved havna. PELDMĀJA-flyteboliger tilbyr overnatting. Landsbyen føles som Latvia før turismen.","lat-sw04":"Bernāti er en av Latvias vakreste villstrender — bred, uskadd, furukledd og del av et naturvern. Latvias høyeste kystdyne (Pūsēnu-åsen, 37 m) reiser seg rett bak stranden, og baltisk rav vaskes i land mellom stormer. ⚠️ SIKKERHET: Bernāti har dokumenterte strømsug forårsaket av kystdynamikk — gå ikke for dypt og unngå bading i bølger eller stormvær.","lat-sw05":"Latvias mest avsidesliggende strand grenser til Pape naturpark der europeisk bison, Konik-villhester og Heck-storfe vandrer fritt i naturlig kystnatur. Stranden er helt vill; etter en storm vaskes rav i land, og om våren hviler gråselunger her. ⚠️ Ingen tilsyn – bading på eget ansvar.","lit-sw01":"Šventoji er det roligere alternativet til Palanga 12 km sørover — den samme rene baltiske sanden og milde bølgene, men færre folkemengder og mer lokal atmosfære. Sandbunn, klart vann, typisk 2–3 °C kjøligere enn lagunen. Godt for barn som vil plaske og svømme. De enkle fornøyelsesparkene i byen er kompakte og barnevennlige. Kom midt i uken for å unngå helgebesøkende fra Klaipėda og Palanga.","lit-sw02":"Nidas åpne Østersjøside har en bred, ren sandstrand som — i motsetning til de fleste litauiske badestrender — er genuint lite folksomt selv i juli. Dynskogen fungerer som en naturlig barriere som holder besøksantallet lavt. Den 52 m høye Parnidis-dynen med sitt 13,8 m steingnomon-solur er 20 minutters gange fra stranden. Gå sørover fra hovedstrands-adkomsten for enda mer ensomhet. Vanntemperatur typisk 18–21 °C i slutten av juli.","lit-sw03":"Curonian-lagunen (1 584 km²) er praktisk talt ferskvann — saltholdighet under 0,1 % sammenlignet med Østersjøens 1,8–2,2 %. Det betyr ingen brennende manet, ingen salt og vann som varmes opp raskere: 2–3 °C varmere enn den åpne Østersjøsiden i juli. Fullstendig rolig, ingen bølger, sannet bunn. Ideelt for små barn og usikre svømmere. Lagunesiden er 5 minutters gange gjennom Nida landsby fra ethvert overnatting.","lit-sw04":"Lake Plateliai er Samogitias største og dypeste innsjø (12,7 km², 49 m dyp) og Litauens klareste. Sportsdykking er populært her. Det årlige svømmemaratonet holdes i juli (1,8 og 3,5 km distanser). Den 24 km lange sykkelruten rundt innsjøen er utmerket, med vakker utsikt over de omkringliggende åsene.","lit-sw05":"Seks smaragdgrønne innsjøer nordøst for Vilnius – den grønne fargen skyldes kalkgeologien. Lake Balsys har strand, volleyball og kafé; de fem andre (Gulbinas, Little Gulbinas, Akis, Raistelis, Baraukos Akis) er stille og urørte. De mest avsides har ingen infrastruktur – du får vannet for deg selv.","rv-est01":"Den høyest rangerte bobil-campingplassen i Baltikum (Park4Night 4,9/5), drevet av erfarne bobilreisende som vet nøyaktig hva du trenger. Kun 15 plasser, rolig og i et Natura 2000-verneområde. Sandstrand 3 min gange. Sauna, kjøkken, vaskemaskin og WiFi tilgjengelig. Kontakt dem på forhånd – de tar bestillinger seriøst.","rv-est02":"Kloogaranna er et av de beste gratis overnatningsstedene mellom Tallinn og Haapsalu, 40 km vest for Tallinn. Skogsparkering i gangavstand til en stille baltisk strand – furutrær gir ly, og bålplass og utedo er på stedet. Kan være fullt i sommerhelger. Ankom før kl. 18:00 i juli. Park4Night #80448.","rv-est03":"Purekkari er det nordligste campingstedet i Lahemaa NP — ved 59,667°N, en dramatisk steinete halvøyspiss med utsikt over Finskebukta. Gratis RMK-plass med 6 bålplasser, utedo, plass til 18 telt. Adkomstveien er smal og humpete — sjekk egnethet før du kjører inn; ikke egnet for store kjøretøy. Halvøyaturen til spissen er 1,5 km tur-retur og ekstraordinær. Nærmeste fasiliteter: Viinistu landsby, 8 km.","rv-lat01":"Denne lille gratis plassen (Park4Night #315901, 5 plasser) ligger direkte på Rigabukt-siden av Cape Kolka — rolig vann, enkel toalett, vakker utsikt mot kollisjonsstedet mellom to hav. Mye roligere enn den sentrale landsbyparkeringen 400 m østover. Fyller seg raskt i juli–august: ankom innen kl. 16:00. Anmeldere beskriver å sove til lyden av to hav som møtes. Ingen vann, ingen strøm. Ingen bading — farlige strømmer ved oddens spiss.","rv-lat02":"Nida Camping er den eneste fullservice bobilstansen på Curonian Spit, der villcamping er strengt forbudt gjennom hele nasjonalparken. Høysesonpris €25–28/natt. Fullt utstyr: dusjer, toaletter, vann, strøm og kjøkken. For ikke-gjester som kun trenger vann eller kassettømming: €10 fast avgift. Bestill på forhånd for juli–august.","rv-pol01":"En privat uformell campingplass i furuskog 3 minutters gange fra den polske Østersjøkysten. Rent, stille, familiedrevet med toaletter og vannfat. Hele året. Svært rimelig til ~40 PLN/natt (~€9). Anmeldere kaller det konsekvent 'stor plass, trær rundt, rent og nær stranden.' Park4Night 4,72/5. Beliggende nær Łeba på Słowiński nasjonalparks kystlinje — ideelt utgangspunkt for de berømte bevegelige dynene 2 km unna.","rv-pol02":"Helkamp (ul. Kuracyjna 1, Hel) er den best utstyrte bobilstansen på den polske Østersjøkysten — full tilkobling med vann, strøm, gråvannstipp, kassettømming, dusjer og vaskemaskin. Hele året. ~€22–27/natt. Plassert ved inngangen til Hel-halvøyveien — parker her og utforsk Hel med sykkel (utleie på stedet), PKP-tog (sykkelkupéer) eller ferje fra Gdynia. Gangavstand til Fokarium selandom og WWII-befestninger.","rv-all01":"Estland: best i Baltikum, allemannsretten og hundrevis av gratis RMK-plasser – last ned RMK-appen. Latvia: lovlig på offentlig land, aldri på strand eller dyner. Litauen: kun anviste plasser; Curonian Spit er nasjonalpark, bruk Nida Camping. Polen: teknisk sett ulovlig for bobiler med bot opp til €120 – bruk anviste bobilparker.","est-uf01":"Tihemetsa Kala (suitsukala.com) i Nasva landsby er en 30+ år gammel familiedrift der fisk rengjøres, saltes og varmrøykes for hånd daglig. All-you-can-eat-måltidet koster €24+mva. per person og inkluderer røkt fisk, kokte poteter, fløtesaus, mørkt brød, kake og kaffe. Sesongens fisk er poenget: horngjel om våren, ål om sensommeren.","est-uf02":"Pihtla Brewery lager det som kan være Estlands mest autentisk eldgamle øl – et gårdsøl filtrert gjennom einerkvister, en teknikk med rundt 1 000 års historie. Ølet er grumsete, sterkt og har en karakteristisk urtekvalitet. Tapperom åpent om sommeren; bryggeriomvisninger og bryggemesterworkshops tilgjengelig.","est-uf03":"Langs vestbredden av Peipsi-sjøen lever russiske gammeltroende forvist hit for å nekte å godta kirkefornyelsene på 1650-tallet. De har bevart 1600-tallets tradisjoner intakt: løk (de leverer store deler av Estlands avling), sikorikaffe og samovarte-seremonier. Guidede turer fra Tartu («Smaken av Løkruten») inkluderer smaksprøver og besøk i Samovar House.","est-uf04":"Lümanda kro er ett av Estlands mest ekte matopplevelser – ikke et rekonstruert «tradisjonelt» meny, men virkelig gamle retter som overlevde bare i lokale gårdskjøkken. Tuhlipuder ja nott er potetgrøt kokt med biter av røkt kjøtt – tett, enkel og mettende. Pannileib er et flatbrød stekt rett på pannen. Selve kroen er upretensiøs – maten er grunnen til å komme.","lat-uf01":"Ragaciems er en liten fiskerby der du kan kjøpe røkt fisk direkte fra fiskerne som røkte den samme morgen. Duften av varm røk merkes gjerne allerede i god avstand fra landsbyen. Markedet er åpent for både enkeltbesøkende og grupper. Et av de mest autentiske stopp for røkt fisk langs hele den latviske kysten.","lat-uf02":"Suitiene er et lite katolsk samfunn midt i en historisk luthersk region – en enklave som har bevart sitt særpreg i århundrer. Søndagsmarkedet i Alsunga byr på saldskābmaize (søtsurt brød unikt for dette folket), sklandrausis og lokale grønnsaker. Gruppen «Maģie Suiti» tilbyr fulle måltider med tradisjonelle retter og spontan dronegesang på suiti-dialekt. UNESCO-listet.","lat-uf03":"Dieniņas fiskergård i Berzciems er en av Latvias mest uvanlige matopplevelser. Å kjøpe røkt fisk her følges av en fullstendig kulturell forestilling: fiskerkoner forteller historier om landsbyens liv på den lokale kystdialekten, røkeprosessen demonstreres fra start til slutt, og deretter setter alle seg til bords. Et ekte hjemlig teater rundt et måltid. Bestill på forhånd.","lit-uf01":"Žemaitiškas kastinys er laget ved å piske ferskfløte eller rømme med smør etter en teknikk unik for Samogitia – ingen andre steder i Litauen gjør det slik. Resultatet er en glatt, lett og syrlig paste som smelter på kokte poteter. TasteAtlas rangerer det blant de beste meieriproduktene i Europa. Finn det på markeder i Klaipėda eller Šiauliai, eller på gårdsbruk i Samogitia.","lit-uf03":"Šakotis er en kake bakt på roterende spid over åpen ild – dusinvis av eggelagsbegrensninger helles på mens spiden dreier, noe som skaper grenutspring som ligner et tre. Museet i Druskininkai har Guinness-rekordholderen: 3,72 m høy og 86 kg. Besøkende kan se bakedemonstrasjonene og noen ganger delta selv. Kaken er identisk med polsk sękacz og lages til bryllup og høytider.","pol-uf01":"Gryfon i Jastarnia drives av Anna og Piotr Lisakowski. Anna bruker oldemors oppskrift fra 1840 for tofermenterte ansjos som blir til en smørsaus med hjemmelaget garum. Menyen inkluderer sildeiskrem, villrosesorbet, torskelevertartar som «lokalt foie gras» og laks og ål røkt over plommetre – en 6 000 år gammel regional tradisjon. Omtalt av National Geographic.","pol-uf02":"Agata Falkiewicz-Ponikowskas restaurant på Otomin er en ekte gård-til-bord-opplevelse – ikke et livsstilsmerke, men en virkelig driftet gård. Sesongbasert kashubisk matlaging med langtidsfermentert brød, husrøkt kjøtt og råvarer fra gården. Mannen Michałs prisbelønte eplesider er krydret med anis, kanel og kardemomme. 30 km fra Gdańsk – vel verdt omveien.","adv-lat01":"Den klassiske familieklassikeruten på Gauja. Sandsteinsbredder, innimellom sandstrender for matpause, skogkledt dal og milde strykpartier. Familier med barn padler gjerne dette i tandemkanoer. Makars Tourism Agency tilbyr €60 for to inkludert transport. Baltic Nature Travel har guidede varianter med engelskspråklig guide. Ruten er 20 km og tar 4–5 timer i rolig tempo.","adv-est01":"Soomaa.com driver Estlands beste familiekanourer. Elven slynger seg gjennom en urgammel flommarksskog – om våren stiger vannet over 5 meter og oversvømmer det hele; om sommeren er det fredelig og godt håndterbart. Den selvguidede ruten er 12 km (€30/person). Den guidede varianten med naturguide tar 3 timer (€50–80/person). 50 % rabatt for barn fra 7 til 12 år.","adv-lit01":"Neringa-sykkelstien er nesten helt flat, bilfri og passerer spektakulære landskap. Start med gratis passasjerferge fra Klaipėda til Smiltynė. Stopp: Juodkrantė (Heksenes bakke, skarvekoloni), Pervalka (dødedyner), Preila (stille fiskerby), Nida (Parnidis-dynen, Thomas Mann House, røkt ål). Sykkelutleie tilgjengelig ved begge endepunkter (VeloNida: €20/dag).","adv-lat02":"Tarzāns i Sigulda er den beste eventyrparken i Baltikum – profesjonell, trygg og spennende for alle aldersgrupper. 11 løyper i trær opptil 20 m høye og 140 hindringer totalt. Den 1,1 km lange tirolerbanen er den lengste i Baltikum. Også kjelkebane, katapult, giganthuske og nettpark. Alle deltakere er kontinuerlig sikret gjennom hele besøket. Fra 3 år.","adv-est02":"Pirita Seikluspark ligger i skogen bak Pirita-stranden, 10 minutters kjøring fra Tallinn gamlebyen. Flere løyper tilpasset ulike høyder betjener besøkende fra 120 cm og oppover – alle er kontinuerlig sikret. Familierabatter: -20 % for grupper på 3+ inkludert én voksen, og -30 % på «Family Tuesday» (2 voksne + 2 barn). Bestill via piritaseikluspark.ee.","adv-est03":"TIIT-REISID / MereRetked kjører selpakkede båtturer i helgene fra Kärdla havn på Hiiumaa. Estland har den sørligste bestanden av baltisk gråsel. Selene hviler på skjær rundt øya og er genuint nysgjerrige på båter. Turene varer 2–3 timer og byr på gode observasjonsmuligheter. Billetter: voksne €35, barn under 12 år €25. Bestill via mereretked.ee.","adv-pol01":"Łeba-dynene i Słowiński nasjonalpark er blant Europas største bevegelige sanddyner. Det å gli ned 40 m høye sandflanker på flate plastbrett er en familietradisjon i Polen. Det finnes ingen formell sandboard-utleie – kjøp eller lån et billig plastspor i Łeba sentrum før du går inn i parken. Utsikten fra toppen er enestående: Østersjøen på én side, Łebsko-sjøen på den andre.","adv-lit02":"Baltic Nature Travel arrangerer en heldags guidet kajakk gjennom Nemunas-deltaet til Ventė-odden — hjem til en av Europas viktigste fuglerings-stasjoner (i drift siden 1929, ringer 60 000–80 000 fugler per år). 15 km totalt, ~8 timer. Inkluderer strandpiknik, tandemkajakker, alt sikkerhetsutstyr. Ingen erfaring nødvendig. Deltalandskapet med sivbed, kanaler og åpen lagune er ekstraordinær. Bestill via baltic-nature.travel. Juni–september kun.","sau-est01":"Røykbadstutradisjonen i Võromaa er UNESCOs immaterielle kulturarv. På Mooska Farm i Haanja leder vertskapet badstuseanser som inkluderer oppvarmingsprosessen, bjørkevispbehandling, honningskrubb, urte-te og avkjøling i dam om sommeren – eller isdykk om vinteren. Røyken gir dampen en mykere og mer særegen kvalitet enn vanlig badstu. Minimum 3 timer per sesjon.","sau-est02":"Iglupark ved Noblessner havn har iglooformede badstuer av ulike størrelser på en flytende plattform – hver med trapp rett ned i Østersjøen. En helt særegen opplevelse: varm opp i iglooen, kast deg ut i sjøen, gjenta. Offentlig fellesbadstu koster €24 per person; private bookinger er også tilgjengelig. Familiehytte for grupper med barn kan bestilles.","sau-est03":"RMK (Estlands statsskoger) drifter utleiehytter i nasjonalparker med vedfyrte badstuer og innsjøtilgang. Soontaga-hytten (Kiidjärve-Kooraste, €85/dag, 6 plasser, innsjø på stedet) og Praali-hytten (Räpina-Värska, €165/dag, 20 plasser, separat badstubygning, nær to myrsjøer) er familiens høydepunkter. Selvhushold, de fleste uten strøm. Bestill via bouk.io.","sau-lat01":"Ogle (oglesauna.lv) er en flytende trebadstukabin bygget på Buļļe-sjøen – en stille skogsjø på latvisk landsbygd. Store vinduer, utendørs dekk med hengekøye og komposttoalett. Badstuen varmes opp og du stepper rett fra dekket ut i sjøen. Overnatting er tilgjengelig fra €114–144 per natt. Natt og badstu-ritual for to koster €300. Unik i sin klasse.","sau-lat02":"Ziedlejas i Gauja-dalen nær Sigulda har tre arkitektonisk utformede pirts-typer: Glass Pirts med skogsutsikt, den urgamle Smoke/Black Pirts og en spiralformet Wool Pirts. Sertifiserte badstumestere – inkludert grunnleggeren av den latviske Pirts-skolen – leder 3–4 timers ritualer med bjørkevispbehandling, skrubb, honningbehandling, plantedufter, te og brød.","sau-lit01":"Ivanas Muša Gongą («Ivan slår gongen») har flere lokasjoner i Litauen – den ved Akmena-sjøen i Trakai er den mest familievennlige. Gå rett fra den oppvarmede badstuen og ut i sjøen. Åpne sesjoner med badstumester koster €29 per person. Private gruppesesjoner: €200–400 for 2–6 personer. Vakre omgivelser med utsikt mot Trakai Island Castle.","sau-lit02":"Et firedelt tradisjonelt litauisk pirtis-ritual ledet av badstumester Giedrius i skog nær Kaunas. Sesjon 1: oppvarmende damp. Sesjon 2: aromatisk saltskrubb. Sesjon 3: helkropps-vanta med bjørkevisp. Sesjon 4: ernæring med oljer og honning. Mellom sesjonene: avkjøling i skogsdam. Kildevann, hjemmelaget brød og fermenterte drikker. Mobilfri. €35/person.","est-town01":"Viljandi er Estlands mest kulturelt aktive småby. Ruinene av den Tyske Ordens borg (påbegynt 1224) troner dramatisk over en innsjø – den berømte hengebroen (1879/1931) svinger mellom åsene. Folkemusiikkfestivalen i Viljandi (siste helg i juli) samler 20 000 besøkende og hundrevis av utøvere. Hansadagene i juni er et annet høydepunkt. UNESCO-utpekt by for håndverk og folkekunst.","lat-town01":"Kandava er Latvia som det ser ut når ingen prøver å imponere turister. Landets eldste steinbro (1873) krysser Abava-elven midt i byen. En middelaldersk borghøyde dominerer landskapet, og den lutherske kirken på toppen av åsen og torget er stille og ekte. Finn deg overnatting i et gjestehus som ikke er renovert for turister – dette er autentisk latvisk småliv.","lat-town02":"Sabile er en romantisk liten by i det eldgamle Abava-elvdalen. Sabile Wine Hill (Vīna kalns) har Guinness-rekord som verdens nordligste utendørs vingård der druer faktisk modner. Den årlige vinfestivalen i juli inkluderer smakinger, musikk og lokal mat. Det nærliggende Pedvāle Open Air Art Museum har enorme enginstallasjoner av stein og metall spredt over åpne marker.","lat-town03":"Talsi alene er verdt et stopp kun på grunn av geografien – ni åser, to innsjøer og en kirke på hver topp. Det 28 m høye treobservasjonstårnet Kamparkalna gir panoramautsikt og viser avstand til andre latviske byer. Trebryggepromenaden langs innsjøen med «Latvias sol»-gullsfæren er en vakker spasertur. «Ni-åsers-utfordringen» er en genuint morsom aktivitet for barn.","lit-town01":"Juodkrantė ligger midt på Curonian Spit – liten, stille og virkelig vakker. 1800-tallets lagunpromenade har elegante villaer fra den gang dette var et moteriktig europeisk badested. Heksenes bakke med 80+ treskulpturer av folkekunst finnes i skogen bak. Europas største blandede skarve- og gråhegre-koloni hekker i trærne nær landsbyen – en uforglemmelig lydkulisse.","lit-town02":"Pervalka og Preila er Curonian Spit slik den var før turismen – bittesmå fiskersamfunn med håndmalte porter, enkle brygger mot lagunen og ingen turistinfrastruktur. Begge er utmerkede overnattingsstopp for dem som vil unnslippe Nidas folkemengder. Pervalka ligger nærmest utsiktspunktet over dødedynene. Furuduftende stier binder landsbyene sammen.","lit-town03":"Šilutė – det tidligere prøyssiske Heydekrug – har trelinjebelagte gater og tysk-æraens arkitektur i sterk kontrast til de sovjetiske blokkene i utkanten. Den store attraksjonen er Rusnė-øya: Litauens eneste fast beboede øy, nådd med ferge. Tradisjonelle trefiskerhus, polderland, dyker og enestående fugleliv i deltaets vannveier.","lit-town04":"Kretinga er Litauens skjulte kystperle. Kretinga gods og museum har et restaurert 1800-talls orangeri med tropiske planter og palmetrær – et genuint overraskende syn i en baltisk kystby. Det tilstøtende fransiskaner-klosteret (tidlig 1600-tall) er fremdeles aktivt. Lourdes-grotten (1933-kopi) er stemningsfull. Bare 15 km fra Klaipėda.","pol-town01":"Władysławowo er en ekte arbeidende havn ved basen av Hel-halvøya – kommersielle fiskebåter losser fangsten hver morgen og selger direkte til publikum. Baltiske cruise og motorbåtturer er tilgjengelig fra havnen. Fem bevoktede strender. Byparken har 9 tematiske torg med kashubiske sagn – en fin spasertur med barn. Godt utgangspunkt for utflukt til Hel-halvøya.","pol-town02":"Kashubia har bevart eget språk og kultur gjennom århundrer med tysk og polsk styre. Viktige stopp: Wdzydze Kiszewskie (Polens eldste friluftsmuseum, 1906, 50+ bygninger ved en sjø), Kartuzy (1300-talls kartuser-kloster), Chmielno (arbeidende pottemakerlandsby). Det kashubiske broderimuseet i Żukowo, 15 km fra Gdańsk, er gratis.","nat-est01":"Stien mellom Altja fiskevær (med den berømte kroen og tradisjonelle notbuer) og Käsmu (kapteinsbyen) følger den steinete Lahemaa-kysten gjennom furuskog. Store istidsblokksteiner er spredt langs stranden. Havutsikt hele veien. 7 km én vei – start fra begge ender, begge har parkering. En av de vakreste kystturene i Estland.","nat-lat01":"Slītere natursti går gjennom gammel eik- og askeskog langs Blåe åsene – den gamle istidskysten av en forhistorisk sjø, nå 15–20 m over havet. Ved foten av klippen: kildevann-matede blå innsjøer med sjelden klarhet og uvanlige kalkkrevende moser. Skogen er genuint gammel og urørt. Kort og tilgjengelig – fylt av naturundere.","nat-lit01":"Nagliai naturreservats promenade er en av de mest ekstraordinære 2 km-turene i Baltikum – et dødt, stille landskap av bevegelig sand, blek himmel og hvite stubber av nedgravde trær som stikker opp av bakken. Vandrefalk, rødfotfalk og svartglente jakter overhead. Kontrasten til furuskogen bare 100 m unna er sjokkerende. Gratis og åpent.","nat-pol01":"EuroVelo 10s beste delstrekning. Den 35 km lange sykkelveien er nyrenovert og fullstendig adskilt fra trafikken. Nøkkelstopp: Chałupy (strandkiting), Kuźnica (fiskerihavn, sjømat), Jastarnia (gammelt fiskerihavn), Jurata (mellomkrigsgvillaer), Hel (selreservat Fokarium, fyrtårnet fra 1838, WWII-befestninger). Ta PKP-toget tilbake fra Hel til Gdynia (sykkelkupéer finnes).","log-01":"Passasjerfergen (fotgjengere og syklister) går hvert 30. minutt fra kl. 07:00. Helt gratis. Overfarten tar 5–7 minutter. Bilfergen går 24 timer i døgnet, men tar betalt etter kjøretøylengde. Bobiler over 6 m betaler betydelig mer. Kø kan bli 1–2 timer i juli-august. Vurder å parkere i Klaipėda og ta passasjerfergen med sykkel.","log-02":"Virtsu–Kuivastu-fergen er gratis for kjøretøy og passasjerer som del av estisk statlig transportpolitikk, operert av Tuulelaev OÜ. Går omtrent en gang i timen, døgnet rundt. Overfarten tar 27 minutter. I juli kan det bygge seg opp kø – ankom 30–45 minutter før ønsket avgang. Fergen tar alle kjøretøystørrelser inkludert bobiler.","log-03":"Drivstoffprisene langs baltikumruten i 2024–2025: Estland og Latvia er dyrest, på linje med nordiske priser. Litauen er konsekvent 15–20 % rimeligere. Polen er på linje med Litauen eller litt billigere. Prisforskjellen på ett bobiltanker kan utgjøre €10–20. Strategi: fyll full tank i Litauen før du krysser inn i Latvia, og igjen i Polen.","log-04":"Dagligvarekjeder etter land: ESTLAND: Rimi (bredest utvalg), Prisma (store ferskvaredisker), Selver (gode estiske produkter), Maxima (budsjett). LATVIA: Rimi (best kvalitet), Maxima (budsjett, overalt), Lidl (storbyene). LITAUEN: Maxima (vanligst), Iki (nærbutikk), Norfa (budsjett). POLEN: Biedronka (rød fuglelogo, finnes overalt), Lidl, Netto, Kaufland (størst).","log-05":"Spesifikke råd for baltisk bading: Cape Kolka (Latvia): BAD ALDRI – strømmene der Østersjøen møter Riga-bukten er uforutsigbare. Bernāti (Latvia): dokumentert ripstrømsone. Åpen Østersjø: oppstrøm kan senke temperaturen fra 20 °C til 12 °C i løpet av timer. Curonian-lagunen er tryggere for barn. Innsjøbading er generelt tryggere enn sjøen.","evt-est01":"Pärnu Hansadager er et av de mest autentiske middelaldermarkedene i Baltikum – strenge regler krever at alle varer er håndlaget av selgeren selv. Ingen masseproduksjon, ingen tourist-kitsch. Periodemusikk, levende håndverksdemonstrasjoner, riddere og kostymerte kjøpmenn. Ankom fredagen for best stemning – de ekte håndverksvarene er gjerne utsolgt innen lørdag. 3.–5. juli.","evt-est02":"Tallinn Medieval Days (medievaldays.ee) fyller tre soner: Rådhusplassen (marked og musikk), Niguliste-åsen (håndverkere, middelaldersk barneskole, bueskyting) og Frihetsplass (ny sone 2026). Periodemusikk fra Poeta Magica, Cätlin Mägi, MAQAM og Rondellus. Gratis inngang; spesifikke konserter €10–20. Åpner torsdag 10. juli med taubalanse over plassen.","evt-est03":"Saaremaa Opera Festival (18.–25. juli) setter opp verdensklasse-opera i et egenbygd 2 000-seters utendørs teater mellom murene i Kuressaare middelalderborg. Operaselskaper fra hele Europa opptrer. Slutter med en familievennlig forestilling. Opera-musikk fra en 1300-talls festning under baltisk sommerhimmel er en opplevelse utover det vanlige.","evt-est04":"I Land Sound (startet 2018) holdes på den lille Illiku-øyletten nær Orissaare, Saaremaa — nådd via en kort veiforbindelse. Elektronisk musikk, utendørsscener satt blant trær, camping direkte på øya og badstu under stjernene. En av Estlands mest elskede boutique-festivaler: intim, vakkert beliggende på en øy omgitt av hav, og med et genuint utvalgt program. Kapasiteten holdes bevisst liten. 16.–19. juli 2026.","evt-est05":"Pärnu Music Festival (8.–18. juli) er ett av Estlands mest prestisjefulle klassiske arrangementer – Järvi-familien dirigerer i hjembyen sin. 2026-programmet inkluderer verdensurframføringer av nye estiske komposisjoner, et unge talenter-program med Paavo Järvi og Nordic Pulse «Solstice» med Kristjan Järvi. Konsertene holdes i Pärnus historiske konsertlokaler.","evt-est06":"Beach Grind bringer elektronisk og samtidsmusikk til Pärnu-strandpromenaden – ett av de mest populære sommerarrangementene i Estland. Tusenvis av besøkende. Utendørsscener og strandatmosfære. Faller sammen med slutten av Pärnu-oppholdet: Medieval Days 3.–5. juli, deretter mulighet for Beach Grind 9.–11. juli før øyferden starter.","evt-lat01":"Ventspils Sea Festival (hoveddagen 5. juli) inkluderer: Neptuns ankomstseremoni med slepebåt-vannstråler kl. 11:40, ettermiddagskonserter og kveldsband til midnatt. Suppe-konkurransen «Fish Soup Challenge» er et høydepunkt. Barneprogrammet «Lille havulv-øyen» pågår hele dagen. Ventspils er et naturlig innreisepunkt til Latvia fra den estiske retningen.","evt-lat02":"Iveta Apkalna er cheforganist ved Elbphilharmonie Hamburg – og hun fremfører en soloorgel-konsert kl. 04:30 på Dzintari-stranden mens solen stiger over Østersjøen. Et bærbart orgel på en åpen strand og musikk som vokser frem med morgenlyset. Ett av de mest ekstraordinære musikkarrangementene i Europa. 12. juli.","evt-lat03":"Jūrmala Festival byr på verdensklasse-solister: Ksenija Sidorova (trekkspill) og SIGNUM Saxophone Quartet, en argentinsk tangokveld, en operagalla og en «Born in Latvia»-galla med Apkalna, Sidorova og pianistfamilien Osokins – alle på én scene. 13.–18. juli i Dzintari Konserthus.","evt-lat04":"LAMPA er en demokratisk samtalefestival som fyller Cēsis med åpne diskusjoner om globale og latviske temaer – politikk, kultur, klima og samfunn. Flere scener gjennom den middelalderske byen. Gratis inngang. Noen sesjoner på engelsk. En av de mest særpregede festivalene i Baltikum – utendørs og bygget rundt ideer fremfor musikk. 10.–11. juli.","evt-lat05":"Cēsis feirer 820-årsjubileum i 2026 med sin største byfestival noensinne. Fono Cēsis Rock Festival – Latvias eneste gratis rockfestival – samler titusener. Fredag kveld: fakkelprosesjon og fellessang i borggårdsparken. Lørdag morgen: Cēsis Brass Orchestra vekker byen. Det hanseatiske markedet på Rosengata bringer håndverkere. Konsertbilletter fra ca. €7. 17.–18. juli.","evt-lat06":"Saulkrasti Jazz henter internasjonalt og latvisk jazz til en utendørsscene ved Østersjøen. 2026-programmet inkluderer Latvias Radio Big Band med «Buddy Rich Tribute», Ventspils Big Band med pianist Anna Wibe og internasjonale gjester. Musikermasterclasses kjøres parallelt. Liten og vakker by – godt overnattingsstopp nord for Riga. 15.–18. juli.","evt-lat07":"Roja er en liten kystfiskerby i Kurzeme på den direkte kystruten sørover fra Cape Kolka. Den årlige Zvejnieksvētki den andre lørdagen i juli feirer livonisk kystmaritim kultur: tradisjonelle fiskeridemonstrasjonerr inkludert garnlegging fra åpne båter, besøk av Havkongen, fiskesuppe tilberedt og servert på stranden, folkemusikk og lokale rav- og håndverksboder. 11. juli 2026. Et ekte lokalt arrangement uten turistinnpakning.","evt-lit01":"6. juli er litauisk nasjonaldag som feirer kong Mindaugas' kroning i 1253 – Litauens stiftelsesøyeblikk. Klaipėda har fulldagsprogram: historisk flaggseremoni kl. 10, marinekorps kl. 12, festkonsert kl. 19:30, festlig seilas gjennom havnen kl. 20:30. Kl. 21:00 synger hele nasjonen nasjonalsangen samtidig – på torget, på fergen, på et museumsskip og på Melnragė brygge.","evt-lit02":"Bliuzo Naktys er Litauens eneste bluesfestival – over 30 år i Varniai ved bredden av Lūkstas-sjøen. 2026-programmet inkluderer Juwana Jenkins («Philadelphia blues queen»), Lachy Doley fra Australia, Jack Moore (sønn av Gary Moore) og Ben Poole. 1 time fra Klaipėda. 3.–4. juli.","evt-lit03":"N žemė-festivalen fremfører barokk- og klassisk musikk på intime scener i Nida: den lutherske kirken, Fyrvokterens hus, Preila bibliotek og til og med brannstasjonen. Én konsert er helt gratis (statsdag 6. juli). Avslutning: «Vivaldi in Rock» på Nidas hovedscene 10. juli. 3.–10. juli.","evt-lit04":"Thomas Mann Festival fyller 30 år i 2026 og løper 11.–18. juli i Nida – nettopp når du bør være på Curonian Spit. Konserter i Nidas evangelisk-lutherske kirke. Foredrag i Thomas Mann House med kulturredaktøren i Frankfurter Allgemeine Zeitung. Beethovens tre siste sonater 12. juli. Avslutningskonsert 18. juli. «Kaffe med Thomas Mann»-lesninger gratis om morgenen.","evt-lit05":"Lauksnos («stjerner» på gammel prøyssisk) bringer UNESCO-listede immaterielle kulturtradisjonerу fra hele verden til Klaipėda – konserter, teater, workshops, utstillinger og debatter. 5. utgave under UNESCOs patronat. Forventet 15 000+ besøkende. Bredden av tradisjoner fra flere kontinenter er ekstraordinær. 9.–12. juli.","evt-lit06":"De legendariske Gipsy Kings – på scenen siden 1977 og berømt for sine rumba flamenca-versjoner av Bamboleo, Volare og Hotel California – opptrer i Palanga for aller første gang 2. juli 2026. Billetter €41–86. Et enestående tilfeldig sammentreff dersom reisen passerer Litauen tidlig.","evt-lit07":"Palanga Concert Hall (palangosks.lt) programmerer verdensklassearrangementer hver kveld gjennom hele juli. I din periode: LAID BACK Sunshine Reggae Night fra Danmark (12. juli), Beissoul & Einius «Mixed Signals» – Baltikums fremste musikk/kunstduo etter 2 års pause (17. juli), Inga Jankauskaitė (19. juli). Teater, komedie og opera fyller resten av ukene.","evt-pol01":"Globaltica bringer verdensmusikk fra Mali, Trinidad, Mauritania, Finland, Japan og Malawi til Park Kolibki i Gdynias Orłowo-bydel. 2026-programmet: Rokia Traoré, Kobo Town (calypso fra Trinidad), Noura Mint Seymali (mauritansk musikk), Värttinä (finsk folkemusikk), Madalitso Band (Malawi-musikere som bygger egne instrumenter). 17.–19. juli – perfekt timet.","evt-pol02":"Męskie Granie er Polens mest elskede turneerende sommerrock/indie-festival – hvert år bestilles en ny samarbeidssingle fremført av alle artistene. 2026-Gdańsk-utgaven (Polsat Plus Arena, 17.–18. juli, start kl. 16:00) har Krzysztof Zalewski, Sistars, Spięty og Orkiestra 2026 med Igor Herbut, Zalia og Vito Bambino. To scener, ettermiddagsstart.","evt-pol03":"Candy Dulfer — hvis samarbeid fra 1989 'Lily Was Here' med David A. Stewart nådde #6 i Storbritannia — opptrer ved Sopot Aquapark-terrassene 17. juli. En utendørs havnepromenade jazzonsert ved Østersjøen, kjent for publikumsinteraksjon og utvidet improvisasjon. Billetter 249–299 PLN (~€55–67). Din første kveld i Polen etter grensepasseringen. Sopots mole er 10 minutters gange og den perfekte oppfølgingen.","cyc-est01":"Rute 321 – den klassiske Saaremaa-dagsløkken fra Kuressaare. Flatt terreng og stille asfaltveier. Nøkkelstopp: Kaali meteorittkrater (~20 km fra Kuressaare), Angla vindmøllebakke (fem tradisjonelle møller, møller i arbeid) og kystvisninger. 30 km med dedikert sykkelsti i Kuressaare-området. Øya har totalt 1 400 km med sykkelruter – dette er den beste dagssamplingen.","cyc-lat01":"EuroVelo 10 langs Kurzeme-kysten er en av de store baltiske sykkelreisene – avsidesliggende, dramatisk og nesten turistfri. Dagsetapper: Kolka→Dundaga (46 km, 100 % asfalt), Dundaga→Ventspils (60 km), Ventspils→Jūrkalne (50 km), Jūrkalne→Pāvilosta (21 km, perfekt halvdagetur for familier), Pāvilosta→Liepāja (55 km). Ca. 232 km totalt over 5 dager.","cyc-lat02":"Sigulda–Murjāņi-løkken (30 km) slynger seg gjennom sandsteinskløfter og krysser flere bekkedaler. Høydepunkter: Gutmānis Cave (Latvias største hule), Krimulda Palace-ruiner, Turaida Castle. De fleste bakker kan gåes om nødvendig. Den kortere guidede ruten (~15 km) er bedre for familier med barn. Terrengsykkel eller grussykkel anbefales på grunn av sandete skogsveier.","cyc-lit01":"Neringa-sykkelstien ble totalrenovert for €22 millioner – ferdig 2024, fullstendig atskilt fra biltrafikk og nesten helt flat. 36 merkede severdigheter langs veien. Start med gratis passasjerferge fra Klaipėda til Smiltynė. Nøkkelstopp: Juodkrantė, Pervalka, Preila, Nida. Ta hurtigbåten tilbake fra Nida (2 timer). Sykkelutleie tilgjengelig.","cyc-pol01":"Hel-halvøyas sykkelsti er helt flat – en kystslette med hav på begge sider. Stien løper de fulle 35 km. Viktige stopp: Chałupy (kiting), Kuźnica (fiskerihavn, sjømat), Jastarnia, Jurata (mellomkrigsgvillaer), Hel (selreservat Fokarium, fyrtårnet fra 1838, WWII-befestninger). Ta PKP-toget tilbake fra Hel til Gdynia med sykkel. Avslappet ryttid: ca. 2,5–3 timer.","act-amb01":"Østersjøen inneholder 80 % av verdens ravreserver. Beste teknikk: gå langs tanglinjen, se etter voksete gulskjær, bruk UV-lommelykt i morgentimene (rav lyser blå-grønt). Beste strender langs ruten: Hel-halvøya, Pāvilosta, Palanga, Curonian Spit. ⚠️ WWII-fosforadvarsel: hvitlige voksbiter kan ligne rav men selvantennes tørr – test alltid med UV-lykt.","act-amb02":"En profesjonell ravguide tar deg til de spesifikke delene av Curonian Spit der rav samler seg. Du lærer nettteknikken (skyv nettet inn i bølgebrytningen, dra ut, sorter), strandlinjeteknikken og hvordan du skiller ekte rav fra stein og fosfor. Guiden medbringer utstyr. Ca. €30 per person. Perfekt aktivitet for barn.","est-misc01":"Jägala foss er ikke Estlands høyeste (det er Keila), men landets kraftigste – Jägala-elven fører mest vann. Om sommeren blir den flate kalksteinshyllen en naturlig vannsklie og badeplass ved foten av fossen. 35 km øst for Tallinn. Et perfekt 2-timers stopp på veien mot Lahemaa. Gratis adgang.","lat-misc01":"Den delvis restaurerte Dundaga-borgen fra 1200-tallet er slående rød teglstein i parkomgivelser. Arvīds Blūmentāls ble født her, emigrerte til Australia, og hans personlighet inspirerte karakteren Crocodile Dundee. Det finnes minneplaketter og en liten utstilling i byen. Ligger på ruten fra Cape Kolka til Ventspils (46 km syklingsetappe).","lit-misc01":"Thomas Mann lot bygge dette tradisjonelle Nida-fiskerhuset og tilbrakte tre somre her (1930–1932) mens han arbeidet med «Josef og hans brødre». Utsikten fra verandaen over Curonian-lagunen mot dynene er uendret. Museet bevarer originale eiendeler, bøker og manuskripter. Kombinert billett dekker Thomas Mann House, Nida fyr og det etnografiske fiskermuseet.","pol-misc01":"Sopots skogsopera er en av Europas mest bemerkelsesverdige utendørs konsertarenaer – en naturlig bolle i skogen med overbygd scene og stoler blant trærne. Bygget 1909. Kapasitet 5 000. Hjemsted for Sopot International Song Festival. Den akustiske effekten av skogen er ekstraordinær. Tom Jones opptrer 23. juli, Seal 26. juli, Agnes Obel 29. juli.","all-misc01":"6. juli er Litauens statsdag. Kl. 21:00 synger alle litauere nasjonalsangen nøyaktig samtidig – på torget, om bord ferger i havnen, på utsiktspunkter og festivalscener. I Klaipėda skjer dette på Teatertorget, på en seilende ferge gjennom havnen, på et museumsskip og på Melnragė brygge – alt på samme øyeblikk. En av de mest gripende opplevelsene en besøkende kan ha.","evt-est10":"Private hager på Saaremaa og Muhu åpner portene sine for besøkende én helg i året – hver hage med sin egen karakter og sin vertskaps egen historie. Arrangementet er et stille alternativ til støyen fra Medieval Days i Pärnu. 3.–5. juli – samme datoer, andre øy. En god mulighet til å dele familien dersom noen foretrekker kystgartneri fremfor middelaldermarked."};;

function haversine(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function matchesFilter(e,f){if(f.cats&&f.cats.length>0&&!e.ca.some(c=>f.cats.includes(c)))return false;if(f.cat&&f.cat!=='all'&&!e.ca.includes(f.cat))return false;if(f.country&&e.co!==f.country)return false;for(const fl of(f.flags||[])){if(fl==='sw'&&!e.sw)return false;if(fl==='sa'&&!e.sa)return false;if(fl==='ki'&&!e.ki)return false;if(fl==='iw'&&!e.iw)return false;if(fl==='plan'&&!onPlan(e.id))return false;}if(f.q){const q=f.q.toLowerCase().trim();const qn=q.replace(/^#/,'');if(/^\d+$/.test(qn)){if(ENTRY_NUMS.get(e.id)!==parseInt(qn))return false;}else if(!e.n.toLowerCase().includes(q)&&!(e.n_no||'').toLowerCase().includes(q)&&!e.s.toLowerCase().includes(q)&&!(e.tg||[]).some(tg=>tg.toLowerCase().includes(q)))return false;}return true;}
function matchScore(e){const text=(e.n+' '+e.s+' '+(e.lo||'')+' '+(e.tg||[]).join(' ')).toLowerCase();const cost=((e.pr?.cost)||'').toLowerCase();const cats=new Set(e.ca||[]);const cmap={nature:32,unusual:30,history:28,food:18,events:20,sleep:12};const cscores=[...cats].map(c=>cmap[c]||0).sort((a,b)=>b-a);let s=(cscores[0]||10)+Math.floor((cscores[1]||0)*0.4);let auth=0;if(/medieval|hanseatic/.test(text))auth+=28;if(/\bcraft\b|artisan|handmade/.test(text))auth+=13;if(/\btraditional\b|\bfolk\b/.test(text))auth+=11;if(/\bauthentic\b/.test(text))auth+=8;if(/\blocal\b/.test(text))auth+=4;s+=Math.min(30,auth);if(/\bbeach\b|white sand/.test(text))s+=13;if(/\bswim\b|swimming/.test(text))s+=9;if(/national park|nature reserve|\bbog\b/.test(text))s+=9;if(/\bforest\b|wilderness/.test(text))s+=5;if(/only.*(?:europe|world|northern|balti)|rarest/.test(text))s+=11;if(/\bunique\b/.test(text))s+=5;if(/1[0-9]{3}|oldest|ancient/.test(text))s+=6;if(/fisherm|fishermen/.test(text))s+=11;if(/\bsauna\b/.test(text))s+=5;if(e.sw)s+=10;if(e.sa)s+=5;if(e.ki)s+=2;if(e.iw)s+=3;if(/\bfree\b/.test(cost)||/(?:^|\s)free(?:\s|$)/.test(text))s+=7;if(cats.has('events')){const isTrad=/medieval|hanseatic|fisherm|folk|\bcraft\b|traditional|heritage|sea festival|statehood|regatta/.test(text);const isSunrise=/4[.:]30.*am|sunrise.*concert/.test(text);const isConcert=/concert|jazz.*fest|blues.*nakt|rock.*fest|electronic.*fest|music festival/.test(text);const isPricey=/€[4-9]\d|€[1-9]\d{2}/.test(cost);if(isTrad)s+=18;if(isSunrise)s+=10;if(isConcert&&!isTrad&&!isSunrise){s-=8;if(isPricey)s-=9;}s=Math.max(38,s);}if(cats.has('food')){if(/medieval|elk|bear|boar|herring ice|unusual|ancient/.test(text))s+=20;if(/traditional|local|folk|craft beer/.test(text))s+=10;if(/chain|fast.food|mcdonald|franchise/.test(text))s-=45;}if(e.ty==='logistics')s-=20;s+=(e.rt-2)*5;return Math.min(100,Math.max(5,Math.round(s)));}

function renderExplore(){const f=filters.explore;let entries=ENTRIES.filter(e=>matchesFilter(e,f));if(f.sort==='dist'&&gps){entries=entries.map(e=>({...e,_d:haversine(gps.lat,gps.lon,e.ll[0],e.ll[1])})).sort((a,b)=>a._d-b._d);}else if(f.sort==='rating'){entries=[...entries].sort((a,b)=>{const ra=RATINGS[a.id],rb=RATINGS[b.id];const sa=ra?(ra.g??ra.t??0):0,sb=rb?(rb.g??rb.t??0):0;return sb-sa;});}else if(f.sort==='score'){entries=[...entries].sort((a,b)=>matchScore(b)-matchScore(a));}document.getElementById('explore-count').textContent=`(${entries.length})`;const html=entries.map(e=>{const d=gps?fmtDist(haversine(gps.lat,gps.lon,e.ll[0],e.ll[1])):'';const cats=(e.ca||[]).slice(0,2).map(catTag).join('');const rt=RATINGS[e.id];const rb=rt?`${rt.g!=null?`<span style="font-size:10px;color:var(--txt3)">🌐 ${rt.g.toFixed(1)}</span>`:''}${rt.t!=null?`<span style="font-size:10px;color:var(--txt3)">🟢 ${rt.t.toFixed(1)}</span>`:''}`:'';return`<div class="card" data-id="${e.id}"><div class="card-dot" style="background:${COUNTRY_COLOR[e.co]}"></div><div class="card-body"><div class="card-name">${getName(e)}</div><div class="card-short">${getShort(e)}</div><div class="card-meta">${cats}${e.ed?`<span class="tag flag-win">📅 ${e.ed.replace(/2026-/g,'').replace('/','-')}</span>`:(e.iw?'<span class="tag flag-win">📅 Jul</span>':'')}</div></div><div class="card-right">${d?`<span class="card-dist">${d}</span>`:''}<span class="score-badge" style="color:${scoreColor(matchScore(e))}">${matchScore(e)}${t('pct_match')}</span>${rb}${onPlan(e.id)?'<span style="font-size:11px;color:var(--amber)">⭐</span>':''}</div></div>`;}).join('');document.getElementById('explore-list').innerHTML=html||`<div style="padding:40px;text-align:center;color:var(--txt3)">${t('no_matches')}</div>`;}
function renderNearby(){const f=filters.nearby;document.getElementById('nearby-loc-label').textContent=gps?`${gps.lat.toFixed(4)}, ${gps.lon.toFixed(4)}`:t('locate_hint');if(!gps){document.getElementById('nearby-list').innerHTML=`<div style="padding:40px;text-align:center;color:var(--txt3)">${t('locate_enable')}</div>`;document.getElementById('nearby-count').textContent='';return;}let entries=ENTRIES.filter(e=>matchesFilter(e,f)).map(e=>({...e,_d:haversine(gps.lat,gps.lon,e.ll[0],e.ll[1])})).sort((a,b)=>a._d-b._d);document.getElementById('nearby-count').textContent=`(${entries.length})`;const rings=[{max:2,label:t('dist_2'),entries:[]},{max:10,label:t('dist_10'),entries:[]},{max:30,label:t('dist_30'),entries:[]},{max:Infinity,label:t('dist_far'),entries:[]}];entries.forEach(e=>{const ring=rings.find(r=>e._d<=r.max);if(ring)ring.entries.push(e);});let html='';rings.forEach(r=>{if(!r.entries.length)return;html+=`<div class="dist-group-header">${r.label}</div>`;html+=r.entries.map(e=>{const arrow=bearingArrow(gps.lat,gps.lon,e.ll[0],e.ll[1]);const cats=(e.ca||[]).slice(0,1).map(catTag).join('');return`<div class="card" data-id="${e.id}"><div class="card-dot" style="background:${COUNTRY_COLOR[e.co]}"></div><div class="card-body"><div class="card-name">${getName(e)}</div><div class="card-short">${getShort(e).substring(0,90)}…</div><div class="card-meta">${cats}${e.re}</div></div><div class="card-right"><span class="card-dist">${arrow} ${fmtDist(e._d)}</span><span class="score-badge" style="color:${scoreColor(matchScore(e))}">${matchScore(e)}${t('pct_match')}</span><div></div></div>`;}).join('');});document.getElementById('nearby-list').innerHTML=html||`<div style="padding:40px;text-align:center;color:var(--txt3)">${t('no_matches')}</div>`;}
function renderPlan(){const entries=ENTRIES.filter(e=>onPlan(e.id)).map(e=>gps?({...e,_d:haversine(gps.lat,gps.lon,e.ll[0],e.ll[1])}):e).sort((a,b)=>(a._d||0)-(b._d||0));document.getElementById('plan-count').textContent=entries.length?`(${entries.length})`:'';document.getElementById('plan-actions-row').style.display=entries.length?'flex':'none';if(!entries.length){document.getElementById('plan-list').innerHTML=`<div class="plan-empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><p>${t('plan_empty_1')}<br>${t('plan_empty_2')} <b>${t('plan_add')}</b>.</p></div>`;return;}document.getElementById('plan-list').innerHTML=entries.map(e=>{const d=e._d!=null?fmtDist(e._d):'';const cats=(e.ca||[]).slice(0,2).map(catTag).join('');return`<div style="display:flex;align-items:center"><div class="card" data-id="${e.id}" style="flex:1;border:none;padding:12px 12px 12px 16px"><div class="card-dot" style="background:${COUNTRY_COLOR[e.co]}"></div><div class="card-body"><div class="card-name">${getName(e)}</div><div class="card-meta">${cats}${d?`<span style="font-size:12px;color:var(--txt3)">${d}</span>`:''}</div></div><div class="card-right"></div></div><button class="plan-card-remove" data-remove="${e.id}" style="margin-right:12px"><svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div style="height:1px;background:var(--bg3);margin:0 16px"></div>`;}).join('');}
function openSheet(e){sheetEntry=e;descExpanded=false;const c=COUNTRY_COLOR[e.co]||'#8a6050';document.getElementById('sh-dot').style.background=c;document.getElementById('sh-name').textContent=getName(e);document.getElementById('sh-region').textContent=`${COUNTRY_FLAG[e.co]||''} ${e.re}`;document.getElementById('sh-rating').innerHTML='';document.getElementById('sh-cats').innerHTML=(e.ca||[]).map(catTag).join('');document.getElementById('sh-desc-short').textContent=lang==='no'&&e.s_no?e.s_no:e.s;const fullDesc=(lang==='no'&&LO_NO[e.id])?LO_NO[e.id]:(e.lo||'');document.getElementById('sh-desc-full').textContent=fullDesc;document.getElementById('sh-desc-full').style.display='none';const expandBtn=document.getElementById('sh-expand');if(fullDesc){expandBtn.textContent=t('read_more');expandBtn.classList.remove('hide');}else{expandBtn.classList.add('hide');}const pr=e.pr||{};const prNo=(lang==='no'&&PR_NO[e.id])||{};const pv=(en,k)=>(lang==='no'&&prNo[k])||en||'';const prEl=document.getElementById('sh-practical');if(pr.time||pr.cost||pr.transport||pr.tips){prEl.innerHTML=[pv(pr.time,'time_no')?`<div class="pr-item"><div class="pr-label">${t('pr_time')}</div><div class="pr-val">${pv(pr.time,'time_no')}</div></div>`:'',pv(pr.cost,'cost_no')?`<div class="pr-item"><div class="pr-label">${t('pr_cost')}</div><div class="pr-val">${pv(pr.cost,'cost_no')}</div></div>`:'',pv(pr.transport,'transport_no')?`<div class="pr-item pr-full"><div class="pr-label">${t('pr_transport')}</div><div class="pr-val">${pv(pr.transport,'transport_no')}</div></div>`:'',pv(pr.tips,'tips_no')?`<div class="pr-item pr-full"><div class="pr-label">${t('pr_tips')}</div><div class="pr-val">${pv(pr.tips,'tips_no')}</div></div>`:''].join('');prEl.style.display='grid';}else{prEl.style.display='none';}const flags=[];if(e.ed)flags.push(`<span class="tag flag-win">📅 ${e.ed.replace(/2026-/g,'').replace('/','-')}</span>`);if(e.iw)flags.push(`<span class="tag flag-win">${t('flag_win')}</span>`);if(e.nm)flags.push(`<span class="tag flag-nm">${t('flag_nm')}</span>`);if(e.sw)flags.push(`<span class="tag flag-sw">${t('flag_sw')}</span>`);if(e.sa)flags.push(`<span class="tag flag-sa">${t('flag_sa')}</span>`);if(e.ki)flags.push(`<span class="tag flag-ki">${t('flag_ki')}</span>`);if(gps){const d=haversine(gps.lat,gps.lon,e.ll[0],e.ll[1]);flags.push(`<span class="tag">${bearingArrow(gps.lat,gps.lon,e.ll[0],e.ll[1])} ${fmtDist(d)} ${t('flag_away')}</span>`);}document.getElementById('sh-flags').innerHTML=flags.join('');document.getElementById('sh-coords').textContent=`${e.ll[0].toFixed(5)}, ${e.ll[1].toFixed(5)}`;const sc=matchScore(e);const scEl=document.getElementById('sh-score');const idNum='#'+ENTRY_NUMS.get(e.id).toString().padStart(3,'0');scEl.textContent=`${idNum} · ${sc}${t('pct_match')}`;scEl.style.color=scoreColor(sc);const rt=RATINGS[e.id];const rtEl=document.getElementById('sh-ratings');if(rt){let html='';if(rt.g!=null){const starsG='★'.repeat(Math.round(rt.g))+'☆'.repeat(5-Math.round(rt.g));const gcnt=rt.gn?`${rt.gn.toLocaleString()} ${t('reviews')}`:' ';html+=`<div class="rating-item"><div class="rating-platform">🌐 Google</div><div class="rating-score" style="color:#1a5ca8">${rt.g.toFixed(1)}</div><div class="rating-stars">${starsG}</div>${gcnt?`<div class="rating-count">${gcnt}</div>`:''}</div>`;if(rt.t!=null)html+='<div class="rating-sep"></div>';}if(rt.t!=null){const starsT='★'.repeat(Math.round(rt.t))+'☆'.repeat(5-Math.round(rt.t));const tcnt=rt.tn?`${rt.tn.toLocaleString()} ${t('reviews')}`:' ';html+=`<div class="rating-item"><div class="rating-platform">🟢 Tripadvisor</div><div class="rating-score" style="color:#1a7a50">${rt.t.toFixed(1)}</div><div class="rating-stars">${starsT}</div>${tcnt?`<div class="rating-count">${tcnt}</div>`:''}</div>`;}rtEl.innerHTML=html;rtEl.style.display='flex';}else{rtEl.style.display='none';}updateSheetPlanBtn();const ib=document.getElementById('sh-info-btn');if(ib){ib.style.display='block';ib.onclick=()=>showInfo(e.id);ib.textContent='\u2139\ufe0e  '+(lang==='no'?'Bakgrunnsinfo':'Background info')+(WIKI[e.id]?' + Wikipedia':'');}document.getElementById('sheet').classList.add('open');document.getElementById('sheet-overlay').classList.add('show');document.getElementById('sheet-scroll').scrollTop=0;}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheet-overlay').classList.remove('show');sheetEntry=null;}

function applyLang(){const catPillMap={all:'cat_all',unusual:'cat_unusual',history:'cat_history',nature:'cat_nature',events:'cat_events',food:'cat_food',sleep:'cat_sleep'};const flagPillMap={sw:'cat_swim',plan:'cat_plan'};['map-filter-bar','explore-cats','nearby-cats'].forEach(barId=>{const bar=document.getElementById(barId);if(!bar)return;bar.querySelectorAll('[data-cat]').forEach(btn=>{const k=catPillMap[btn.dataset.cat];if(k)btn.textContent=(btn.dataset.cat==='all'?t('cat_all')+' '+ENTRIES.length:t(k));});bar.querySelectorAll('[data-flag]').forEach(btn=>{const k=flagPillMap[btn.dataset.flag];if(k)btn.textContent=t(k);});});const sortMap={score:'sort_score',dist:'sort_dist',rating:'sort_rating'};document.querySelectorAll('.sort-btn').forEach(btn=>{if(sortMap[btn.dataset.sort])btn.textContent=t(sortMap[btn.dataset.sort]);});const sl=document.querySelector('.sort-label');if(sl)sl.textContent=t('sort_label');const si=document.getElementById('search-input');if(si)si.placeholder=t('search_ph');const shm=document.getElementById('sh-maps');if(shm)shm.textContent=t('open_maps');const pm=document.getElementById('btn-plan-maps');if(pm)pm.textContent=t('plan_maps');const pc=document.getElementById('btn-plan-copy');if(pc)pc.textContent=t('plan_copy');const ll=document.getElementById('nearby-loc-label');if(ll&&!gps)ll.textContent=t('locate_hint');document.getElementById('offline-banner').textContent=t('offline');const bl=document.getElementById('btn-lang');if(bl)bl.textContent=lang==='no'?'NO':'EN';const navViews=['map','nearby','info','explore','plan','games'];const navKeys=['nav_map','nav_nearby','nav_info','nav_explore','nav_plan','nav_games'];navViews.forEach((v,i)=>{const btn=document.querySelector(`.nav-btn[data-view="${v}"]`);if(btn){const nodes=[...btn.childNodes].filter(n=>n.nodeType===3);if(nodes.length)nodes[nodes.length-1].textContent='\n      '+t(navKeys[i])+'\n    ';}});const titleMap={explore:'title_explore',nearby:'title_nearby',plan:'title_plan'};const gamesTitleEl=document.getElementById('games-title');if(gamesTitleEl)gamesTitleEl.textContent=lang==='no'?'Spill':'Games';Object.entries(titleMap).forEach(([id,key])=>{const el=document.querySelector(`#screen-${id} .screen-title`);if(el){const txt=el.childNodes[0];if(txt&&txt.nodeType===3)txt.textContent=t(key)+' ';}});if(sheetEntry)updateSheetPlanBtn();
  const coNames={estonia:'info_estonia',latvia:'info_latvia',lithuania:'info_lithuania',poland:'info_poland'};

function locateMe(){if(!navigator.geolocation){alert('GPS not available');return;}navigator.geolocation.getCurrentPosition(pos=>{gps={lat:pos.coords.latitude,lon:pos.coords.longitude};if(MAP){if(gpsMarker)gpsMarker.remove();gpsMarker=L.circleMarker([gps.lat,gps.lon],{radius:7,fillColor:'#e8571a',fillOpacity:1,color:'#fff',weight:2}).addTo(MAP);MAP.setView([gps.lat,gps.lon],12);}renderNearby();renderExplore();renderPlan();},err=>{alert('Location error: '+err.message)},{enableHighAccuracy:true,timeout:10000});}
function showView(v){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('screen-'+v).classList.add('active');document.querySelector(`.nav-btn[data-view="${v}"]`).classList.add('active');if(v==='explore')renderExplore();else if(v==='nearby')renderNearby();else if(v==='plan')renderPlan();
  else if(v==='info'){renderInfo();loadInfoPhotos();}else if(v==='games'){renderGames();}else if(v==='map'&&MAP)setTimeout(()=>MAP.invalidateSize(),50);}
function wireCombi(containerId,fkey,onchange){document.getElementById(containerId).addEventListener('click',e=>{const btn=e.target.closest('[data-cat],[data-flag]');if(!btn)return;const F=filters[fkey];if(btn.dataset.cat==='all'){F.cats=[];F.flags=[];document.querySelectorAll(`#${containerId} [data-cat],#${containerId} [data-flag]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');}else if(btn.dataset.cat){const c=btn.dataset.cat,on=btn.classList.contains('active');btn.classList.toggle('active');F.cats=on?F.cats.filter(x=>x!==c):[...F.cats,c];}else if(btn.dataset.flag){const fl=btn.dataset.flag,on=btn.classList.contains('active');btn.classList.toggle('active');F.flags=on?F.flags.filter(x=>x!==fl):[...F.flags,fl];}const allBtn=document.querySelector(`#${containerId} [data-cat="all"]`);if(F.cats.length===0&&F.flags.length===0)allBtn.classList.add('active');else allBtn.classList.remove('active');onchange();});}
function wirePills(containerId,filterKey,onchange){document.getElementById(containerId).addEventListener('click',e=>{const btn=e.target.closest('[data-cat],[data-country],[data-flag]');if(!btn)return;if(btn.dataset.cat){document.querySelectorAll(`#${containerId} [data-cat]`).forEach(b=>b.classList.remove('active'));btn.classList.add('active');filters[filterKey].cat=btn.dataset.cat;}else if(btn.dataset.country){const active=btn.classList.contains('active');document.querySelectorAll(`#${containerId} [data-country]`).forEach(b=>b.classList.remove('active'));if(!active){btn.classList.add('active');filters[filterKey].country=btn.dataset.country;}else filters[filterKey].country=null;}else if(btn.dataset.flag){const fl=btn.dataset.flag,active=btn.classList.contains('active');btn.classList.toggle('active');const flags=filters[filterKey].flags;if(active)filters[filterKey].flags=flags.filter(x=>x!==fl);else filters[filterKey].flags=[...flags,fl];}onchange();});}
