<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffc3ac">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Boba-Baltic 26">
<title>Boba-Baltic 26</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff8f4;--bg2:#ffeee6;--bg3:#fff0ea;--bg4:#ffc3ac;
  --txt:#2c1810;--txt2:#7a4030;--txt3:#b07060;
  --accent:#e8571a;--accent2:#c94510;
  --green:#1a7a50;--amber:#c47a10;--red:#c03020;
  --est:#1a7a50;--lat:#1a5ca8;--lit:#6b35a8;--pol:#c03020;--all:#8a6050;
  --sheet-radius:20px;--nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{height:100%}body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input{font:inherit;color:inherit;background:none;border:none;outline:none}
a{color:var(--accent);text-decoration:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#screens{flex:1;min-height:0;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
#nav{display:flex;background:var(--bg2);border-top:1px solid var(--bg4);height:calc(var(--nav-h) + var(--safe-bottom));min-height:56px;padding-bottom:var(--safe-bottom);flex-shrink:0;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--txt3);transition:color .15s;font-size:11px;padding:6px 0;position:relative}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-count{position:absolute;top:8px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:16px;height:16px;padding:0 4px;display:none;align-items:center;justify-content:center;line-height:1}
.nav-count.show{display:flex}
.screen-header{padding:12px 16px 8px;display:flex;align-items:center;gap:10px;background:var(--bg);border-bottom:1px solid var(--bg3);flex-shrink:0;z-index:10}
.screen-title{font-size:18px;font-weight:700;flex:1}
.header-count{font-size:13px;color:var(--txt3);font-weight:400}
#map{flex:1;width:100%;z-index:1}
#map-controls{position:absolute;top:12px;right:12px;z-index:400;display:flex;flex-direction:column;gap:8px}
.map-btn{width:40px;height:40px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(44,24,16,.2);color:var(--txt);transition:background .15s}
.map-btn:active,.map-btn.active{background:var(--accent);color:#fff}
.map-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#map-filter-bar{position:absolute;top:12px;left:12px;right:60px;z-index:400;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#map-filter-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--bg2);border:1px solid var(--bg4);color:var(--txt2);transition:all .15s;cursor:pointer;white-space:nowrap}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.pill-est.active{background:var(--est);border-color:var(--est);color:#fff}
.pill.pill-lat.active{background:var(--lat);border-color:var(--lat);color:#fff}
.pill.pill-lit.active{background:var(--lit);border-color:var(--lit);color:#fff}
.pill.pill-pol.active{background:var(--pol);border-color:var(--pol);color:#fff}
.search-wrap{margin:8px 16px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;padding:10px 14px;gap:8px}
.search-wrap svg{width:17px;height:17px;stroke:var(--txt3);fill:none;stroke-width:2;flex-shrink:0}
.search-wrap input{flex:1;font-size:15px;color:var(--txt)}
.search-wrap input::placeholder{color:var(--txt3)}
.search-clear{color:var(--txt3);display:none;padding:2px}
.search-clear.show{display:block}
.filter-row{padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.list-scroller{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.list-scroller::-webkit-scrollbar{width:3px}
.list-scroller::-webkit-scrollbar-track{background:transparent}
.list-scroller::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
.card{padding:14px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .1s}
.card:active{background:var(--bg3)}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:15px;line-height:1.3;margin-bottom:3px}
.card-short{font-size:13px;color:var(--txt2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.card-dist{font-size:12px;color:var(--txt3);font-weight:500}
.entry-id{font-size:10px;font-weight:700;color:var(--bg4);letter-spacing:.3px;flex-shrink:0;align-self:center;background:var(--bg3);border-radius:4px;padding:1px 5px}
.card-rating{display:flex;gap:2px}
.star{font-size:11px;opacity:.3}
.star.on{opacity:1;color:var(--amber)}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--bg4);color:var(--txt3);text-transform:uppercase;letter-spacing:.4px}
.tag.cat-unusual{background:#2a1f47;color:#a78bfa}
.tag.cat-history{background:#1a2e1a;color:#6ee7b7}
.tag.cat-nature{background:#132a1a;color:#34d399}
.tag.cat-coldwar{background:#2a1a1a;color:#f87171}
.tag.cat-food{background:#2a2010;color:#fbbf24}
.tag.cat-sleep{background:#101a2a;color:#60a5fa}
.tag.cat-islands{background:#0f2232;color:#38bdf8}
.tag.cat-events{background:#2a1830;color:#e879f9}
.tag.flag-win{background:#1a2a10;color:#86efac}
.tag.flag-nm{background:#2a2210;color:#fcd34d;opacity:.75}
.tag.flag-sw{background:#0f2232;color:#7dd3fc}
.tag.flag-sa{background:#2a1a10;color:#fb923c}
.tag.flag-ki{background:#1a2a1a;color:#86efac}
.dist-group-header{padding:10px 16px 4px;font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--txt3);text-transform:uppercase;background:var(--bg);position:sticky;top:0;z-index:5}
#sheet-overlay{position:fixed;inset:0;background:rgba(44,24,16,.35);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s}
#sheet-overlay.show{opacity:1;pointer-events:all}
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--bg2);border-radius:var(--sheet-radius) var(--sheet-radius) 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.15,1);max-height:88dvh;display:flex;flex-direction:column}
#sheet.open{transform:translateY(0)}
#sheet-handle{width:40px;height:4px;background:var(--bg4);border-radius:99px;margin:12px auto 0;flex-shrink:0}
#sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(var(--safe-bottom) + 20px)}
#sheet-scroll::-webkit-scrollbar{display:none}
.sheet-header{padding:12px 16px 8px;display:flex;align-items:flex-start;gap:10px}
.sheet-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sheet-name{font-size:20px;font-weight:700;line-height:1.2;flex:1}
.sheet-region{font-size:13px;color:var(--txt3);margin-top:2px}
.sheet-cats{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap}
.sheet-ratings{margin:0 16px 14px;background:var(--bg3);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center}
.rating-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.rating-platform{font-size:11px;color:var(--txt3);font-weight:700;letter-spacing:.3px}
.rating-score{font-size:24px;font-weight:800;line-height:1}
.rating-count{font-size:10px;color:var(--txt3)}
.rating-stars{font-size:13px;color:var(--amber)}
.rating-sep{width:1px;height:44px;background:var(--bg4);flex-shrink:0}
.score-badge{font-size:11px;font-weight:800;padding:2px 7px;border-radius:99px;background:var(--bg4);color:var(--txt3);letter-spacing:.2px;white-space:nowrap}
.sheet-score{display:inline-block;font-size:22px;font-weight:800;padding:0 16px 12px}
.sheet-desc{padding:0 16px 12px;font-size:14px;color:var(--txt2);line-height:1.55}
.sheet-desc-full{display:none}
.sheet-expand{color:var(--accent);font-size:13px;padding:0 16px 12px;display:block;cursor:pointer}
.sheet-expand.hide{display:none}
.sheet-practical{margin:0 16px 12px;background:var(--bg3);border-radius:12px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-practical .pr-item{display:flex;flex-direction:column;gap:2px}
.sheet-practical .pr-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sheet-practical .pr-val{font-size:13px;color:var(--txt)}
.sheet-practical .pr-full{grid-column:1/-1}
.sheet-flags{padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.sheet-actions{padding:0 16px 16px;display:flex;gap:10px}
.btn-primary,.btn-secondary{flex:1;padding:13px 10px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--txt)}
.btn-secondary:active{background:var(--bg4)}
.btn-secondary.on-plan{background:var(--green);color:#fff}
.plan-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt3);padding:40px;text-align:center}
.plan-empty svg{width:48px;height:48px;stroke:var(--bg4);opacity:.6}
.plan-actions-row{padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.plan-actions-row button{flex:1;padding:10px;border-radius:10px;background:var(--bg3);font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
.plan-actions-row button:active{background:var(--bg4)}
.plan-card-remove{width:32px;height:32px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--txt3);flex-shrink:0}
.plan-card-remove:active{background:var(--red);color:#fff}
#offline-banner{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--accent);color:#fff;font-size:12px;font-weight:700;text-align:center;padding:6px;transform:translateY(-100%);transition:transform .3s}
#offline-banner.show{transform:translateY(0)}
.sort-wrap{padding:0 16px 8px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.sort-label{font-size:12px;color:var(--txt3);font-weight:600}
.sort-btn{padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--txt2);border:1px solid var(--bg4);transition:all .15s}
.sort-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#btn-lang{background:var(--bg3);border:1px solid var(--bg4);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--txt2);letter-spacing:.5px;flex-shrink:0}
#btn-lang:active{background:var(--bg4)}
.leaflet-container{background:#e8d8cc}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(42,107,191,.2)!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:rgba(42,107,191,.8)!important;color:#fff!important;font-weight:700}
.leaflet-popup-content-wrapper{background:var(--bg2);color:var(--txt);border-radius:10px;box-shadow:0 4px 16px rgba(44,24,16,.2)}
.leaflet-popup-tip{background:var(--bg2)}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--txt)!important;border-color:var(--bg4)!important}


/* ─── GAMES ──────────────────────────────────────────────────── */
.game-lobby{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.game-card{background:var(--bg2);border-radius:14px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center}
.game-card:active{background:var(--bg3);border-color:var(--accent)}
.game-card-icon{font-size:32px;line-height:1}
.game-card-name{font-size:14px;font-weight:700;color:var(--txt)}
.game-card-desc{font-size:11px;color:var(--txt3);line-height:1.4}
.game-area{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.game-status{font-size:14px;font-weight:700;color:var(--txt);text-align:center;padding:8px;background:var(--bg2);border-radius:10px}
.game-score{display:flex;justify-content:center;gap:24px;font-size:13px;color:var(--txt2)}
.game-score span{font-weight:700;color:var(--txt)}
.game-btn{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.game-btn-primary{background:var(--accent);color:#fff}
.game-btn-primary:active{background:var(--accent2)}
.game-btn-secondary{background:var(--bg3);color:var(--txt)}
.game-btn-secondary:active{background:var(--bg4)}
.game-btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
/* Tic-Tac-Toe */
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:280px;width:100%;aspect-ratio:1;margin:0 auto}
.ttt-cell{background:var(--bg2);border-radius:12px;font-size:36px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--bg3);transition:background .1s;user-select:none}
.ttt-cell:active{background:var(--bg3)}
.ttt-cell.x{color:var(--accent)}
.ttt-cell.o{color:var(--lat)}
.ttt-cell.win{background:var(--bg4);border-color:var(--accent)}
/* Connect Four */
.c4-board{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--lat);padding:8px;border-radius:14px;max-width:360px;margin:0 auto}
.c4-col-btn{display:flex;flex-direction:column;gap:4px;cursor:pointer}
.c4-cell{width:100%;aspect-ratio:1;border-radius:50%;background:var(--bg);flex-shrink:0;transition:background .15s}
.c4-cell.p1{background:var(--accent)}
.c4-cell.p2{background:#f5c500}
.c4-cell.win{box-shadow:0 0 0 3px #fff}
/* Dots & Boxes */
.dab-board{position:relative;margin:0 auto;touch-action:none;user-select:none}
.dab-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--txt);transform:translate(-50%,-50%)}
.dab-hline,.dab-vline{position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dab-hline{height:16px;transform:translateY(-50%)}
.dab-vline{width:16px;transform:translateX(-50%)}
.dab-line-inner{border-radius:4px;transition:background .15s}
.dab-hline .dab-line-inner{width:100%;height:6px;background:var(--bg3)}
.dab-vline .dab-line-inner{width:6px;height:100%;background:var(--bg3)}
.dab-line-inner.p1{background:var(--accent)}
.dab-line-inner.p2{background:var(--lat)}
.dab-box{position:absolute;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;border-radius:4px;transition:background .2s}
.dab-box.p1{background:rgba(232,87,26,.18)}
.dab-box.p2{background:rgba(26,92,168,.18)}
/* Nim */
.nim-stones{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px}
.nim-stone{width:40px;height:40px;border-radius:50%;background:var(--txt2);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:18px}
.nim-stone.taking{background:var(--accent);transform:scale(1.1)}
.nim-take-btns{display:flex;gap:8px;justify-content:center}
/* Battleship */
.bship-grids{display:flex;flex-direction:column;gap:16px;align-items:stretch}
.bship-label{font-size:12px;font-weight:700;color:var(--txt3);text-align:center;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.bship-grid{display:grid;grid-template-columns:repeat(10,1fr);grid-auto-rows:1fr;gap:2px;max-width:min(380px,calc(100vw - 32px));width:100%;aspect-ratio:1}
.bship-cell{border-radius:3px;background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:background .1s;border:1px solid var(--bg3)}
.bship-cell.ship{background:#5a8a6a}
.bship-cell.hit{background:var(--accent);color:#fff}
.bship-cell.miss{background:var(--bg3);color:var(--txt3)}
.bship-cell.sunk{background:#c03020;color:#fff}
.bship-cell.selecting{background:rgba(26,122,80,.4)}
.bship-ships{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.bship-ship-btn{padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--bg4);background:var(--bg2);color:var(--txt)}
.bship-ship-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.bship-ship-btn.placed{text-decoration:line-through;opacity:.5}
.privacy-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px;text-align:center;min-height:300px}
.privacy-screen .big-icon{font-size:64px}
.privacy-screen h2{font-size:20px;font-weight:700;color:var(--txt)}
.privacy-screen p{font-size:14px;color:var(--txt2);line-height:1.5}
/* Mastermind */
.mm-board{display:flex;flex-direction:column;gap:6px;max-width:340px;margin:0 auto}
.mm-row{display:flex;gap:6px;align-items:center}
.mm-peg{width:36px;height:36px;border-radius:50%;border:2px solid var(--bg4);cursor:pointer;transition:all .15s;flex-shrink:0}
.mm-peg.active-slot{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,87,26,.3)}
.mm-feedback{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;width:28px;flex-shrink:0}
.mm-fb-peg{width:10px;height:10px;border-radius:50%;background:var(--bg3)}
.mm-fb-peg.black{background:#222}
.mm-fb-peg.white{background:#ddd;border:1px solid #aaa}
.mm-colors{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.mm-color-btn{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.mm-color-btn.selected{border-color:var(--txt);transform:scale(1.15)}
.mm-code-peg{width:36px;height:36px;border-radius:50%;flex-shrink:0}
/* Baltic Quiz */
.quiz-q{background:var(--bg2);border-radius:12px;padding:16px;font-size:15px;font-weight:600;color:var(--txt);line-height:1.45;text-align:center}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:13px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:var(--bg2);color:var(--txt);text-align:left;transition:all .15s}
.quiz-opt:active{background:var(--bg3)}
.quiz-opt.correct{background:#1a7a50;color:#fff}
.quiz-opt.wrong{background:var(--red);color:#fff}
.quiz-progress{display:flex;gap:4px;justify-content:center}
.quiz-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4)}
.quiz-dot.done{background:var(--accent)}
.quiz-dot.current{background:var(--txt);transform:scale(1.2)}

.game-rules-overlay{position:fixed;inset:0;background:rgba(44,24,16,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.game-rules-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bottom) + 20px);max-height:80dvh;overflow-y:auto;width:100%;max-width:500px}
.game-rules-sheet h2{font-size:18px;font-weight:800;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.game-rules-sheet h2 button{background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--txt);display:flex;align-items:center;justify-content:center}
.game-rules-steps{display:flex;flex-direction:column;gap:10px}
.game-rules-step{display:flex;gap:12px;align-items:flex-start}
.game-rules-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.game-rules-text{font-size:14px;color:var(--txt2);line-height:1.5}
.game-rules-tip{margin-top:14px;background:var(--bg2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--txt3);line-height:1.5}
/* ─── INFO TAB ──────────────────────────────────────────────────── */
#info-co-tabs{display:flex;gap:0;background:var(--bg2);border-bottom:2px solid var(--bg4);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#info-co-tabs::-webkit-scrollbar{display:none}
.info-co-tab{flex:1;min-width:60px;padding:11px 8px;font-size:12px;font-weight:700;color:var(--txt3);text-align:center;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.info-co-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.info-overview{padding:16px;background:var(--bg2);border-bottom:1px solid var(--bg3);font-size:13px;color:var(--txt2);line-height:1.65;white-space:pre-wrap}
.info-stop{border-bottom:1px solid var(--bg3)}
.info-stop summary{padding:14px 16px;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
.info-stop summary::-webkit-details-marker{display:none}
.info-stop summary::marker{display:none}
.info-stop-arrow{font-size:12px;color:var(--txt3);flex-shrink:0;transition:transform .2s}
.info-stop[open] .info-stop-arrow{transform:rotate(90deg)}
.info-stop-body{padding:0 16px 16px}
.info-city-text{font-size:13px;color:var(--txt2);line-height:1.65;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bg3)}
.info-entry{padding:12px 0;border-bottom:1px solid var(--bg3);border-radius:8px;transition:background 0.8s}
.info-entry.hl{background:rgba(232,87,26,.12);transition:none}
.info-entry:last-child{border-bottom:none}
.info-entry-name{font-weight:700;font-size:14px;color:var(--txt);margin-bottom:6px;display:flex;align-items:flex-start;gap:8px}
.info-entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.info-entry-text{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:8px}
.info-entry-footer{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.info-wiki{font-size:12px;color:var(--accent);font-weight:600;text-decoration:none}
.info-open-explore{font-size:11px;background:var(--bg4);color:var(--txt2);border-radius:6px;padding:3px 9px;border:none;cursor:pointer;font-weight:600}
.info-open-explore:active{background:var(--accent);color:#fff}
.info-plan-btn{font-size:11px;background:var(--bg4);color:var(--txt2);border-radius:6px;padding:3px 9px;border:none;cursor:pointer;font-weight:600;transition:background .15s,color .15s}
.info-plan-btn.on-plan{background:var(--green);color:#fff}
.info-plan-btn:active{background:var(--accent2);color:#fff}
</style>

<script>
const ENTRIES=[{"id":"est-t01","n":"Tallinn Old Town","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"Best-preserved medieval Old Town in northern Europe — UNESCO. Müürivahe wall-side vendors, Saint Catherine's artisan passage, medieval pharmacy operating since 1422.","ll":[59.4356,24.7406],"rt":3,"tg":["UNESCO","medieval","city wall","architecture","free"],"lo":"Every conqueror of Estonia left their mark on Toompea hill. The Lower Town keeps its 13th–14th century street grid intact. Müürivahe Street runs along the city wall with hand-knitted wool vendors in medieval niches. Saint Catherine's Passage (Katariina käik) has glassblowers and jewellers in medieval workshops. The Danish King's Garden on Toompea has a free walkable city wall section.","pr":{"time":"Half to full day","cost":"Free (most areas)","transport":"10-min walk from ferry terminal","tips":"Kohtu tänav viewpoint best after 17:00. Börsi passage has key dates in Estonian history inscribed on the walls. Go before 9am to beat cruise-ship crowds."},"n_no":"Tallinns gamle bydel","s_no":"Nordens best bevarte middelalderby – UNESCO. Müürivahe-gateselgere langs bymuren, Sankt Katarinas håndverkerspassasje og et middelalderapotek i drift siden 1422."},{"id":"est-t02","n":"Kiek in de Kök & Bastion Passages","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"15th-century cannon tower with 17th-century underground tunnels. Used as WWII bomb shelters; squatted by Soviet-era punks.","ll":[59.4347,24.7389],"rt":2,"tg":["fortifications","underground","Cold War","WWII","tunnels"],"lo":"The Bastion Passages (17th–18th century) cut 1.3km of limestone tunnels beneath Tallinn — completely dark without the guide's lantern. At various points squatted by Tallinn punk youth hiding from Soviet militia. The Carved Stone Museum in the same complex holds medieval architectural fragments excavated from Old Town building sites. The combo ticket with the City Museum is excellent value.","pr":{"time":"2–3 hours","cost":"Full complex €16; passages only €10","transport":"Komandandi tee 2, Old Town","tips":"Book the Bastion Passages tour in advance in summer. Dress warmly — tunnels are cold year-round."},"n_no":"Kiek in de Kök og Bastion Passages","s_no":"Kanongtårn fra 1400-tallet med underjordiske tunneler fra 1600-tallet. Brukt som bomberom under WWII – og squattet av punks i sovjettiden."},{"id":"est-t03","n":"KGB Museum — Hotel Viru Floor 23","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual","history"],"s":"The KGB secretly occupied the non-existent 23rd floor of Hotel Viru 1969–1991. Surveillance equipment still intact. Guided tours only.","ll":[59.4368,24.7549],"rt":3,"tg":["KGB","Cold War","spy","surveillance","Soviet","guided only"],"lo":"Spy cameras in hotel rooms, microphones in restaurant tables, a full listening room with Soviet tape recorders — discovered only in 1994. Tours show the listening room, Cold War electronics, and KGB operational methods. The guide explains exactly how Soviet surveillance of foreign visitors was conducted. Pre-book; max 25 per tour.","pr":{"time":"1 hour","cost":"€20 adult","transport":"Viru väljak 4, city centre — book in advance","tips":"Pre-book: viru.ee or +372 680 9300. Guided only; no walk-ins. Max 25 per tour."},"n_no":"KGB-museet — Hotel Viru, 23. etasje","s_no":"KGB okkuperte i hemmelighet den ikke-eksisterende 23. etasjen på Hotel Viru fra 1969 til 1991. Overvåkningsutstyret er fortsatt intakt. Kun guidede turer."},{"id":"est-t04","n":"Seaplane Harbour (Lennusadam)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"World-class maritime museum in restored WWI seaplane hangars. Board WWII submarine Lembit bow to stern, walk through an icebreaker.","ll":[59.4517,24.7384],"rt":3,"tg":["maritime","submarine","icebreaker","museum","WWII","seaplane hangar"],"lo":"Three reinforced concrete shell domes (1916–17) — each 36m wide, column-free, just 8–10cm thick at the apex — were among the world's first. The Lembit submarine (1936) lets you walk through torpedo tubes, engine room, and crew bunks. Icebreaker Suur Tõll (1914) and a WWI Short Type 184 seaplane replica are also on display. One of the finest maritime museums in northern Europe.","pr":{"time":"2–3 hours","cost":"€22 adult","transport":"Vesilennuki 6, Kalamaja — 15 min walk from Old Town","tips":"Allow extra time for the submarine — at least 45 min. Pre-book in peak season."},"n_no":"Sjøflyterminalen (Lennusadam)","s_no":"Førsteklasses maritimt museum i restaurerte sjøflyhangarer fra WWI. Gå om bord i WWII-ubåten Lembit og vandre gjennom et isbryterfartøy."},{"id":"est-t05","n":"Patarei Prison","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"Sea fortress turned prison used by three regimes — Estonian, Nazi, Soviet — until 1997. Cells frozen in time. 'Communism is Prison' exhibition.","ll":[59.4489,24.7434],"rt":3,"tg":["prison","Soviet","Cold War","dark tourism","three regimes"],"lo":"Built 1830–1837 as a Russian Imperial sea fortress, Patarei became a prison in 1920 and held inmates under Estonian, German, and Soviet occupation alike. Cells, corridors, and exercise yards are preserved almost exactly as left. Estonia's first Michelin star? No — this is the country's darkest attraction. An international museum for victims of communism was scheduled to open here on June 14, 2026.","pr":{"time":"2 hours","cost":"Check current admission","transport":"Pakri 2, Kalamaja — 20 min walk from Old Town","tips":"Not suitable for young children. Photography allowed throughout."},"n_no":"Patarei fengsel","s_no":"Sjøfestning omgjort til fengsel, brukt av tre regimer – estisk, nazistisk og sovjetisk – frem til 1997. Cellene er frosset i tid."},{"id":"est-t06","n":"Town Hall Pharmacy (Raeapteek)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","unusual"],"s":"Operating continuously since 1422 — one of the oldest pharmacies in Europe. Free medieval remedy museum. Still sells modern medicines.","ll":[59.4371,24.7453],"rt":2,"tg":["pharmacy","medieval","1422","operating","unique","free"],"lo":"First mentioned April 8, 1422, Raeapteek is Europe's oldest continuously operating pharmacy on the same premises. An 1695 price list reveals 54 types of medicinal water, earthworm oil, burnt hedgehogs, human fat, powdered unicorn horn, and 'mummy juice' among its remedies. Medieval recipe books are displayed. You can still buy paracetamol in a building that opened when Gutenberg was printing his first bible.","pr":{"time":"30 minutes","cost":"Free museum","transport":"Raekoja plats 11, Old Town","tips":"The medieval remedies section is genuinely surprising. Also a functioning pharmacy."},"n_no":"Rådshusapoteket (Raeapteek)","s_no":"I kontinuerlig drift siden 1422 – et av Europas eldste apotek. Gratis museum om middelaldermedisin. Selger fortsatt moderne medisiner."},{"id":"est-t07","n":"Linnahall Rooftop","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual","history"],"s":"Brutalist 1980 Olympics venue, now derelict. Locals climb the rooftop for sunset views over the harbour and Old Town. Free (informal access).","ll":[59.4468,24.7513],"rt":2,"tg":["Soviet","brutalism","rooftop","view","free","derelict"],"lo":"Built for the 1980 Moscow Olympics sailing events — Tallinn's showpiece of Soviet modernity. Abandoned since the 1990s. The massive stepped limestone pyramid is gradually deteriorating. The roof gives one of the best views in Tallinn — looking across the harbour, the Old Town and the Baltic. Free, informal access.","pr":{"time":"1 hour","cost":"Free","transport":"5 min walk from ferry terminal","tips":"Visit at sunset. Wear sturdy shoes. Check current access status before visiting."},"n_no":"Linnahall-taket","s_no":"Brutalistisk OL-anlegg fra 1980, nå forlatt. Tallinnere klatrer opp på taket for solnedgangsutsikt over havnen og gamlebyen. Gratis (uoffisiell adgang)."},{"id":"est-t08","n":"Estonian Open Air Museum","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history"],"s":"80+ historic buildings from across Estonia — farmsteads, windmills, a church — showing rural life 18th–20th centuries. Working windmills, smoke sauna, Kolu Tavern.","ll":[59.4494,24.653],"rt":2,"tg":["open-air museum","farmstead","windmills","smoke sauna","traditional","crafts"],"lo":"Founded 1957, Rocca al Mare has grown to 68+ structures moved from across Estonia — thatched barns, smoke saunas, granaries, a functioning watermill, a Moravian chapel, and a Soviet-era kolkhoz apartment block. Craft demonstrations run on summer weekends. The Kolu Tavern serves kama, smoked fish, and dark rye bread in a restored 19th-century inn. Allow at least 3 hours.","pr":{"time":"Half day","cost":"~€10 adult","transport":"Rocca al Mare, 8km west — bus 21/21B from city centre","tips":"Combine with Kolu Tavern lunch. Weekend craft demonstrations are worth timing your visit around."},"n_no":"Estlands friluftsmuseum","s_no":"Over 80 historiske bygninger fra hele Estland – gårdsbruk, vindmøller og en kirke – som viser landliv fra 1700- til 1900-tallet."},{"id":"est-t09","n":"St Olaf's Church Tower","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history"],"s":"258 steps for Tallinn's best Old Town panorama. In the 16th century this was one of the tallest buildings in the world (159m).","ll":[59.44,24.7468],"rt":2,"tg":["church","viewpoint","medieval","climb","tallest"],"lo":"St Olaf's held the title of world's tallest building from 1549 to 1625 at 159m. The climb of 258 steep steps ends on a narrow open walkway circling the spire base — you look across at roof level, steeples at eye height all around. The perspective is genuinely different from Toompea's viewpoints. €3; go early or late to avoid queues.","pr":{"time":"1 hour","cost":"€3","transport":"Pikk 24, Old Town","tips":"Go early morning or late evening for the best light and fewest people at the top."},"n_no":"Olavskirken tårn","s_no":"258 trinn til Tallinns beste panoramautsikt over gamlebyen. På 1500-tallet var dette en av verdens høyeste bygninger (159 m)."},{"id":"est-t10","n":"Naissaar Island — Mine Factory & Rocket Base","co":"estonia","re":"Tallinn environs","ty":"attraction","ca":["nature","history"],"s":"Former Soviet mine factory and rocket base 10km from Tallinn. Three hiking trails, underground bunkers, two free RMK campsites.","ll":[59.5669,24.6101],"rt":3,"tg":["Cold War","island","mine factory","rocket base","bunkers","free camping"],"lo":"Militarised in 1914; civilian population evacuated. The Soviet mine factory produced anti-ship mines and a 1963 rocket base had 150km-range missiles. The island is 18.6 km² and 8.5km from the mainland. Three marked trails: military (north), nature (central), mines (south). Scattered fields of mine casings remain where Soviets burned rather than removed them in 1993. Underground bunkers require a headtorch.","pr":{"time":"Full day; overnight recommended","cost":"Ferry ~€10–15 return","transport":"Seasonal ferry from Pirita harbour (summer only)","tips":"Bring headtorch for bunkers. Two free RMK campsites on island. Minimum one night recommended."},"n_no":"Naissaar – Minefabrikk og rakettbase","s_no":"Tidligere sovjetisk minefabrikk og rakettbase, 10 km fra Tallinn. Tre turløyper, underjordiske bunkere og to gratis RMK-campingplasser."},{"id":"est-t11","n":"Kadriorg Palace & KUMU Art Museum","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history","nature"],"s":"Peter the Great's baroque palace (1718), Museum of Foreign Art, free park with rose gardens. Adjacent KUMU — Estonia's national art museum built into limestone cliff.","ll":[59.4401,24.7308],"rt":2,"tg":["palace","baroque","Peter the Great","KUMU","park","tram accessible"],"lo":"The park is freely accessible year-round. The presidential palace across the square has beehives — the president gifts honey to state visitors, a charming tradition. KUMU covers Estonian art 18th century to contemporary, including Soviet-era art that couldn't be shown publicly. The park is free; the museums charge separately.","pr":{"time":"2–3 hours","cost":"Palace ~€6; KUMU ~€10; park free","transport":"Tram 1 or 3 from Old Town to Kadriorg (last stop). ~10 min.","tips":"The park is free and beautiful. Combine both museums or choose one."},"n_no":"Kadriorg-palasset og KUMU kunstmuseum","s_no":"Peter den stores barokkpalass (1718), museum for utenlandsk kunst og gratis park med rosehager. Like ved ligger KUMU – Estlands nasjonale kunstmuseum."},{"id":"est-t12","n":"Museum of Occupations (Vabamu)","co":"estonia","re":"Tallinn","ty":"attraction","ca":["history"],"s":"Interactive museum of Soviet and Nazi occupation 1940–1991 told through individual family stories. Rebuilt 2018 with modern format.","ll":[59.4365,24.788],"rt":3,"tg":["occupation","Soviet","Nazi","deportation","museum","modern","interactive"],"lo":"Vabamu ('freedoms') reopened in 2018 after a complete rebuild. The entrance is marked by concrete suitcases — representing the 1941 and 1949 mass deportations. A refugee fishing boat used to escape Soviet Estonia is on display. The museum tells both occupations through personal voices: deportation, collaboration, resistance, and survival. One of the most personal and affecting history museums in the Baltic states.","pr":{"time":"2–3 hours","cost":"~€10 adult","transport":"Freedom Square area, Tallinn","tips":"The introductory film establishes essential context. Allow 2 hours minimum."},"n_no":"Okkupasjonsmuseet (Vabamu)","s_no":"Interaktivt museum om den sovjetiske og nazistiske okkupasjonen 1940–1991, fortalt gjennom enkeltfamiliers historier."},{"id":"est-t13","n":"Fotografiska Tallinn","co":"estonia","re":"Tallinn","ty":"attraction","ca":["unusual"],"s":"World-class photography gallery in Telliskivi Creative City. Top-floor restaurant with Old Town panorama. Rotating international exhibitions.","ll":[59.4353,24.7417],"rt":2,"tg":["photography","gallery","art","views","Telliskivi"],"lo":"The Stockholm Fotografiska brand's Tallinn location is in a converted Telliskivi factory. Exhibitions change regularly and are consistently at international museum standard. The rooftop restaurant has one of the best city views in Tallinn. Combine with a Telliskivi street art walk and dinner in the creative district.","pr":{"time":"2–3 hours","cost":"Check fotografiska.com","transport":"Telliskivi 60A, Kalamaja","tips":"Combine with Telliskivi street art walk and dinner in the creative district."},"n_no":"Fotografiska Tallinn","s_no":"Verdensledende fotografigalleri i Telliskivi kreativby. Restaurant i øverste etasje med panoramautsikt over gamlebyen."},{"id":"est-t14","n":"Põhjala Brewery Tap Room","co":"estonia","re":"Tallinn","ty":"food","ca":["food"],"s":"Estonia's most acclaimed craft brewery. Baltic Porters, barrel-aged stouts, sour ales. Michelin-recommended. Noblessner Port.","ll":[59.455,24.7353],"rt":3,"tg":["craft beer","Baltic Porter","brewery","oak-aged","Michelin recommended"],"lo":"Põhjala specialises in Baltic Porters aged in Slovenian oak barrels: rich, smooth, with dark dried fruit and chocolate. Also produces world-class imperial stouts, fruited sour ales, and New England IPAs. The tap room in Noblessner harbour has 12+ taps and a terrace. Check pohjala.ee for current hours and brewery tour slots.","pr":{"time":"2 hours","cost":"€5–8 per pint","transport":"Noblessner Port, 20 min walk from Old Town","tips":"Check pohjala.ee for tap room hours and brewery tour availability."},"n_no":"Põhjala Brewery – tapperom","s_no":"Estlands mest prisbelønte håndverksbryggeri. Baltic Porters, fatmodnet stout og syrlige aler. Michelin-anbefalt. Noblessner havn."},{"id":"est-t15","n":"Olde Hansa Restaurant","co":"estonia","re":"Tallinn","ty":"food","ca":["food","history"],"s":"Medieval Hanseatic tavern on Town Hall Square. Elk, wild boar, brown bear sourced locally. Costumed servers, honey beer in clay jugs.","ll":[59.4359,24.7448],"rt":2,"tg":["medieval","restaurant","elk","bear","boar","honey beer"],"lo":"Sources ~10 brown bears per year from Estonian hunters — slow-cooked bear appears seasonally. Elk sirloin, boar sausage with pine needles, smoked fish plates are reliable menu staples. The honey beer is brewed to a medieval recipe. Book ahead for evenings in summer. Lunch is calmer and better value.","pr":{"time":"2 hours","cost":"~€25–45 per head","transport":"Vana turg 1, Old Town","tips":"Book ahead for evenings in summer. Lunch is calmer and better value."},"n_no":"Olde Hansa Restaurant","s_no":"Middelaldersk hanseatisk kro på Rådhusplassen. Elg, villsvin og bjørn fra lokale produsenter. Servitører i kostyme og honningøl i leirgryter."},{"id":"est-t16","n":"Balti Jaama Turg Market","co":"estonia","re":"Tallinn","ty":"food","ca":["food","unusual"],"s":"Tallinn's liveliest market — smoked fish, reindeer burgers, kama smoothies below; Soviet memorabilia (badges, posters, toys) in the antiques hall above.","ll":[59.4395,24.735],"rt":2,"tg":["market","smoked fish","Soviet memorabilia","street food"],"lo":"The ground-floor Food Street runs daily with alder-smoked Baltic herring, kama smoothies, Estonian craft beer from Ülejõe and Pühaste, and vegan pastries. The upstairs antiques hall holds Soviet military medals, pioneer badges, propaganda posters, and vintage Agfa cameras. Saturday mornings draw the biggest crowds; arrive at 09:00 for the best finds.","pr":{"time":"1–2 hours","cost":"Free entry; €5–15 for food","transport":"Kopli 1, next to Balti Jaam train station","tips":"Saturday mornings busiest and best. Soviet antiques upstairs are a treasure trove."},"n_no":"Balti Jaama Turg-markedet","s_no":"Tallinns mest livlige marked – røkt fisk, reinsdyrburgere og kama-smoothies under; sovjetmemorabilia (merker, plakater, leketøy) i antikvitetshallen over."},{"id":"est-t17","n":"Rataskaevu 16","co":"estonia","re":"Tallinn","ty":"food","ca":["food"],"s":"Beloved Old Town restaurant: braised elk with blackcurrant, smoked pork ribs with sauerkraut. Elk main ~€14. Book ahead.","ll":[59.4363,24.7439],"rt":2,"tg":["Estonian cuisine","elk","game","restaurant","Old Town"],"lo":"NOA Chef's Hall earned Estonia's first Michelin star in 2022, housed in a converted 1930s beach villa in Pirita. Chefs Tõnis Siigur and Roman Sidorov build 7-course menus on Estonian produce — foraged mushrooms, whitefish with dill béchamel, coastal herbs, wild game. Reserve weeks in advance. The sister restaurant NOA on the same waterfront terrace has no Michelin star but excellent Baltic views and shorter waiting time.","pr":{"time":"1.5 hours","cost":"~€15–25 per head","transport":"Rataskaevu 16, Old Town","tips":"Book ahead. Lunch is better value."},"n_no":"Rataskaevu 16","s_no":"Elsket restaurant i gamlebyen: braisert elg med solbær, røkte svineribber med surkål. Elgrett ca. €14. Forhåndsbestilling anbefales."},{"id":"est-l01","n":"Viru Bog Boardwalk","co":"estonia","re":"Lahemaa NP","ty":"nature","ca":["nature"],"s":"Estonia's most iconic bog walk. 3.5km boardwalk to observation tower. Wheelchair accessible first 1.5km. Completely silent. Free.","ll":[59.4644,25.6383],"rt":3,"tg":["bog","boardwalk","nature trail","wheelchair accessible","free","silence"],"lo":"After 1km of pine forest the boardwalk emerges onto open raised bog — flat, eerie, dark peat pools reflecting the sky. The 3.5km route ends at a two-level observation tower; the full 6km loop continues through forest back to the carpark. Bring mosquito repellent May–August. Autumn colours (amber, rust, deep green) peak in October. Free; no facilities.","pr":{"time":"2–3 hours","cost":"Free","transport":"35km from Tallinn. Park roadside on Road 1 (600m from Viru Bog sign).","tips":"Early morning best. Mosquito repellent in summer. Ticks April–October."},"n_no":"Viru myr-løypen","s_no":"Estlands mest ikoniske myrtur. 3,5 km treplankeløype til utsiktstårn. Rullestolvennlig de første 1,5 km. Fullstendig stille. Gratis."},{"id":"est-l02","n":"Hara Harbour Soviet Submarine Base","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["unusual","history"],"s":"Abandoned Soviet submarine demagnetisation facility inside Lahemaa NP. Concrete piers reaching into the Baltic. Almost no visitors. Guided tours + glamping available.","ll":[59.541,25.366],"rt":3,"tg":["Cold War","submarine","Soviet","demagnetisation","Lahemaa","unusual"],"lo":"Established 1953, closed 1991. The degaussing piers — where submarine hulls were stripped of magnetic signatures — still extend into the sea. Non-profit Hara Sadam manages guided tours and on-site glamping. Best late afternoon light on the ruins. One of Estonia's most striking Cold War heritage sites.","pr":{"time":"2–3 hours","cost":"Adult €10","transport":"Juminda Peninsula, 65km east of Tallinn","tips":"Book via harasadam.ee. Best late afternoon light on the ruins."},"n_no":"Hara havn – Sovjetisk ubåtbase","s_no":"Forlatt sovjetisk demagnetiseringsanlegg for ubåter inne i Lahemaa nasjonalpark. Betongbrygger ut i Østersjøen. Guidede turer og glamping tilgjengelig."},{"id":"est-l03","n":"Käsmu Village","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["history","nature"],"s":"'The Captains' Village' — former naval school, unofficial sea museum (just knock on the door), Estonia's largest natural boulder field.","ll":[59.6,25.9167],"rt":2,"tg":["fishing village","maritime","boulders","museum","coastal"],"lo":"Captains' houses (ornate wooden homes enriched by Baltic trade) line the streets. The unofficial sea museum owner knows everyone who ever worked the Baltic. The coastline is strewn with glacial boulders — the largest collection of erratic boulders in Estonia. Ask the museum owner about Soviet border regulations; the stories are extraordinary.","pr":{"time":"Half day","cost":"Free village; small donation for museum","transport":"65km from Tallinn","tips":"Ask the museum owner about Soviet border regulations — the stories are extraordinary."},"n_no":"Käsmu-landsbyen","s_no":"«Kapteinenes landsby» – tidligere sjømannsskole, uoffisielt sjømuseum og Estlands største naturlige steinfelt."},{"id":"est-l04","n":"Palmse Manor","co":"estonia","re":"Lahemaa NP","ty":"attraction","ca":["history"],"s":"Crown jewel of Lahemaa's manor houses. 18th-century baroque with formal gardens, coach house, distillery, and ornamental lake.","ll":[59.513,25.955],"rt":2,"tg":["manor house","baroque","gardens","museum","park"],"lo":"Built in the 1680s and renovated in baroque style in the late 18th century, Sagadi Manor estate includes 20 outbuildings: restored distillery, coach house, bath house, and a park with an ornamental lake. The von Fock family commissioned the rococo main house in 1749–53. The painted ceilings and carved wooden staircase are outstanding. Combine with Viru Bog and Käsmu for a full Lahemaa day.","pr":{"time":"2–3 hours","cost":"€5 adult","transport":"Inside Lahemaa NP, 65km from Tallinn — car recommended","tips":"Combine with Viru Bog and Käsmu for a full Lahemaa day."},"n_no":"Palmse gods","s_no":"Perlen blant Lahemeas herregårder. Barokkgods fra 1700-tallet med formell hage, vognhus, destilleri og prydsjø."},{"id":"est-l05","n":"Oandu Old-Growth Forest Trail","co":"estonia","re":"Lahemaa NP","ty":"nature","ca":["nature"],"s":"4.7km through ancient spruce forest. Elk, bear, and lynx footprints in soft ground. One of Estonia's finest primeval-forest walks.","ll":[59.565,26.102],"rt":2,"tg":["old-growth forest","hiking","wildlife","lynx","elk","free"],"lo":"The Oandu beaver trail (1km, 30 min) follows the Altja River valley through a deadwood forest in Lahemaa. Standing dead trees host ten woodpecker species; ground is thick with moss and fallen timber. Beaver dams, lodges, and felled trees are visible — sometimes the beavers themselves at dusk. Waterproof boots essential. A completely different experience from bog walks. Ticks April–October: check skin after.","pr":{"time":"2–3 hours","cost":"Free","transport":"Oandu village, Lahemaa NP","tips":"Waterproof boots. Ticks April–October: check skin after."},"n_no":"Oandu urskogsti","s_no":"4,7 km gjennom urgammel granskog. Elg-, bjørne- og gaupespor i myk jord. En av Estlands fineste urskogsturer."},{"id":"est-p01","n":"Pärnu Beach & Promenade","co":"estonia","re":"Pärnu","ty":"nature","ca":["nature"],"s":"Estonia's finest beach. Summer capital. 1.5km pier for sunset walks. Mud spa culture since 1838. Water 20–22°C in July–August.","ll":[58.3859,24.4971],"rt":2,"tg":["beach","Baltic Sea","spa","pier","summer capital","free"],"lo":"The pier stretches 1.5km into the Gulf of Riga. Spa culture predates the beach resort: the first mud bath house opened in 1838 and the tradition continues at Hedon Spa. The original 1927 Mudaravila building is an Art Nouveau gem. Water temperatures reach 20–22°C in July–August, among the warmest on the Estonian coast.","pr":{"time":"Half to full day","cost":"Free beach","transport":"130km south of Tallinn. Lux Express bus ~€10–15, 2–2.5hrs.","tips":"Mid-week in summer for fewer crowds. Villa Ammende esplanade is a beautiful free evening walk."},"n_no":"Pärnu strand og promenade","s_no":"Estlands fineste strand. Sommerhovedstaden. 1,5 km lang brygge for solnedgangsturer. Gjørme-spakultur siden 1838. Vanntemperatur 20–22 °C i juli–august."},{"id":"est-p02","n":"Pärnu Medieval Days Festival","co":"estonia","re":"Pärnu","ty":"festival","ca":["history","unusual"],"s":"Most authentic medieval market in the Baltic. Every vendor must sell handcrafted goods — no mass production. July 3–5 annually.","ll":[58.3741,24.5022],"rt":3,"tg":["festival","medieval","Hanseatic","crafts","July 3-5"],"lo":"Live blacksmiths, leatherworkers, lute makers, and glassblowers demonstrate actual medieval techniques throughout the day. Period music played on replicated medieval instruments. A strict rule requires all goods to be handmade by the selling artisan — no imported or mass-produced items. Genuinely good crafts sell out by Saturday noon; arrive Friday afternoon.","pr":{"time":"Full day","cost":"Small entry fee","transport":"Pärnu centre; book RV parking outside town early","tips":"Arrive Friday afternoon. Buy early — genuinely good crafts sell out Saturday noon."},"n_no":"Pärnu middelaldermarked","s_no":"Det mest autentiske middelaldermarkedet i Baltikum. Alle selgere må tilby håndlagde varer – ingen masseproduksjon. 3.–5. juli."},{"id":"est-h01","n":"Haapsalu Bishop's Castle & White Lady","co":"estonia","re":"Haapsalu","ty":"attraction","ca":["history","unusual"],"s":"13th-century castle. The White Lady appears in the cathedral window on August full moon. Tchaikovsky visited 1867. World's longest covered railway platform (216m).","ll":[58.9472,23.5386],"rt":2,"tg":["castle","medieval","White Lady","Tchaikovsky","spa","railway","longest platform"],"lo":"The town is a perfectly preserved Tsarist seaside resort — wooden spa villas, ornate promenade, therapeutic mud tradition still active at Hedon Spa. The railway station has the world's longest covered platform (216m). The White Lady festival in August draws visitors to the castle cathedral window at full moon.","pr":{"time":"Half day","cost":"Castle ~€8; railway museum €5","transport":"100km from Tallinn; regular buses ~1.5hrs","tips":"The esplanade sunset walk is free and beautiful."},"n_no":"Haapsalus biskopsborg og Den hvite dame","s_no":"Borg fra 1200-tallet. Den hvite dame vises i domkirkens vindu ved fullmåne i august. Tsjajkovskij besøkte byen i 1867."},{"id":"est-s01","n":"Kaali Meteorite Crater","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["unusual","nature"],"s":"Impact lake 110m wide formed ~3,500 years ago. Ancient Estonians considered it sacred — the stone wall they built around it still stands. Free entry.","ll":[58.3728,22.6694],"rt":2,"tg":["meteorite","crater","Bronze Age","sacred","island","free"],"lo":"The meteorite was approximately 10 metres across and hit at 20 km/s. Nine impact craters were formed; the largest (110m wide, water-filled) is the main attraction. The Bronze Age sacred stone wall — built by local people who considered the impact site holy — still stands around the rim. Two metres away: a small Meteoritics Museum. Free entry to the crater.","pr":{"time":"1 hour","cost":"Free; museum ~€2","transport":"Ferry Virtsu→Kuivastu then causeway to Saaremaa; 40km to Kaali village","tips":"Combine with Kuressaare Castle in a full island day."},"ki":1,"n_no":"Kaali meteorittkrater","s_no":"Innsjø etter et meteorittnedslag for ca. 3 500 år siden, 110 m bred. Gamle estere betraktet den som hellig. Gratis inngang."},{"id":"est-s02","n":"Kuressaare Castle","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["history"],"s":"Best-preserved medieval castle in the Baltic states. Water-filled moat still intact. Excellent museum including Soviet-era island history (it was a closed military zone).","ll":[58.25,22.4833],"rt":2,"tg":["castle","medieval","moat","museum","Teutonic Order"],"lo":"Built by the Teutonic Order in the 14th century, Kuressaare is an extraordinary rarity — a medieval castle that was never substantially destroyed or remodelled. The complete moat, intact outer wall, keep, and bishop's palace survive. The museum inside covers Saaremaa's full history including the Soviet closed-zone era (1944–1991). Climb the round tower for the moat-reflection view.","pr":{"time":"2–3 hours","cost":"€12 adult","transport":"Kuressaare, Saaremaa island capital","tips":"Climb the round tower for the moat-reflection view."},"n_no":"Kuressaare slott","s_no":"Det best bevarte middelalderslottet i de baltiske statene. Vanngraven er fortsatt intakt. Utmerket museum med øyas historie."},{"id":"est-s03","n":"Kiipsaare Lighthouse — Leaning Tower","co":"estonia","re":"Saaremaa","ty":"attraction","ca":["unusual","nature"],"s":"The sand spit has completely eroded — the lighthouse now stands in the sea, tilted at a dramatic angle. Free. Walk across the beach to reach it.","ll":[58.4956,21.8214],"rt":2,"tg":["lighthouse","tilted","island","unusual","sea","free"],"lo":"Built 1933 on Harilaid Peninsula. Over 90 years, Baltic currents swept the sand spit away entirely — the lighthouse now stands in open water, leaning measurably. At low tide a sandbank occasionally connects it to the beach. The light still works. One of the most visually arresting free attractions in Estonia; the drive down the unpaved forest road to the cape is itself scenic.","pr":{"time":"1 hour","cost":"Free","transport":"Harilaid Peninsula, northwest Saaremaa","tips":"Check tide times before visiting."},"n_no":"Kiipsaare fyr – det skjeve tårnet","s_no":"Sandtangen er fullstendig erodert – fyret står nå i havet, dramatisk skjevt. Gratis. Gå over stranden for å nå frem."},{"id":"est-s04","n":"Kihnu Island — Living UNESCO Heritage","co":"estonia","re":"Kihnu","ty":"attraction","ca":["history"],"s":"Women wear traditional striped skirts daily — not for tourists. UNESCO Intangible Cultural Heritage. 30-min ferry from mainland takes the RV.","ll":[58.1413,24.0208],"rt":3,"tg":["UNESCO","living heritage","island","traditional","striped skirts","fishing"],"lo":"Kihnu is one of the last places in Europe where a traditional culture has survived largely unbroken. Women wear their traditional striped körts skirts daily — not for performance. The 23km island circuit by bike covers the main village, the museum, the cemetery, and the beaches. Fresh smoked fish from local households. Book the vehicle ferry well ahead for July.","pr":{"time":"Full day; overnight recommended","cost":"Ferry ~€12 return (takes vehicles)","transport":"30 min ferry from Munalaiu near Pärnu","tips":"Book vehicle ferry well ahead in July. Home-cooked meals at farms — ask locally."},"n_no":"Kihnu – levende UNESCO-arv","s_no":"Kvinner bærer tradisjonelle stripete skjørt til daglig. UNESCO immaterielle kulturarv. 30 minutters ferge fra fastlandet tar med campingvogna."},{"id":"est-s05","n":"Vormsi Island — 330 Sun Crosses","co":"estonia","re":"Vormsi","ty":"attraction","ca":["unusual"],"s":"Cemetery with 330+ hand-carved limestone sun crosses — every one unique, every one made by a local farmer. Almost no tourists.","ll":[58.9702,23.2654],"rt":3,"tg":["cemetery","sun crosses","Swedish heritage","island","unique"],"lo":"Sõrve Peninsula on Saaremaa was the last German stronghold in Estonia — the Battle of Tehumardi (October 8, 1944) left roughly 200 dead on each side. 13th–19th century limestone crosses represent a Scandinavian-Baltic tradition found nowhere else in the world. The island was a Soviet border zone until 1991. Fossil outcrops at Saxby point and the Rumpo Peninsula hiking trail are outstanding additions.","pr":{"time":"Half day","cost":"Ferry ~€10 return","transport":"45-min ferry from Rohuküla near Haapsalu","tips":"No petrol station on island. Bring cash. Bike rental at Sviby harbour."},"n_no":"Vormsi – 330 solkors","s_no":"Kirkegård med over 330 håndhuggede kalksteins-solkors – hvert eneste unikt, alle laget av lokale bønder. Nesten ingen turister."},{"id":"est-s06","n":"Ruhnu Island","co":"estonia","re":"Ruhnu","ty":"attraction","ca":["unusual","nature"],"s":"70km offshore, ~100 residents. Singing sands, possibly-Eiffel-designed cast-iron lighthouse (1884), oldest wooden church in Estonia (1643). Local seaweed gin.","ll":[57.8053,23.2519],"rt":3,"tg":["island","singing sands","lighthouse","seaweed gin","seals","remote"],"lo":"Ruhnu has fewer than 150 residents — the smallest municipality in Estonia. The 'singing sand' beach (Limo) squeaks underfoot — same acoustic phenomenon as Laulasmaa, caused by round silica grains. The native Ruhnu sheep exist nowhere else on Earth. After day visitors leave by ferry, you have the island to yourself. Watch seals from the eastern shore at dusk. The seaweed gin is only available on the island.","pr":{"time":"Overnight strongly recommended","cost":"Ferry ~€20 return (from Saaremaa)","transport":"2h ferry from Roomassaare (Saaremaa). Book weeks ahead for July.","tips":"Bring cash. Limited shop hours. Seaweed gin only available on the island."},"n_no":"Ruhnu","s_no":"70 km fra kysten, ~100 innbyggere. Syngende sanddyner, et støpejernsfyr fra 1884, Estlands eldste trekirke (1643). Lokal tang-gin."},{"id":"est-s07","n":"Koguva Village, Muhu Island","co":"estonia","re":"Muhu","ty":"attraction","ca":["history"],"s":"Outstanding example of Estonian peasant architecture — stone fences, thatched barns, largely unchanged since the 19th century. Four farmhouses form a living museum.","ll":[58.5986,23.0836],"rt":2,"tg":["village","architecture","Muhu embroidery","heritage","museum","islands"],"lo":"Koguva village preserves traditional Estonian stone-and-thatch farmstead architecture largely unchanged since the 19th century. The stone boundary walls, thatched barns, and granite farmhouses are the finest surviving example on any Estonian island. Traditional Muhu embroidery — the richest needlework tradition in Estonia — is available from craft workshops in the village and at the museum shop.","pr":{"time":"2 hours","cost":"Museum ~€5; village free","transport":"Ferry Virtsu→Kuivastu (takes RV); Koguva on western Muhu","tips":"Buy embroidered textiles here — the real thing."},"n_no":"Koguva-landsbyen, Muhu","s_no":"Et enestående eksempel på estisk bondearchitektur – steingjerdene, stråtakslader, stort sett uendret siden 1800-tallet."},{"id":"est-s08","n":"Kõpu Lighthouse, Hiiumaa","co":"estonia","re":"Hiiumaa","ty":"attraction","ca":["history"],"s":"Third-oldest continuously active lighthouse in the world — built 1531. Took 30 years (plague interrupted construction). Views 50km out to sea.","ll":[58.9159,22.1997],"rt":2,"tg":["lighthouse","1531","Hanseatic","island","Soviet ruins"],"lo":"Essential to Baltic trade for 500 years. Sits on Hiiumaa's highest hill (68m). The island has two other accessible French-built lighthouses (Tahkuna and Ristna, 1873–74). Derelict Soviet coastal batteries at Tahkuna are free to explore. All three lighthouses make a half-day Hiiumaa lighthouse circuit.","pr":{"time":"3–4 hours for all three lighthouses","cost":"€2 per lighthouse; €5 for all three","transport":"Ferry from Rohuküla (~1hr); car essential on island","tips":"Soviet military ruins at Tahkuna are free and fascinating."},"n_no":"Kõpu fyr, Hiiumaa","s_no":"Verdens tredje eldste fyr i kontinuerlig drift – bygget i 1531. Tok 30 år å fullføre (pesten avbrøt arbeidet). Utsikt 50 km ut til havs."},{"id":"est-cw01","n":"Paldiski Nuclear Submarine Training Centre","co":"estonia","re":"Paldiski","ty":"attraction","ca":["unusual","history"],"s":"Largest Soviet nuclear submarine training facility in the USSR. Two nuclear reactors still on site in concrete sarcophagi. Tours by appointment only.","ll":[59.3608,24.1069],"rt":3,"tg":["nuclear","submarine","Cold War","Soviet","reactor","tours by appointment"],"lo":"Paldiski was a fully closed Soviet city — 16,000+ military personnel, two full-scale submarine mock-ups with operational nuclear reactors (70 MW and 90 MW). Soviets couldn't remove the reactors when they left in 1994 — still under 24/7 supervision by AS ALARA. Decommissioning completed 2007. Book tours via alara.ee. Weekdays only; bring photo ID. One of only three Soviet nuclear submarine training centres.","pr":{"time":"2–3 hours","cost":"€15+ per person; children free","transport":"~50km west of Tallinn. Pre-book via alara.ee.","tips":"Weekdays only; bring photo ID. Dress warmly — the concrete building is cold and windswept."},"n_no":"Paldiski atomubåt-treningssenter","s_no":"Det største sovjetiske treningsanlegget for atomubåter i hele USSR. To atomreaktorer er fortsatt på stedet, innstøpt i betongsarkofager."},{"id":"est-cw02","n":"Sillamäe — Secret Soviet Uranium City","co":"estonia","re":"Sillamäe","ty":"attraction","ca":["unusual","history"],"s":"Built to process uranium for the Soviet nuclear bomb. Erased from all maps. Intact Stalinist urbanism. Almost entirely Russian-speaking.","ll":[59.397,27.7633],"rt":3,"tg":["Soviet","uranium","nuclear","Stalinist architecture","secret city"],"lo":"Uranium here helped fuel the first Soviet nuclear bomb (1949). The closed city of Sillamäe was built from 1947 — not on any official map — and processed 98,681 tonnes of uranium by 1990. Today: intact Stalinist neo-classical avenues listed as heritage, a protected 1950s cinema, and the Prometheus monument. Current population ~11,800. The Sillamäe Museum has original Soviet artefacts and a chilling 'red room'.","pr":{"time":"Half day","cost":"Museum small fee; town free","transport":"~170km east of Tallinn; best as day trip from Narva","tips":"Feels like stepping into the USSR. The town is predominantly Russian-speaking."},"n_no":"Sillamäe – den hemmelige soviétiske uranbyen","s_no":"Bygget for å foredle uran til den sovjetiske atombomben. Slettet fra alle kart. Intakt stalinistisk byarkitektur."},{"id":"est-f01","n":"Must leib (Dark Rye Bread)","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Estonia's national bread — dense sourdough rye with malt, served at every meal. Buy from local bakeries for the real thing. €1–3/loaf.","ll":[59.437,24.745],"rt":3,"tg":["bread","rye","sourdough","staple","traditional"],"lo":"The best must leib comes from small bakeries using centuries-old sourdough starters — a different product entirely from supermarket loaves. Dense, malty, slightly sweet, with a crisp crust and dark crumb. The essential carrier for every smoked fish, curd cheese, and sour cream in Estonian cuisine. Ask for 'kohalik leib' (local bread) in any bakery.","pr":{"time":"","cost":"€1–3","transport":"Any bakery in Estonia","tips":"Ask for 'kohalik leib'. Balti Jaama Turg has excellent freshly baked loaves."},"n_no":"Must leib (mørkt rugbrød)","s_no":"Estlands nasjonalbrød – kompakt surdeigs-rugbrød med malt. Serveres til alle måltider. Kjøp fra lokale bakerier. €1–3 per brød."},{"id":"est-f02","n":"Kama Drink","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Ground roasted barley, rye, oat, and pea flour stirred into kefir with honey. Estonia's ancient protein drink. Found at health cafes.","ll":[59.437,24.745],"rt":2,"tg":["kama","ancient food","kefir","Estonian","superfood"],"lo":"One of the oldest continuously made foods in Estonia, kama appears in 13th-century chronicles as a staple of travelling warriors. The blend — ground roasted barley, rye, oat, and pea flour — is stirred into kefir with honey: thick, nutty, earthy-sweet. Try a kama smoothie at RØST Bakery in Rotermann Quarter or Telliskivi. Buy a powder packet (€3) as a souvenir.","pr":{"time":"","cost":"€3–5 (smoothie); €3 (powder packet)","transport":"Cafes in Tallinn; supermarkets nationwide","tips":"Buy a kama powder packet as a souvenir. RØST Bakery smoothie is the best version."},"n_no":"Kama-drikk","s_no":"Malt ristet bygg-, rug-, havre- og ertemel rørt ut i kefir med honning. Estlands urgamle proteindrikk. Finnes på helsecaféer."},{"id":"est-f03","n":"Roadside Smoked Fish","co":"estonia","re":"Estonian coast","ty":"food","ca":["food"],"s":"Warm alder-smoked Baltic herring, sprats, or pike-perch from roadside smokers. Eat outside. One of the most authentic Baltic food experiences.","ll":[58.944,23.541],"rt":3,"tg":["smoked fish","roadside","authentic","herring","alder","traditional"],"lo":"Roadside smokers typically set up near fishing harbours along the Estonian coast — a hand-lettered sign, a column of alder smoke, and a warm fish wrapped in paper. The fish is smoked that morning over alder wood; species depend on the season (herring, sprats, pike-perch, smelt). Eat it immediately with dark rye bread. If you see smoke, stop. No restaurant can replicate it.","pr":{"time":"","cost":"€2–5 per portion","transport":"Roadside along Estonian coast — near Pärnu, Haapsalu, Käsmu","tips":"If you see smoke and a hand-lettered sign, stop immediately."},"n_no":"Røkt fisk langs veien","s_no":"Varmrøkt Østersjøsild, brisling eller gjørs, røkt over or-ved fra veikantselgere. En av de mest autentiske matopplevelsene i Baltikum."},{"id":"est-f04","n":"Kohuke (Curd Snack)","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Chocolate-coated chilled curd cheese bar in dozens of flavours. Estonia's most beloved everyday food. €0.50–1.50 at every supermarket.","ll":[59.437,24.745],"rt":3,"tg":["kohuke","curd","chocolate","snack","supermarket","cheap"],"lo":"Available in vanilla, strawberry, blueberry, caramel, coconut, and pistachio — new flavours appear seasonally. The chilled curd bar (fresh curd cheese slightly sweetened) is dipped in a thin chocolate shell; the texture is rich and cold, the chocolate thin and snappy. At €0.50–1.50 each, they are Estonia's most irresistible supermarket impulse buy. Try pistachio or coconut first.","pr":{"time":"","cost":"€0.50–1.50 each","transport":"Every supermarket in Estonia","tips":"Try pistachio or coconut. A box of mixed kohuke makes an excellent souvenir."},"n_no":"Kohuke (ostemassebar)","s_no":"Sjokoladebelagt, kjølt ostemassebar i dusinvis av smaker. Estlands mest elskede hverdagsmat. €0,50–1,50 i alle supermarkeder."},{"id":"est-f05","n":"Vana Tallinn Liqueur","co":"estonia","re":"All Estonia","ty":"food","ca":["food"],"s":"Estonia's iconic dark spiced liqueur (40–45% ABV). Rum, citrus, cinnamon, vanilla. Mix into coffee or pour over ice cream. The national souvenir spirit.","ll":[59.437,24.745],"rt":2,"tg":["liqueur","spirits","Estonian","souvenir","spiced","Vana Tallinn"],"lo":"Vana Tallinn was created in the 1960s by the Liviko distillery in Tallinn. The 45% version has notably more depth and spice than the 40% export version. Drink it neat over ice, stirred into black coffee, or poured warm over vanilla ice cream. The small bottle (5cl, €3–5) fits in a jacket pocket. Miniatures sold at Tallinn Airport, supermarkets, and souvenir shops throughout Estonia.","pr":{"time":"","cost":"€10–20/bottle; €3–5 miniature","transport":"Any liquor store or supermarket in Estonia","tips":"Buy the 45% version. Miniatures available for €3–5."},"n_no":"Vana Tallinn-likør","s_no":"Estlands ikoniske mørke krydderlikør (40–45 % ABV). Rom, sitrus, kanel og vanilje. Bland i kaffe eller hell over iskrem."},{"id":"est-a01","n":"ÖÖD Mirror House","co":"estonia","re":"Near Tallinn","ty":"accommodation","ca":["sleep","unusual"],"s":"A mirrored cabin hidden in pine forest — it disappears into the trees. Floor-to-ceiling glass front, sauna, BBQ. ~€220–260/night.","ll":[59.4801,24.678],"rt":3,"tg":["mirror house","unusual accommodation","forest","sauna","romantic","Estonian invention"],"lo":"ÖÖD was invented in Estonia — a mirror-clad cabin that reflects its forest surroundings so completely it seems to vanish. Full-glass front wall, wood-burning sauna, espresso machine, contactless check-in. Multiple Estonian locations. All sell out months ahead in summer — book via oodhotels.com or Airbnb well in advance.","pr":{"time":"Overnight","cost":"~€220–260 per night","transport":"~40 min from Tallinn Airport (Ihasalu location)","tips":"Book far in advance — all locations sell out months ahead in summer. oodhotels.com or Airbnb."},"n_no":"ÖÖD speilhus","s_no":"Et speilkledt hytterom gjemt i furuskog – det forsvinner inn i trærne. Gulv-til-tak glassfasade, badstue og grill. ~€220–260/natt."},{"id":"est-a02","n":"Ohesaare Windmill, Saaremaa","co":"estonia","re":"Saaremaa","ty":"accommodation","ca":["sleep","unusual"],"s":"Estonia's only gable windmill you can sleep in. Solar power, no mains electricity. June–August only. €95/night for 2 people.","ll":[58.19,22.24],"rt":2,"tg":["windmill","unusual accommodation","off-grid","Saaremaa","island"],"lo":"This 19th-century gable windmill (one of two surviving on Saaremaa) was converted to off-grid holiday accommodation for up to 5 people. Solar-powered lighting only — no mains electricity. Surrounded by Saaremaa's alvar meadows: open limestone grassland with orchids and juniper. June–August only. Book directly at saaremaatuulik.ee. Bring food; no shops nearby.","pr":{"time":"Overnight","cost":"€95/night (2 people); extra bed €30","transport":"Ohesaare village, Saaremaa — car required","tips":"June–August only. Book directly: saaremaatuulik.ee. Bring food — no shops nearby."},"n_no":"Ohesaare vindmølle, Saaremaa","s_no":"Estlands eneste gavlvindmølle der du kan overnatte. Solenergi, ingen strøm fra nettet. Juni–august. €95 per natt for 2 personer."},{"id":"est-a03","n":"RMK Free Forest Campsites","co":"estonia","re":"All Estonia","ty":"accommodation","ca":["sleep"],"s":"Hundreds of free legal wild campsites across Estonia — fireplace, sometimes a toilet. The best wild camping system in Europe.","ll":[59.437,25.0],"rt":3,"tg":["wild camping","free","forest","RMK","legal","motorhome"],"lo":"RMK (Estonian State Forests) maintains a network of free campsites across Estonia's national parks, forests, and coast — no booking needed. Each site has a fire pit, bench, and dry toilet; larger sites have shelters and water. The RMK mobile app (rmk.ee) shows all 600+ locations with real-time occupancy and trail information. Best sites in Lahemaa NP, Saaremaa, and Hiiumaa.","pr":{"time":"Overnight","cost":"Free","transport":"Across Estonia — download RMK app or rmk.ee","tips":"Download the RMK app before entering Estonia. Best sites in Lahemaa NP, Saaremaa, and Hiiumaa."},"n_no":"RMK gratis skogscampingplasser","s_no":"Hundrevis av gratis, lovlige friluftsplasser i hele Estland – bålplass og noen ganger toalett. Det beste systemet for friluftscamping i Europa."},{"id":"est-a04","n":"Pädaste Manor, Muhu Island","co":"estonia","re":"Muhu","ty":"accommodation","ca":["sleep"],"s":"16th-century manor on Muhu Island in Small Luxury Hotels of the World. Michelin-starred Alexander Restaurant. Spa with sea views. From €352/night.","ll":[58.579,23.168],"rt":2,"tg":["luxury hotel","manor","Michelin","Muhu island","island stay"],"lo":"Pädaste Manor dates from the 1500s; the main building was rebuilt in the 19th century. The Alexander Restaurant is among Estonia's most celebrated — local seafood, foraged island herbs, farm-raised meats — with Michelin star recognition. 24 rooms across several restored period buildings. Spa area with Baltic Sea views. Book Alexander Restaurant 4–6 weeks ahead in summer.","pr":{"time":"1–2 nights minimum","cost":"€352–1,330/night","transport":"Muhu island via Virtsu–Kuivastu ferry","tips":"Book Alexander Restaurant 4–6 weeks ahead in summer."},"n_no":"Pädaste gods, Muhu","s_no":"Herregård fra 1500-tallet på Muhu – en del av Small Luxury Hotels of the World. Michelin-stjernede Alexander Restaurant."},{"id":"est-fv01","n":"Tallinn Old Town Days","co":"estonia","re":"Tallinn","ty":"festival","ca":["history","unusual"],"s":"Annual June festival where the medieval Old Town fills with craftspeople, musicians, and period performers. One of the best free festivals in Estonia.","ll":[59.4356,24.7406],"rt":2,"tg":["festival","medieval","June","Old Town","free","crafts"],"lo":"Old Town Days fills the streets around Raekoja plats with historical demonstrations and craft markets. The Dominican Monastery courtyard and surrounding streets are the focal points. Period music from authentic ensembles. Genuinely atmospheric — Tallinn's medieval architecture needs no stage dressing.","pr":{"time":"Full day","cost":"Free","transport":"Tallinn Old Town","tips":"Early June each year. Check tallinnoldtowndays.ee for exact dates. Arrive early for best craft stalls."},"n_no":"Tallinns gamlebysdager","s_no":"Årlig junifestival der den middelalderske gamlebyen fylles av håndverkere, musikere og kostymedansere."},{"id":"lat-r01","n":"House of the Blackheads, Riga","co":"latvia","re":"Riga","ty":"attraction","ca":["history"],"s":"Opulent Flemish Renaissance hall for unmarried Hanseatic merchants. Destroyed in WWII, perfectly rebuilt 1999. The finest single building in Riga's Old Town.","ll":[56.9417,24.1042],"rt":3,"tg":["Hanseatic","architecture","guild hall","museum","Riga"],"lo":"First mentioned 1334, the Brotherhood of Blackheads was a guild of unmarried foreign merchants whose patron saint was the black-faced St Mauritius of Ethiopia. The building was destroyed in 1941 and the 1999 reconstruction is near-perfect — the grand interior is still used for concerts and state events. Audio guides in 9 languages. Combine with the adjacent Occupation Museum (free, powerful) and Riga Town Hall Square.","pr":{"time":"1–2 hours","cost":"€10 adult","transport":"Rātslaukums, Old Town, Riga. Daily 10:00–17:00.","tips":"Combine with the adjacent Occupation Museum and House of Three Brothers."},"n_no":"De svartehodenes hus, Riga","s_no":"Overdådig flamsk renessansebygg for ugifte hanseatiske kjøpmenn. Ødelagt under WWII, perfekt gjenoppbygd i 1999."},{"id":"lat-r02","n":"KGB Corner House (Stūra Māja), Riga","co":"latvia","re":"Riga","ty":"attraction","ca":["history","unusual"],"s":"Soviet KGB's Latvian headquarters. Original basement prison cells, interrogation rooms, and solitary confinement preserved. Guided tours only, minimum age 12.","ll":[56.9582,24.1242],"rt":3,"tg":["KGB","Cold War","Soviet","prison","dark tourism","guided tour"],"lo":"The 'Corner House' at Brīvības iela 61 was synonymous with terror from 1940 to 1991. The basement is entirely preserved: 14 soundproofed interrogation cells, the corridor prisoners walked to their fate, the courtyard where executions took place. Thousands were deported to GULAG labour camps from this address. Guided tours only. The 6th floor housed KGB operations — those rooms are also accessible. One of Europe's most powerful Cold War sites.","pr":{"time":"1.5 hours","cost":"€15 guided tour; small free exhibition for walk-ins","transport":"Corner of Brīvības and Stabu iela, Riga. Pre-book: bezrindas.lv.","tips":"Minimum age 12. The guided tour is essential — without context the cells are just cells."},"n_no":"KGB-hjørnebygget (Stūra Māja), Riga","s_no":"KGBs latviske hovedkvarter i sovjettiden. Opprinnelige fengselsceller, avhørsrom og isolasjonsceller er bevart. Kun guidede turer."},{"id":"lat-r03","n":"Riga Central Market","co":"latvia","re":"Riga","ty":"attraction","ca":["food","history","unusual"],"s":"Five former WWI Zeppelin hangars converted into Europe's largest covered market. Smoked fish displays like works of art. 3,000+ stands.","ll":[56.9437,24.1149],"rt":3,"tg":["market","Zeppelin","smoked fish","food","Hanseatic","free entry"],"lo":"Five WWI Zeppelin hangar shells — each over 200m long — were repurposed as market pavilions between 1924 and 1930. The complex covers 72,300 square metres and has over 3,000 trade stands. Part of the Riga UNESCO World Heritage Site since 1998. The fish pavilion alone is worth the visit: smoked mackerel, pickled herring in a dozen varieties, salted sprats. Buy provisions for two days. Best visited before 10:00 on a weekday.","pr":{"time":"1–2 hours","cost":"Free entry; €10–20 for shopping","transport":"Nēģu iela 7, adjacent to Riga Central Station. Open daily from 7am.","tips":"Fish pavilion busiest Saturday morning. Also check the dairy pavilion for Jāņu siers."},"n_no":"Rigas sentralmarked","s_no":"Fem tidligere zeppelinhangarer fra WWI omgjort til Europas største overdekkede marked. Røkt fisk-utstillingen er som et kunstverk."},{"id":"lat-r04","n":"Riga Art Nouveau Quarter","co":"latvia","re":"Riga","ty":"attraction","ca":["history","unusual"],"s":"800+ Art Nouveau buildings — the densest collection in the world. Alberta Street has Eisenstein's extravagant facades of enormous sculpted faces and gargoyles.","ll":[56.958,24.115],"rt":2,"tg":["Art Nouveau","architecture","Eisenstein","museum","walking","free views"],"lo":"Riga has approximately 800 Art Nouveau buildings — the highest concentration in the world. Alberta iela 2a, 4, 6, 8 and 12 were built 1901–1908 by Mikhail Eisenstein (father of film director Sergei) and Konstantīns Pēkšēns — extravagant facades with screaming faces, mythological figures, and elaborate stucco. Number 12 is the Art Nouveau Museum (€9 entry). The 'Black Cat' building on Meistaru iela — iron cats on the rooftop — is two streets east.","pr":{"time":"1–2 hours walking","cost":"Museum entry varies; street views free","transport":"Alberta iela, Centrs district, ~15 min walk from Old Town","tips":"Pick up a free Art Nouveau walking map from the tourist information at Town Hall Square."},"n_no":"Rigas jugendstilkvarter","s_no":"Over 800 jugendstilbygninger – den tetteste samlingen i verden. Alberta gata har Eisensteins ekstravagante fasader."},{"id":"lat-r05","n":"Museum of the Occupation of Latvia","co":"latvia","re":"Riga","ty":"attraction","ca":["history"],"s":"One of the most powerful occupation museums in Europe. Soviet and Nazi occupations 1940–1991 told through personal testimonies, Gulag artefacts, and deportation records.","ll":[56.948,24.108],"rt":3,"tg":["occupation","Soviet","Nazi","deportation","museum","dark tourism"],"lo":"The Museum of the Occupation of Latvia tells both the Nazi (1941–44) and Soviet (1940–41, 1944–91) occupations through individual voices — Latvians deported to Siberia, resistance fighters, families torn apart. An introductory documentary film provides essential context; allow time for it. The Gulag artefact collection — camp clothing, prisoner-carved objects — is among the most personal in the Baltic.","pr":{"time":"2–3 hours","cost":"€8 adult; guided tour €15","transport":"Town Hall Square area, Riga Old Town. Closed Tuesdays and Wednesdays.","tips":"Allow at least 2 hours. The guided tour provides essential context."},"n_no":"Museum for Latvias okkupasjon","s_no":"Et av Europas mest grepende okkupasjonsmuseer. Den sovjetiske og nazistiske okkupasjonen 1940–1991 fortalt gjennom personlige vitnesbyrd."},{"id":"lat-r06","n":"Latvian Academy of Sciences Observation Deck","co":"latvia","re":"Riga","ty":"attraction","ca":["unusual","history"],"s":"Stalinist 'wedding cake' skyscraper built 195
